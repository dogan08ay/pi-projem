<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Web3 Domain</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .domain-card { background: #334155; padding: 15px; margin: 10px; border-radius: 8px; border: 1px solid #6366f1; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Web3 Domain</h1>
    <button id="auth-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
    <div id="grid"></div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        function loginWithPi() {
            Pi.authenticate(['username'], () => {}).then(auth => {
                document.getElementById('auth-btn').style.display = 'none';
                renderDomains();
            }).catch(e => alert("Hata: " + e));
        }

        function renderDomains() {
            const domains = ['etstur.pi', 'eminevim.pi', 'fuzulev.pi', 'fibabank.pi', 'sekerbank.pi', 'doganay.pi'];
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            domains.forEach(d => {
                const div = document.createElement('div');
                div.className = 'domain-card';
                div.innerText = "Satın Al: " + d;
                div.onclick = function() {
                    Pi.createPayment({
                        amount: 0.1,
                        memo: "Domain: " + d,
                        metadata: { domain: d }
                    }, {
                        onReadyForServerApproval: (id) => console.log(id),
                        onReadyForServerCompletion: (id, txid) => alert("Başarılı!"),
                        onError: (err) => alert("Hata: " + err)
                    });
                };
                grid.appendChild(div);
            });
        }
    </script>
</body>
</html>
