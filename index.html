<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { 
            --bg:#0f172a; 
            --card:#1e293b; 
            --accent:#6366f1; 
            --text:#f8fafc; 
            --sold:#ef4444;
            --price:#fbbf24; 
        }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; display:flex; justify-content:center; }
        .container { max-width:600px; width:100%; text-align:center; }
        .card { background:var(--card); padding:25px; border-radius:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom:20px; }
        .domain-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px; }
        .domain-card { background:#334155; padding:20px; border-radius:12px; border:1px solid #475569; transition:0.3s; display:flex; flex-direction:column; align-items:center; }
        .domain-img { width:100%; height:120px; margin-bottom:10px; border-radius:12px; object-fit:contain; background-color:#334155; padding:5px; }
        
        .domain-name { font-size: 1.1em; font-weight: bold; margin-bottom: 5px; }
        .domain-price { color: var(--price); font-size: 1.3em; font-weight: 800; margin: 5px 0; text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }

        .btn-buy { background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; font-size: 0.9em; transition: 0.2s; }
        .btn-buy:hover { transform: scale(1.03); filter: brightness(1.1); }
        .btn-buy:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-sold { background: rgba(239, 68, 68, 0.1); color: var(--sold); border: 1.5px solid var(--sold); padding: 8px 16px; border-radius: 8px; margin-top: 10px; font-weight: bold; width: 100%; font-size: 0.85em; cursor: default; }

        .pi-btn { background:#0052FF; color:#ffffff; padding:12px 30px; border-radius:50px; font-weight:800; font-size:0.95em; border:1px solid rgba(255,255,255,0.2); cursor:pointer; }
        .section-title-box { background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%); color:#1e293b; padding:12px 28px; border-radius:16px; border:3px solid #f59e0b; font-size:1.15em; font-weight:800; display:inline-block; margin:5px auto 25px auto; box-shadow:0 6px 16px rgba(245,158,11,0.2); }

        /* UYARI BÖLÜMÜ (Giriş Yapılmadan Önce) */
        .auth-warning { color:#1e293b; padding:24px; border:4px solid #f59e0b; border-radius:24px; background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%); text-align:center; box-shadow:0 12px 28px rgba(245,158,11,0.25); grid-column: span 2; }
        .auth-title-box { background:#1e293b; color:#ffffff; padding:20px; border-radius:18px; display:flex; flex-direction:column; align-items:center; gap:10px; }
        .lock-message { font-size:1.05em; font-weight:700; line-height:1.6; }
        .inline-btn-highlight { background:#0052ff; color:#ffffff; padding:6px 20px; border-radius:50px; font-weight:800; display:inline-block; margin:5px 0; }

        /* FOOTER */
        .footer-section { margin-top:30px; padding:20px; color:#94a3b8; font-size:0.9em; text-align:center; border-top:1px solid #334155; }
        .footer-section a { color:#38bdf8; text-decoration:none; }
        .footer-divider { margin:0 10px; color:#475569; }

        /* ADMIN LOG LIST */
        #log-list { font-size:0.85em; max-height:200px; overflow-y:auto; text-align: left; }
        .log-item { padding:8px; border-bottom:1px solid #334155; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
<div class="container">
    <!-- AUTH CARD -->
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count" style="color:#60a5fa;font-size:0.9em;margin-bottom:15px;font-weight:600;">Aktif Kullanıcı: 0</p>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">Pi ile Bağlan</button>
    </div>

    <!-- ADMIN PANEL (SADECE @doganay0808 İÇİN) -->
    <div class="card" id="admin-panel" style="display:none; border:2px solid #6366f1;">
        <h3 style="color:#6366f1;margin-top:0;">🛠 Admin Paneli (Günlük Veri)</h3>
        <div id="log-list"></div>
    </div>

    <!-- DOMAIN LIST -->
    <div class="card">
        <div class="section-title-box">Satıştaki Domainler</div>
        <div class="domain-grid" id="domain-list">
            <!-- GİRİŞ YAPILMAMIŞSA GÖRÜNECEK UYARI -->
            <div class="auth-warning" id="auth-warning-box">
                <div class="auth-title-box">
                    <div class="lock-message">
                        🔒 Erişim sağlamak için lütfen yukarıdaki <br>
                        <span class="inline-btn-highlight">Pi ile Bağlan</span> <br>
                        butonunu kullanınız.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer-section">
        <div>Sorularınız için bize ulaşın: <a href="mailto:doganay08@hotmail.com">📩 doganay08@hotmail.com</a></div>
        <div style="margin-top:8px;"><a href="https://t.me/+5jZi9vrcNMM2NGVk" target="_blank">💬 Telegram Grubumuz</a></div>
        <div style="margin-top:15px;">
            <a href="privacy.html">Gizlilik Politikası</a>
            <span class="footer-divider">|</span>
            <a href="terms.html">Kullanım Şartları</a>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "s3ddhcea9xae0qieikgjy9zw9tduemnraoucjrr9iqe87pduhczmd95kq8n3aai1",
    authDomain: "web3-domain-gateway.firebaseapp.com",
    projectId: "web3-domain-gateway"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let paymentInProgress = false;
let domainData = {};
let currentUser = null;
let isAuth = false;

const domains = [
    { name:'test-domain', img:'assets/test.jpeg', price:10 },
    { name:'etstur.pi', img:'assets/etstur.jpeg', price:250 },
    { name:'eminevim.pi', img:'assets/eminevim.jpeg', price:150 },
    { name:'fuzulev.pi', img:'assets/fuzulev.jpeg', price:300 },
    { name:'fibabank.pi', img:'assets/fibabank.jpeg', price:500 },
    { name:'sekerbank.pi', img:'assets/sekerbank.jpeg', price:600 },
    { name:'doganay.pi', img:'assets/doganay.jpeg', price:150 }
];

function renderDomains() {
    const list = document.getElementById("domain-list");
    if (!list) return;
    
    // Giriş yapılmamışsa uyarıyı göster ve çık
    if (!isAuth) {
        document.getElementById("auth-warning-box").style.display = "block";
        return;
    }

    list.innerHTML = '';
    domains.forEach(d => {
        const data = domainData[d.name] || { sold:false, price:d.price };
        const card = document.createElement('div');
        card.className = 'domain-card';
        const displayPrice = data.price || d.price;

        card.innerHTML = `
            <img src="${d.img}" class="domain-img">
            <div class="domain-name">${d.name}</div>
            <div class="domain-price">${displayPrice} Pi</div>
        `;

        if (data.sold) {
            const soldBtn = document.createElement('div');
            soldBtn.className = 'btn-sold';
            soldBtn.innerText = `SATILDI`;
            card.appendChild(soldBtn);
        } else {
            const buyBtn = document.createElement('button');
            buyBtn.className = 'btn-buy';
            buyBtn.innerText = paymentInProgress ? 'İşlem Bekleniyor...' : 'Satın Al';
            buyBtn.disabled = paymentInProgress;
            buyBtn.onclick = () => window.startPurchase(d.name, displayPrice);
            card.appendChild(buyBtn);
        }
        list.appendChild(card);
    });
}

async function callServer(paymentId, action, txid = null) {
    try {
        const response = await fetch('/api/approve', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ paymentId, action, txid })
        });
        return await response.json();
    } catch (err) { throw err; }
}

async function onIncompletePaymentFound(payment) {
    try {
        await callServer(payment.identifier, 'approve');
        if (payment.transaction && payment.transaction.txid) {
            await callServer(payment.identifier, 'complete', payment.transaction.txid);
        }
    } catch (err) {}
}

window.loginWithPi = async function() {
    if (!window.Pi) return alert("Pi SDK yüklenmedi!");
    try {
        const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
        currentUser = auth.user.username;
        isAuth = true;
        
        document.getElementById("user-status").innerText = "Bağlı: @" + currentUser;
        document.getElementById("auth-btn").style.display = "none";
        
        const now = Date.now();
        const today = new Date().toISOString().split("T")[0];
        
        // Online Takibi
        await setDoc(doc(db, "active_users", currentUser), { username: currentUser, lastSeen: now });
        
        // Günlük Veri Kaydı (Admin için)
        const dailyRef = doc(db, "daily_users", today);
        const dailySnap = await getDoc(dailyRef);
        let dailyData = dailySnap.exists() ? dailySnap.data() : { users: {} };
        dailyData.users[currentUser] = now;
        await setDoc(dailyRef, dailyData);

        renderDomains();
        
        // Heartbeat
        setInterval(() => {
            setDoc(doc(db, "active_users", currentUser), { username: currentUser, lastSeen: Date.now() });
        }, 15000);

        // ADMIN PANEL AKTİFLEŞTİRME
        if (currentUser === "doganay0808") {
            document.getElementById("admin-panel").style.display = "block";
            onSnapshot(doc(db, "daily_users", today), (snap) => {
                const users = (snap.data() || {}).users || {};
                let html = "";
                Object.keys(users).forEach(u => {
                    html += `<div class="log-item"><b>@${u}</b><span>${new Date(users[u]).toLocaleString("tr-TR")}</span></div>`;
                });
                document.getElementById("log-list").innerHTML = html;
            });
        }
    } catch (err) { alert("Giriş Hatası: " + err.message); }
};

window.startPurchase = async function(domain, amount) {
    if (!isAuth || paymentInProgress) return;
    paymentInProgress = true;
    renderDomains();
    try {
        await Pi.createPayment({
            amount: Number(amount),
            memo: "Domain: " + domain,
            metadata: { domain }
        }, {
            onReadyForServerApproval: async (paymentId) => { await callServer(paymentId, 'approve'); },
            onReadyForServerCompletion: async (paymentId, txid) => {
                await callServer(paymentId, 'complete', txid);
                await setDoc(doc(db, "domains", domain), { sold: true, price: amount, txid: txid, buyer: currentUser, soldAt: Date.now() });
                paymentInProgress = false;
                renderDomains();
                alert("Satın alma başarılı!");
            },
            onCancel: () => { paymentInProgress = false; renderDomains(); },
            onError: (error) => { paymentInProgress = false; renderDomains(); alert("Ödeme Hatası: " + (error.message || "Hata.")); }
        });
    } catch (err) { paymentInProgress = false; renderDomains(); alert("Hata: " + err.message); }
};

window.addEventListener("load", () => {
    if (window.Pi) {
        Pi.init({ version: "2.0", sandbox: true });
        Pi.authenticate(['username', 'payments'], onIncompletePaymentFound).catch(() => {});
    }
});

domains.forEach(d => {
    onSnapshot(doc(db, "domains", d.name), (snap) => {
        domainData[d.name] = snap.exists() ? snap.data() : { sold:false, price:d.price };
        renderDomains();
    });
});

onSnapshot(collection(db, "active_users"), (snap) => {
    const now = Date.now();
    let activeCount = 0;
    snap.forEach(doc => {
        if (doc.data().lastSeen && (now - doc.data().lastSeen) < 30000) activeCount++;
    });
    document.getElementById("online-count").innerText = "Aktif Kullanıcı: " + activeCount;
});
</script>
</body>
</html>
