<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin: 10px 0; }
        .domain-card { background: #334155; padding: 15px; margin: 5px; border-radius: 8px; cursor: pointer; display: inline-block; width: 40%; }
        button { padding: 10px 20px; background: #6366f1; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Web3 Domain</h1>
        <button id="auth-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
        <p id="user-status"></p>
    </div>
    <div class="card">
        <h3>Domainler (Tıkla ve Dene)</h3>
        <div id="grid"></div>
    </div>
    <div class="card">
        <h3>İşlem Geçmişi</h3>
        <div id="history">Henüz işlem yok.</div>
    </div>

    <script>
        Pi.init({ version: "2.0", sandbox: true });
        const domains = ['etstur.pi', 'eminevim.pi', 'fuzulev.pi', 'fibabank.pi', 'sekerbank.pi', 'doganay.pi'];
        let user = null;

        // Domainleri otomatik oluştur
        const grid = document.getElementById('grid');
        domains.forEach(d => {
            const div = document.createElement('div');
            div.className = 'domain-card';
            div.innerText = d;
            div.onclick = () => startPurchase(d);
            grid.appendChild(div);
        });

        function loginWithPi() {
            Pi.authenticate(['username'], () => {}).then(auth => {
                user = auth.user.username;
                document.getElementById('user-status').innerText = "Bağlı: @" + user;
                document.getElementById('auth-btn').style.display = 'none';
            });
        }

        function startPurchase(domain) {
            if(!user) { alert("Önce bağlan!"); return; }
            
            Pi.createPayment({
                amount: 0.1,
                memo: "Domain Satın Alım: " + domain,
                metadata: { domain: domain }
            }, {
                onReadyForServerApproval: (id) => console.log("Onay bekleniyor:", id),
                onReadyForServerCompletion: (id, txid) => {
                    document.getElementById('history').innerHTML += "<br>✅ " + domain + " tamamlandı!";
                },
                onCancel: () => alert("İptal edildi."),
                onError: (err) => alert("Hata: " + err)
            });
        }
    </script>
</body>
</html>
