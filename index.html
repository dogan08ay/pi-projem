<!DOCTYPE html>
<html lang="tr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        :root {
            --bg:#0f172a;
            --card:#1e293b;
            --accent:#6366f1;
            --text:#f8fafc;
        }

        body {
            font-family:'Segoe UI',sans-serif;
            background:var(--bg);
            color:var(--text);
            margin:0;
            padding:20px;
            display:flex;
            justify-content:center;
        }

        .container {
            max-width:600px;
            width:100%;
            text-align:center;
        }

        .card {
            background:var(--card);
            padding:25px;
            border-radius:20px;
            box-shadow:0 10px 15px -3px rgba(0,0,0,0.3);
            margin-bottom:20px;
        }

        .domain-grid {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
            margin-top:20px;
        }

        .domain-card {
            background:#334155;
            padding:20px;
            border-radius:12px;
            border:1px solid #475569;
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        .domain-img {
            width:100%;
            height:120px;
            margin-bottom:10px;
            border-radius:12px;
            object-fit:contain;
            background-color:#334155;
            padding:5px;
        }

        .btn-buy {
            background:var(--accent);
            color:white;
            border:none;
            padding:8px 16px;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
            font-weight:bold;
            width:100%;
        }

        .btn-buy:disabled {
            opacity:0.5;
        }

        .pi-btn {
            background:#0052FF;
            color:#fff;
            padding:12px 30px;
            border-radius:50px;
            font-weight:800;
            cursor:pointer;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Web3 Domain</h1>

        <p id="online-count">Aktif Kullanıcı: 0</p>

        <p id="user-status">Lütfen önce bağlanın.</p>

        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">
            Pi ile Bağlan
        </button>

    </div>

    <div class="card">

        <div class="domain-grid" id="domain-list"></div>

    </div>

</div>

<script type="module">

import {
    initializeApp
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

import {
    getFirestore,
    doc,
    onSnapshot,
    collection,
    setDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "xxx",
    authDomain: "web3-domain-gateway.firebaseapp.com",
    projectId: "web3-domain-gateway",
    storageBucket: "web3-domain-gateway.firebasestorage.app",
    messagingSenderId: "315563254318",
    appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 KRİTİK FIX: Pi artık garanti global */
const PiSDK = window.Pi;

PiSDK.init({
    version: "2.0",
    sandbox: true
});

let isUserAuthenticated = false;
let paymentInProgress = false;

/* ---------------- DOMAIN ---------------- */
const domains = [
    { name:'test-domain', img:'assets/test.jpeg', price:10 },
    { name:'etstur.pi', img:'assets/etstur.jpeg', price:250 }
];

/* ---------------- PAYMENT FIX CORE ---------------- */

async function handleServerSidePayment(paymentId, action, txid) {
    try {
        const response = await fetch('/api/approve', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ paymentId, action, txid })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || "Server error");
        }

        return data;

    } catch (err) {
        console.error("Server payment error:", err);
        throw err;
    }
}

/* ---------------- LOGIN ---------------- */

window.loginWithPi = function () {

    PiSDK.authenticate(['username','payments'], async function(){})
    .then(async (auth) => {

        isUserAuthenticated = true;

        document.getElementById('user-status').innerText =
            "Bağlı: @" + auth.user.username;

        document.getElementById('auth-btn').style.display = "none";

        render();

    })
    .catch(err => {
        alert("Login hata: " + err.message);
    });

};

/* ---------------- PAYMENT FIXED ---------------- */

window.startPurchase = async function(domain, amount) {

    if (!isUserAuthenticated) {
        alert("Önce giriş yap");
        return;
    }

    if (paymentInProgress) {
        alert("Ödeme devam ediyor");
        return;
    }

    paymentInProgress = true;

    try {

        PiSDK.createPayment(
            {
                amount: Number(amount),
                memo: "Domain: " + domain,
                metadata: { domain }
            },
            {

                onReadyForServerApproval: async function(paymentId) {
                    try {
                        await handleServerSidePayment(paymentId, "approve", null);
                    } catch (e) {
                        console.error(e);
                    }
                },

                onReadyForServerCompletion: async function(paymentId, txid) {
                    try {

                        await handleServerSidePayment(paymentId, "complete", txid);

                        await setDoc(doc(db,"domains",domain), {
                            sold:true,
                            txid,
                            soldAt:new Date().toISOString()
                        }, { merge:true });

                        alert("Ödeme başarılı!");

                    } catch (err) {
                        console.error(err);
                        alert("Ödeme tamamlanamadı");
                    } finally {
                        paymentInProgress = false;
                        render();
                    }
                },

                onCancel: function () {
                    paymentInProgress = false;
                    alert("İptal edildi");
                    render();
                },

                onError: function (err) {
                    paymentInProgress = false;
                    alert("Hata: " + err.message);
                    render();
                }

            }
        );

    } catch (err) {
        paymentInProgress = false;
        alert("Payment crash: " + err.message);
    }
};

/* ---------------- UI ---------------- */

function render() {
    const list = document.getElementById("domain-list");
    list.innerHTML = "";

    domains.forEach(d => {

        const card = document.createElement("div");
        card.className = "domain-card";

        card.innerHTML = `
            <img src="${d.img}" class="domain-img">
            <strong>${d.name}</strong>
            <span>${d.price} Pi</span>
        `;

        const btn = document.createElement("button");
        btn.className = "btn-buy";
        btn.innerText = "Satın Al";
        btn.onclick = () => startPurchase(d.name, d.price);

        card.appendChild(btn);
        list.appendChild(card);
    });
}

render();

</script>

</body>
</html>
