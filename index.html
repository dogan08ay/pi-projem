<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Domain Gateway</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
.card { background:#1e293b; padding:20px; margin:10px; border-radius:12px; }
button { cursor:pointer; }
.pi-btn { background:#0052FF; color:white; padding:10px 20px; border-radius:20px; border:none; }
.btn-buy { background:#6366f1; color:white; padding:8px; border:none; border-radius:8px; width:100%; }
.domain-card { background:#334155; padding:10px; margin:10px; border-radius:10px; }
</style>
</head>

<body>

<div class="card">
<h2>Web3 Domain</h2>
<p id="user-status">Bağlı değil</p>
<button id="auth-btn" class="pi-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
</div>

<div class="card">
<h3>Domainler</h3>
<div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "xxx",
authDomain: "xxx",
projectId: "xxx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= PI INIT ================= */

if (typeof Pi === "undefined") {
alert("Pi Browser dışında çalışmaz");
throw new Error("Pi SDK yok");
}

Pi.init({ version: "2.0", sandbox: true });

let user = null;
let paymentLock = false;

/* ================= DOMAINS ================= */

const domains = [
{ name: "test-domain", price: 10 },
{ name: "etstur.pi", price: 250 }
];

/* ================= LOGIN ================= */

window.loginWithPi = async function () {
try {

const auth = await Pi.authenticate(["username","payments"]);

user = auth.user;

document.getElementById("user-status").innerText =
"Bağlı: @" + user.username;

document.getElementById("auth-btn").style.display = "none";

loadDomains();

} catch (e) {
alert("Login hata: " + (e.message || e));
}
};

/* ================= LOAD DOMAINS ================= */

function loadDomains() {

const list = document.getElementById("list");
list.innerHTML = "";

domains.forEach(d => {

const div = document.createElement("div");
div.className = "domain-card";

div.innerHTML = `
<b>${d.name}</b><br>
<span>${d.price} PI</span>
`;

const btn = document.createElement("button");
btn.className = "btn-buy";
btn.innerText = "Satın Al";

btn.onclick = () => buy(d);

div.appendChild(btn);
list.appendChild(div);

});

}

/* ================= PAYMENT ================= */

async function buy(domain) {

if (!user) return alert("Login ol");

if (paymentLock) return;

paymentLock = true;

Pi.createPayment(
{
amount: domain.price,
memo: domain.name,
metadata: { domain: domain.name }
},
{
onReadyForServerApproval: async function (paymentId) {
await fetch("/api/approve", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
paymentId,
action: "approve"
})
});
},

onReadyForServerCompletion: async function (paymentId, txid) {

await fetch("/api/approve", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
paymentId,
action: "complete",
txid
})
});

alert("Satın alma tamamlandı!");
paymentLock = false;
loadDomains();
},

onCancel: function () {
paymentLock = false;
},

onError: function (err) {
paymentLock = false;
alert(err);
}
}
);

}

</script>

</body>
</html>
