<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f7f9fc; }
        .box { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { padding: 15px 30px; font-size: 16px; font-weight: bold; background-color: #673ab7; color: white; border: none; border-radius: 25px; cursor: pointer; width: 100%; }
        #status { margin-top: 20px; font-weight: bold; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Web3 Domain Gateway</h2>
        <p>Pi Alan Adı Uygulama Portalı</p>
        <button id="login-btn" class="btn">Pi Hesabı ile Bağlan</button>
        <div id="status"></div>
    </div>

    <script>
        // Pi SDK hazır olduğunda çalışacak ana fonksiyon
        window.onload = function() {
            try {
                // Kodun Pi Browser ile güvenli konuşması için API Key entegrasyonu
                Pi.init({ 
                    version: "2.0", 
                    sandbox: true,
                    apiKey: "ghb5xxx8hxyw5awngiqafh6scdrhpbnvou2iyzk2jzc5rtdkfowa2xghmoig5s1p" 
                });
                document.getElementById('status').innerText = "Pi SDK Başarıyla Yüklendi.";
            } catch(e) {
                document.getElementById('status').innerText = "Pi SDK Başlatılamadı: " + e.message;
            }
        };

        document.getElementById('login-btn').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Bağlantı isteği gönderiliyor... Lütfen bekleyin...";
            
            try {
                const scopes = ['username'];
                const authResult = await Pi.authenticate(scopes, function(payment) {
                    console.log("Eksik ödeme:", payment);
                });
                
                statusDiv.style.color = "green";
                statusDiv.innerHTML = `🎉 Başarılı!<br>Kullanıcı: @${authResult.user.username}`;
                document.getElementById('login-btn').style.display = 'none';
            } catch (error) {
                console.error(error);
                statusDiv.style.color = "red";
                statusDiv.innerHTML = "❌ Hata Oluştu:<br>" + JSON.stringify(error);
            }
        });
    </script>
</body>
</html>
