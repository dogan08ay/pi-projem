<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import {
    getFirestore,
    doc,
    onSnapshot,
    setDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "xxx",
    authDomain: "web3-domain-gateway.firebaseapp.com",
    projectId: "web3-domain-gateway",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   🔥 FIX: Pi INIT GUARANTEED
========================= */
function waitForPiReady() {
    return new Promise((resolve) => {
        const check = setInterval(() => {
            if (window.Pi) {
                clearInterval(check);
                try {
                    Pi.init({ version: "2.0", sandbox: true });
                } catch (e) {}
                resolve(true);
            }
        }, 50);
    });
}

waitForPiReady();

/* =========================
   STATE
========================= */
let currentUser = null;
let heartbeat = null;

/* =========================
   DATE KEY
========================= */
function getTodayId() {
    return new Date().toISOString().split("T")[0];
}

/* =========================
   LOGIN (FIXED)
========================= */
window.loginWithPi = async function () {

    await waitForPiReady();

    Pi.authenticate(['username','payments'])
        .then(async (auth) => {

            currentUser = auth.user.username;

            const today = getTodayId();

            const ref = doc(db, "daily_stats", today);
            const snap = await getDoc(ref);

            let data = snap.exists() ? snap.data() : { users: {} };

            data.users[currentUser] = true;

            await setDoc(ref, data);

            document.getElementById("user-status").innerText =
                "Bağlı: @" + currentUser;

            document.getElementById("auth-btn").style.display = "none";

            startHeartbeat();
            startAdminListener(today);

        })
        .catch(err => {
            console.error(err);
            alert("Pi Login Hatası: " + err.message);
        });
};

/* =========================
   ONLINE HEARTBEAT
========================= */
function startHeartbeat() {

    if (heartbeat) clearInterval(heartbeat);

    heartbeat = setInterval(() => {

        if (!currentUser) return;

        setDoc(doc(db, "active_users", currentUser), {
            lastSeen: Date.now()
        });

    }, 15000);
}

/* =========================
   ADMIN PANEL (TODAY UNIQUE USERS)
========================= */
function startAdminListener(today) {

    const ref = doc(db, "daily_stats", today);

    onSnapshot(ref, (snap) => {

        const data = snap.data() || {};
        const users = data.users || {};

        const count = Object.keys(users).length;

        document.getElementById("log-list").innerHTML =
            "Bugün giriş yapan farklı kullanıcı: <b>" + count + "</b>";
    });
}
</script>
