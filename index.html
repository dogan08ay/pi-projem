<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --text:#f8fafc; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; display:flex; justify-content:center; }
        .container { max-width:600px; width:100%; text-align:center; }
        .card { background:var(--card); padding:25px; border-radius:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom:20px; }
        .domain-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px; }
        .domain-card { background:#334155; padding:20px; border-radius:12px; border:1px solid #475569; display:flex; flex-direction:column; align-items:center; }
        .domain-img { width:100%; height:120px; margin-bottom:10px; border-radius:12px; object-fit:contain; background-color:#334155; padding:5px; }
        .btn-buy { background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold; width:100%; }
        .pi-btn { background:#0052FF; color:#ffffff; padding:12px 30px; border-radius:50px; font-weight:800; cursor:pointer; }
        .footer-section { margin-top:30px; padding:20px; color:#94a3b8; font-size:0.9em; border-top:1px solid #334155; }
        .footer-section a { color:#38bdf8; text-decoration:none; }
        .footer-divider { margin:0 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count">Aktif Kullanıcı: 0</p>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card" id="admin-panel" style="display:none; text-align:left;">
        <h3 style="color:#6366f1;">🛠 Admin Paneli</h3>
        <div id="log-list" style="font-size:0.85em; max-height:150px; overflow-y:auto;"></div>
    </div>

    <div class="card">
        <div style="font-weight:800; font-size:1.2em; margin-bottom:15px;">Satıştaki Domainler</div>
        <div class="domain-grid" id="domain-list"></div>
    </div>

    <div class="footer-section">
        <div>Sorularınız için: <a href="mailto:doganay08@hotmail.com">📩 doganay08@hotmail.com</a></div>
        <div style="margin-top:8px;"><a href="https://t.me/+5jZi9vrcNMM2NGVk">💬 Telegram Grubumuz</a></div>
        <div style="margin-top:15px;"><a href="privacy.html">Gizlilik</a><span class="footer-divider">|</span><a href="terms.html">Şartlar</a></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, collection } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "xxx", projectId: "web3-domain-gateway" }));
    let domainData = {}, isAuth = false, currentUser = null;
    const domains = [
        { name:'test-domain', img:'assets/test.jpeg', price:10 },
        { name:'etstur.pi', img:'assets/etstur.jpeg', price:250 },
        { name:'eminevim.pi', img:'assets/eminevim.jpeg', price:150 },
        { name:'fuzulev.pi', img:'assets/fuzulev.jpeg', price:300 },
        { name:'fibabank.pi', img:'assets/fibabank.jpeg', price:500 },
        { name:'sekerbank.pi', img:'assets/sekerbank.jpeg', price:600 },
        { name:'doganay.pi', img:'assets/doganay.jpeg', price:150 }
    ];

    window.addEventListener("load", () => { if(window.Pi) Pi.init({ version: "2.0", sandbox: true }); });

    // Dinleyiciler
    domains.forEach(d => {
        onSnapshot(doc(db, "domains", d.name), (snap) => {
            domainData[d.name] = snap.exists() ? snap.data() : { sold:false, price:d.price };
            window.renderDomains();
        });
    });

    onSnapshot(collection(db, "active_users"), (snap) => {
        let c = 0; snap.forEach(d => { if (Date.now() - d.data().lastSeen < 30000) c++; });
        document.getElementById("online-count").innerText = "Aktif Kullanıcı: " + c;
    });

    window.renderDomains = function() {
        const list = document.getElementById("domain-list");
        if (!list || !isAuth) return;
        list.innerHTML = '';
        domains.forEach(d => {
            const data = domainData[d.name] || { sold:false, price:d.price };
            const card = document.createElement('div');
            card.className = 'domain-card';
            card.innerHTML = `<img src="${d.img}" class="domain-img"><strong>${d.name}</strong><br><span>${data.sold ? 'SATILDI' : data.price + ' Pi'}</span>`;
            if (!data.sold) {
                const btn = document.createElement('button');
                btn.className = 'btn-buy';
                btn.innerText = 'Satın Al';
                btn.onclick = () => window.startPurchase(d.name, data.price);
                card.appendChild(btn);
            }
            list.appendChild(card);
        });
    };

    window.loginWithPi = () => {
        Pi.authenticate(['username','payments'], {}).then(auth => {
            isAuth = true;
            currentUser = auth.user.username;
            document.getElementById("auth-btn").style.display = "none";
            document.getElementById("user-status").innerText = "Bağlı: @" + currentUser;
            if (currentUser === "doganay0808") {
                document.getElementById("admin-panel").style.display = "block";
                onSnapshot(doc(db, "daily_users", new Date().toISOString().split("T")[0]), (snap) => {
                    let h = ""; Object.keys(snap.data()?.users || {}).forEach(u => h += `<div>@${u}</div>`);
                    document.getElementById("log-list").innerHTML = h;
                });
            }
            window.renderDomains();
        }).catch(e => alert("Auth hatası: " + e.message));
    };

    window.startPurchase = (name, price) => {
        Pi.createPayment({ amount: price, memo: "Domain: " + name, metadata: { domain: name } }, {
            onReadyForServerApproval: (id) => Pi.approvePayment(id),
            onReadyForServerCompletion: (id, txid) => {
                setDoc(doc(db, "domains", name), { sold: true, txid }, { merge: true });
                alert("Satın alma başarılı!");
            },
            onCancel: () => alert("İptal edildi."),
            onError: (e) => alert("Ödeme hatası: " + e.message)
        });
    };
</script>
</body>
</html>
