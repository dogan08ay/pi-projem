<script type="module">
      
import {
initializeApp
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot,
collection,
setDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"s3ddhcea9xae0qieikgjy9zw9tduemnraoucjrr9iqe87pduhczmd95kq8n3aai1",

authDomain:"web3-domain-gateway.firebaseapp.com",

projectId:"web3-domain-gateway",

storageBucket:"web3-domain-gateway.firebasestorage.app",

messagingSenderId:"315563254318",

appId:"1:315563254318:web:12f2f3f340bb69606df5bf"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

Pi.init({
version:"2.0",
sandbox:true
});

async function clearPendingPayments(){

    try{

        const payments =
            await Pi.getIncompleteServerPayments();

        if(payments && payments.length > 0){

            for(const payment of payments){

                try{

                    await payment.complete();

                    console.log(
                        "Pending payment temizlendi:",
                        payment.identifier
                    );

                }catch(err){

                    console.error(err);

                }

            }

        }

    }catch(err){

        console.error(
            "Pending payment kontrol hatası:",
            err
        );

    }

}

let isUserAuthenticated = false;

let paymentInProgress = false;

let domainData = {};

const domains = [

{
name:'test-domain',
img:'assets/test.jpeg',
price:10
},

{
name:'etstur.pi',
img:'assets/etstur.jpeg',
price:250
},

{
name:'eminevim.pi',
img:'assets/eminevim.jpeg',
price:150
},

{
name:'fuzulev.pi',
img:'assets/fuzulev.jpeg',
price:300
},

{
name:'fibabank.pi',
img:'assets/fibabank.jpeg',
price:500
},

{
name:'sekerbank.pi',
img:'assets/sekerbank.jpeg',
price:600
},

{
name:'doganay.pi',
img:'assets/doganay.jpeg',
price:150
}

];

onSnapshot(

collection(db,"online_users"),

(snapshot)=>{

const countElement =
document.getElementById('online-count');

if(!countElement) return;

const now = Date.now();

const fiveMinutesAgo =
now - (5 * 60 * 1000);

let activeCount = 0;

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

if(data.lastSeen){

const lastSeenTime =
typeof data.lastSeen === "number"
? data.lastSeen
: new Date(data.lastSeen).getTime();

if(lastSeenTime > fiveMinutesAgo){

activeCount++;

}

}

});

countElement.innerText =
"Aktif Kullanıcı: " + activeCount;

}

);

function render(){

const list =
document.getElementById('domain-list');

if(!list) return;

if(!isUserAuthenticated){

return;

}

list.innerHTML = '';

domains.forEach(d=>{

const data = domainData[d.name] || {
sold:false,
price:d.price
};

const isSold = data.sold === true;

const price =
data.price !== undefined
? data.price
: d.price;

const card =
document.createElement('div');

card.className = 'domain-card';

card.innerHTML = `

<img src="${d.img}" class="domain-img">

<strong>${d.name}</strong>

<br>

<span>

${isSold
? `SATILDI (${price} Pi)`
: price + ' Pi'}

</span>

`;

if(!isSold){

const btn =
document.createElement('button');

btn.className = 'btn-buy';

btn.innerText =
paymentInProgress
? 'İşlem Bekleniyor'
: 'Satın Al';

btn.disabled = paymentInProgress;

btn.onclick =
()=>startPurchase(d.name,price);

card.appendChild(btn);

}

list.appendChild(card);

});

}

domains.forEach(d=>{

onSnapshot(

doc(db,"domains",d.name),

(snap)=>{

if(snap.exists()){

domainData[d.name] = snap.data();

render();

}

}

);

});

window.loginWithPi = function(){

Pi.authenticate(
['username','payments'],
()=>{}
)

.then(async(auth)=>{

await clearPendingPayments();

isUserAuthenticated = true;

document.getElementById('user-status').innerText =
"Bağlı: @" + auth.user.username;

document.getElementById('auth-btn').style.display =
'none';

render();

await setDoc(

doc(db,"online_users",auth.user.username),

{
lastSeen:Date.now()
},

{
merge:true
}

);

setInterval(async()=>{

if(isUserAuthenticated){

await setDoc(

doc(db,"online_users",auth.user.username),

{
lastSeen:Date.now()
},

{
merge:true
}

);

}

},30000);

window.addEventListener(

"beforeunload",

async()=>{

await deleteDoc(

doc(
db,
"online_users",
auth.user.username
)

);

}

);

})

.catch(err=>{

alert(
"Giriş başarısız: " + err.message
);

});

};

window.startPurchase = async function(domain,amount){

if(!isUserAuthenticated){

alert("Önce giriş yapın");

return;

}

if(paymentInProgress){

alert("Bekleyen ödeme işlemi var");

return;

}

const selectedDomain =
domainData[domain];

if(selectedDomain?.sold === true){

alert("Bu domain satılmış");

return;

}

paymentInProgress = true;

render();

try{

Pi.createPayment(

{

amount:Number(amount),

memo:"Domain: " + domain,

metadata:{
domain:domain
}

},

{

onReadyForServerApproval:
function(paymentId){

console.log(
"Approve:",
paymentId
);

},

onReadyForServerCompletion:
async function(paymentId,txid){

try{

await setDoc(

doc(
db,
"domains",
domain
),

{

sold:true,

txid:txid,

soldAt:
new Date()
.toISOString()

},

{
merge:true
}

);

paymentInProgress = false;

render();

alert(
"✅ Satın alma başarıyla tamamlandı!"
);

}catch(err){

paymentInProgress = false;

render();

alert(
"Firestore hatası: " +
err.message
);

}

},

onCancel:function(){

paymentInProgress = false;

render();

alert(
"Ödeme iptal edildi"
);

},

onError:function(err){

paymentInProgress = false;

render();

alert(
"Ödeme hatası: " +
err.message
);

}

}

);

}catch(err){

paymentInProgress = false;

render();

alert(err.message);

}

};

</script>
