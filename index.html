<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg:#0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color:var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width:100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .domain-img { width:100%; height: 120px; margin-bottom: 10px; border-radius: 12px; object-fit: contain; background-color: #334155; padding: 5px; }
        .btn-buy { background: var(--accent); color:white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width:100%; }
        .pi-btn { background: #0052FF; color:#ffffff; padding: 12px 30px; border-radius: 50px; font-weight: 800; font-size: 0.95em; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
        .footer-section { margin-top: 30px; padding: 20px; color: #94a3b8; font-size: 0.9em; text-align: center; border-top: 1px solid #334155; }
        .footer-section a { color: #38bdf8; text-decoration: none; display: inline-block; margin: 5px 0; }
        .section-title-box { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); color:#1e293b; padding: 12px 28px; border-radius: 16px; border: 3px solid #f59e0b; font-weight: 800; display: inline-block; margin: 5px auto 25px auto; }
        .auth-warning { color:#1e293b; padding: 24px; border: 4px solid #f59e0b; border-radius: 24px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
        .inline-btn-highlight { background: #0052ff; color:#ffffff; padding: 8px 26px; border-radius: 50px; font-weight: 800; display: inline-block; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count" style="color:#60a5fa;font-size:0.9em;margin-bottom:15px;font-weight:600;">Sisteme Giriş Yapan Kullanıcı: 0</p>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card" id="admin-panel" style="display:none;border:2px solid #6366f1;text-align:left;">
        <h3 style="color:#6366f1;margin-top:0;">🛠 Admin Paneli</h3>
        <div id="log-list" style="font-size:0.85em;max-height:150px;overflow-y:auto;"></div>
    </div>

    <div class="card">
        <div class="section-title-box">Satıştaki Domainler</div>
        <div class="domain-grid" id="domain-list">
            <div class="auth-warning" style="grid-column:span 2;">
                <div class="lock-message">🔒 Erişim sağlamak için lütfen yukarıdaki<br>
                <span class="inline-btn-highlight">Pi ile Bağlan</span><br>butonunu kullanınız.</div>
            </div>
        </div>
    </div>

    <div class="footer-section">
        <div>Sorularınız için bize ulaşın: <br>
            <a href="mailto:doganay08@hotmail.com">📧 doganay08@hotmail.com</a>
        </div>
        <div><a href="https://t.me/+5jZi9vrcNMM2NGVk" target="_blank">💬 Telegram Grubumuz</a></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc, collection, setDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A", authDomain: "web3-domain-gateway.firebaseapp.com", projectId: "web3-domain-gateway", storageBucket: "web3-domain-gateway.firebasestorage.app", messagingSenderId: "315563254318", appId: "1:315563254318:web:12f2f3f340bb69606df5bf" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ÖDEME HATA AYIKLAMA EKLEMESİ
window.startPurchase = function(domain, amount) {
    if (!isUserAuthenticated) { alert("Önce giriş yapın"); return; }
    
    // Pi SDK'dan bekleyen ödeme var mı kontrolü
    Pi.createPayment({
        amount: Number(amount),
        memo: "Domain: " + domain,
        metadata: { domain: domain }
    }, {
        onReadyForServerApproval: async (paymentId) => {
            console.log("Onay bekleniyor:", paymentId);
            // Burada fetch işleminiz hata verirse "pending" kalır.
            // Eğer hata alırsanız sunucunuza giden isteği kontrol edin.
        },
        onReadyForServerCompletion: async (paymentId, txid) => {
            await updateDoc(doc(db, "domains", domain), { sold:true });
            alert("✅ Ödeme başarılı!");
        },
        onCancel: () => alert("Ödeme iptal edildi."),
        onError: (err) => {
            console.error(err);
            // Eğer "pending payment" hatası alırsanız, Pi Browser'ı tamamen kapatıp açın.
            alert("Ödeme hatası: " + err.message + ". Not: Eğer 'Pending Payment' hatası alıyorsanız, önceki ödeme hala açık demektir.");
        }
    });
};

// Diğer fonksiyonlarınız (loginWithPi, updateCounter vb.) aynı şekilde buraya eklenmelidir...
// (Not: Kodunuzun devamını bozmamak adına orijinal fonksiyonlarınızı aynen koruyarak eklemeye devam edebilirsiniz.)
</script>
</body>
</html>
