<!DOCTYPE html>
<html lang="tr">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Web3 Domain Gateway</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        :root {
            --bg:#0f172a;
            --card:#1e293b;
            --accent:#6366f1;
            --text:#f8fafc;
        }

        body {
            font-family:'Segoe UI',sans-serif;
            background:var(--bg);
            color:var(--text);
            margin:0;
            padding:20px;
            display:flex;
            justify-content:center;
        }

        .container {
            max-width:600px;
            width:100%;
            text-align:center;
        }

        .card {
            background:var(--card);
            padding:25px;
            border-radius:20px;
            box-shadow:0 10px 15px -3px rgba(0,0,0,0.3);
            margin-bottom:20px;
        }

        .domain-grid {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
            margin-top:20px;
        }

        .domain-card {
            background:#334155;
            padding:20px;
            border-radius:12px;
            border:1px solid #475569;
            transition:0.3s;
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        .domain-img {
            width:100%;
            height:120px;
            margin-bottom:10px;
            border-radius:12px;
            object-fit:contain;
            background-color:#334155;
            padding:5px;
        }

        .btn-buy {
            background:var(--accent);
            color:white;
            border:none;
            padding:8px 16px;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
            font-weight:bold;
            width:100%;
        }

        .btn-buy:disabled {
            opacity:0.5;
            cursor:not-allowed;
        }

        .pi-btn {
            background:#0052FF;
            color:#ffffff;
            padding:12px 30px;
            border-radius:50px;
            font-weight:800;
            font-size:0.95em;
            border:1px solid rgba(255,255,255,0.2);
            cursor:pointer;
        }

        .section-title-box {
            background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);
            color:#1e293b;
            padding:12px 28px;
            border-radius:16px;
            border:3px solid #f59e0b;
            font-size:1.15em;
            font-weight:800;
            display:inline-block;
            margin:5px auto 25px auto;
            box-shadow:0 6px 16px rgba(245,158,11,0.2);
        }

        .auth-warning {
            color:#1e293b;
            padding:24px;
            border:4px solid #f59e0b;
            border-radius:24px;
            background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);
            text-align:center;
            box-shadow:0 12px 28px rgba(245,158,11,0.25);
        }

        .auth-title-box {
            background:#1e293b;
            color:#ffffff;
            padding:26px 20px;
            border-radius:18px;
            border:1.5px solid rgba(245,158,11,0.4);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:14px;
        }

        .lock-message {
            font-size:1.05em;
            font-weight:700;
            line-height:1.8;
            color:#f8fafc;
        }

        .inline-btn-highlight {
            background:#0052ff;
            color:#ffffff;
            padding:8px 26px;
            border-radius:50px;
            font-weight:800;
            display:inline-block;
            margin:10px 0;
            border:1px solid rgba(255,255,255,0.2);
        }

        .footer-section {
            margin-top:30px;
            padding:20px;
            color:#94a3b8;
            font-size:0.9em;
            text-align:center;
            border-top:1px solid #334155;
        }

        .footer-section a {
            color:#38bdf8;
            text-decoration:none;
        }

        .footer-divider {
            margin:0 10px;
            color:#475569;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- AUTH CARD -->
    <div class="card">

        <h1>Web3 Domain</h1>

        <p id="online-count"
           style="color:#60a5fa;font-size:0.9em;margin-bottom:15px;font-weight:600;">
            Aktif Kullanıcı: 0
        </p>

        <p id="user-status">Lütfen önce bağlanın.</p>

        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">
            Pi ile Bağlan
        </button>

    </div>

    <!-- ✅ ADMIN PANEL (GERİ EKLENDİ) -->
    <div class="card" id="admin-panel"
         style="display:none;border:2px solid #6366f1;text-align:left;">

        <h3 style="color:#6366f1;margin-top:0;">
            🛠 Admin Paneli
        </h3>

        <div id="log-list"
             style="font-size:0.85em;max-height:150px;overflow-y:auto;">
        </div>

    </div>

    <!-- DOMAIN LIST -->
    <div class="card">

        <div class="section-title-box">Satıştaki Domainler</div>

        <div class="domain-grid" id="domain-list">

            <div class="auth-warning" style="grid-column:span 2;">
                <div class="auth-title-box">
                    <div class="lock-message">
                        🔒 Erişim sağlamak için lütfen yukarıdaki
                        <br>
                        <span class="inline-btn-highlight">Pi ile Bağlan</span>
                        <br>
                        butonunu kullanınız.
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- ✅ FOOTER (GERİ EKLENDİ) -->
    <div class="footer-section">

        <div>
            Sorularınız için bize ulaşın:
            <a href="mailto:doganay08@hotmail.com">
                📩 doganay08@hotmail.com
            </a>
        </div>

        <div style="margin-top:8px;">
            <a href="https://t.me/+5jZi9vrcNMM2NGVk" target="_blank">
                💬 Telegram Grubumuz
            </a>
        </div>

        <div style="margin-top:15px;">
            <a href="privacy.html">Gizlilik Politikası</a>
            <span class="footer-divider">|</span>
            <a href="terms.html">Kullanım Şartları</a>
        </div>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import {
    getFirestore,
    doc,
    onSnapshot,
    collection,
    setDoc,
    deleteDoc,
    getDocs,
    query,
    orderBy,
    limit
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "s3ddhcea9xae0qieikgjy9zw9tduemnraoucjrr9iqe87pduhczmd95kq8n3aai1",
    authDomain: "web3-domain-gateway.firebaseapp.com",
    projectId: "web3-domain-gateway",
    storageBucket: "web3-domain-gateway.firebasestorage.app",
    messagingSenderId: "315563254318",
    appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

Pi.init({ version:"2.0", sandbox:true });

let isUserAuthenticated = false;
let paymentInProgress = false;
let domainData = {};

const domains = [
    { name:'test-domain', img:'assets/test.jpeg', price:10 },
    { name:'etstur.pi', img:'assets/etstur.jpeg', price:250 },
    { name:'eminevim.pi', img:'assets/eminevim.jpeg', price:150 },
    { name:'fuzulev.pi', img:'assets/fuzulev.jpeg', price:300 },
    { name:'fibabank.pi', img:'assets/fibabank.jpeg', price:500 },
    { name:'sekerbank.pi', img:'assets/sekerbank.jpeg', price:600 },
    { name:'doganay.pi', img:'assets/doganay.jpeg', price:150 }
];

async function clearPendingPayments() {
    try {
        const payments = await Pi.getIncompleteServerPayments();
        if (!payments) return;

        for (const payment of payments) {
            try {
                await handleServerSidePayment(
                    payment.identifier,
                    'complete',
                    payment.transaction?.txid || null
                );
            } catch (err) {
                console.error(err);
            }
        }
    } catch (err) {
        console.error(err);
    }
}

/* snapshot */
domains.forEach(d => {
    onSnapshot(doc(db, "domains", d.name), (snap) => {
        if (snap.exists()) {
            domainData[d.name] = snap.data();
        } else {
            domainData[d.name] = { sold:false, price:d.price };
        }
        render();
    });
});

function render() {

    const list = document.getElementById('domain-list');
    if (!list || !isUserAuthenticated) return;

    list.innerHTML = '';

    domains.forEach(d => {

        const data = domainData[d.name] || { sold:false, price:d.price };
        const isSold = data.sold === true;
        const price = data.price ?? d.price;

        const card = document.createElement('div');
        card.className = 'domain-card';

        card.innerHTML = `
            <img src="${d.img}" class="domain-img">
            <strong>${d.name}</strong>
            <br>
            <span>${isSold ? `SATILDI (${price} Pi)` : price + ' Pi'}</span>
        `;

        if (!isSold) {
            const btn = document.createElement('button');
            btn.className = 'btn-buy';
            btn.innerText = paymentInProgress ? 'İşlem Bekleniyor' : 'Satın Al';
            btn.disabled = paymentInProgress;
            btn.onclick = () => startPurchase(d.name, price);
            card.appendChild(btn);
        }

        list.appendChild(card);
    });
}

window.loginWithPi = function () {

    Pi.authenticate(['username','payments'], () => {})
    .then(async (auth) => {

        await clearPendingPayments();

        isUserAuthenticated = true;

        document.getElementById('user-status').innerText =
            "Bağlı: @" + auth.user.username;

        document.getElementById('auth-btn').style.display = 'none';

        render();

        /* ADMIN PANEL AÇ */
       // ADMIN LOG VERİLERİNİ ÇEK (FIX)
const snap = await getDocs(
    query(
        collection(db, "daily_logs"),
        orderBy("timestamp", "desc"),
        limit(15)
    )
);

let logs = "";

snap.forEach(d => {

    const data = d.data();

    if (data.date && !data.date.includes("NaN")) {

        logs += `
            <div style="
                padding:8px;
                border-bottom:1px solid #334155;
                display:flex;
                justify-content:space-between;
            ">
                <span style="color:#60a5fa;">
                    ${data.date}
                </span>

                <b style="color:#f8fafc;">
                    @${data.username}
                </b>
            </div>
        `;
    }
});

document.getElementById('log-list').innerHTML = logs;

    })
    .catch(err => {
        alert("Giriş başarısız: " + err.message);
    });
};

window.startPurchase = async function(domain, amount) {

    if (!isUserAuthenticated || paymentInProgress) return;

    const selectedDomain = domainData[domain];
    if (selectedDomain?.sold) return;

    paymentInProgress = true;
    render();

    Pi.createPayment(
        {
            amount:Number(amount),
            memo:"Domain: " + domain,
            metadata:{ domain }
        },
        {
            onReadyForServerApproval: async function(paymentId) {
                await handleServerSidePayment(paymentId,'approve',null);
            },

            onReadyForServerCompletion: async function(paymentId, txid) {

                await setDoc(doc(db,"domains",domain),{
                    sold:true,
                    txid,
                    soldAt:new Date().toISOString()
                },{ merge:true });

                await handleServerSidePayment(paymentId,'complete',txid);

                paymentInProgress = false;
                render();
                alert("Satın alma tamamlandı!");
            },

            onCancel: function () {
                paymentInProgress = false;
                render();
            },

            onError: function () {
                paymentInProgress = false;
                render();
            }
        }
    );
};

async function handleServerSidePayment(paymentId, action, txid) {

    const response = await fetch('/api/approve', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body:JSON.stringify({ paymentId, action, txid })
    });

    if (!response.ok) throw new Error("Backend bağlantı hatası");

    return await response.json();
}

</script>

</body>
</html>
