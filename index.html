<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Firebase Yapılandırmanı Buraya Koy
        const firebaseConfig = { apiKey: "xxx", authDomain: "web3-domain-gateway.firebaseapp.com", projectId: "web3-domain-gateway" };
        const db = getFirestore(initializeApp(firebaseConfig));

        let isAuth = false;

        // Pi SDK Başlatma
        window.addEventListener("load", () => {
            if (window.Pi) Pi.init({ version: "2.0", sandbox: true });
        });

        // 1. STANDART AUTH (Hata veren this. fonksiyonlarını kaldırdık)
        window.loginWithPi = function() {
            Pi.authenticate(['username', 'payments'], {
                onIncompletePaymentFound: function(payment) {
                    console.log("Bekleyen ödeme bulundu, iptal ediliyor:", payment.identifier);
                    fetch('/api/approve', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ paymentId: payment.identifier, action: 'cancel' }) 
                    }).then(() => location.reload());
                }
            }).then(auth => {
                isAuth = true;
                alert("Hoş geldin @" + auth.user.username);
                window.location.reload(); // Temiz bir başlangıç için
            }).catch(err => {
                alert("Giriş hatası: " + err.message);
            });
        };

        // 2. GÜVENLİ ÖDEME
        window.startPurchase = async function(domain, amount) {
            try {
                await Pi.createPayment({ 
                    amount: Number(amount), 
                    memo: domain, 
                    metadata: { domain } 
                }, {
                    onReadyForServerApproval: async (id) => {
                        await fetch('/api/approve', { 
                            method: 'POST', 
                            headers: {'Content-Type': 'application/json'}, 
                            body: JSON.stringify({ paymentId: id, action: 'approve' }) 
                        });
                    },
                    onReadyForServerCompletion: async (id, txid) => {
                        await setDoc(doc(db, "domains", domain), { sold: true, txid }, { merge: true });
                        alert("Satın alma başarılı!");
                    },
                    onError: (err) => { alert("Ödeme Hatası: " + (err.message || err)); }
                });
            } catch (err) { alert("Sistem hatası: " + err.message); }
        };
    </script>
</head>
<body>
    <button class="pi-btn" onclick="window.loginWithPi()">Pi ile Bağlan</button>
</body>
</html>
