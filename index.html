<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Alan Adı Uygulaması</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #f7f9fc;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { color: #673ab7; margin-bottom: 10px; }
        p { color: #666; font-size: 16px; margin-bottom: 30px; }
        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #673ab7;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #512da8; }
        #user-info { margin-top: 25px; font-size: 18px; color: #2e7d32; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pi Uygulamama Hoş Geldiniz</h1>
        <p>Açık artırmadan kazanılan alan adı projesi</p>
        
        <button id="login-btn" class="btn">Pi Hesabı ile Bağlan</button>
        <div id="user-info"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
