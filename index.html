<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #6366f1;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .domain-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .domain-card {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #475569;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .domain-img {
            width: 100%;
            height: 120px;
            margin-bottom: 10px;
            border-radius: 12px;
            object-fit: contain;
            background-color: #334155;
            padding: 5px;
        }

        .btn-buy {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            width: 100%;
        }

        .pi-btn {
            background: #0052FF;
            color: #ffffff;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.95em;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .footer {
            font-size: 0.8em;
            color: #94a3b8;
            margin-top: 20px;
            line-height: 1.6;
        }

        .section-title-box {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #1e293b;
            padding: 12px 28px;
            border-radius: 16px;
            border: 3px solid #f59e0b;
            font-size: 1.15em;
            font-weight: 800;
            display: inline-block;
            margin: 5px auto 25px auto;
        }

        .auth-warning {
            color: #1e293b;
            padding: 24px;
            border: 4px solid #f59e0b;
            border-radius: 24px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            text-align: center;
        }

        .auth-title-box {
            background: #1e293b;
            color: #ffffff;
            padding: 26px 20px;
            border-radius: 18px;
        }

        .lock-message {
            font-size: 1.05em;
            font-weight: 700;
            line-height: 1.8;
        }

        .inline-btn-highlight {
            background: #0052ff;
            color: #ffffff;
            padding: 8px 26px;
            border-radius: 50px;
            font-weight: 800;
            display: inline-block;
            margin: 10px 0;
        }

        .footer-link {
            color: #38bdf8;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Web3 Domain</h1>

        <p id="online-count"
           style="color:#60a5fa;font-size:0.9em;margin-bottom:15px;font-weight:600;">
            Sisteme Giriş Yapan Kullanıcı: 0
        </p>

        <p id="user-status">
            Lütfen önce bağlanın.
        </p>

        <button id="auth-btn"
                class="pi-btn"
                onclick="window.loginWithPi()">
            Pi ile Bağlan
        </button>

    </div>

    <div class="card">

        <div class="section-title-box">
            Satıştaki Domainler
        </div>

        <div class="domain-grid" id="domain-list">

            <div class="auth-warning" style="grid-column: span 2;">

                <div class="auth-title-box">

                    <div class="lock-message">
                        🔒 Erişim sağlamak için lütfen yukarıdaki<br>

                        <span class="inline-btn-highlight">
                            Pi ile Bağlan
                        </span><br>

                        butonunu kullanınız.
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">
        <p>
            Sorularınız için:
            <a href="mailto:doganay08@hotmail.com" class="footer-link">
                doganay08@hotmail.com
            </a>
        </p>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

import {
    getFirestore,
    doc,
    onSnapshot,
    updateDoc,
    collection,
    setDoc,
    query,
    where
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A",

    authDomain: "web3-domain-gateway.firebaseapp.com",

    projectId: "web3-domain-gateway",

    storageBucket: "web3-domain-gateway.firebasestorage.app",

    messagingSenderId: "315563254318",

    appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let isUserAuthenticated = false;

let domainData = {};

const domains = [

    {
        name: 'test-domain',
        img: 'assets/test.jpeg',
        price: 10
    },

    {
        name: 'etstur.pi',
        img: 'assets/etstur.jpeg',
        price: 250
    },

    {
        name: 'eminevim.pi',
        img: 'assets/eminevim.jpeg',
        price: 150
    },

    {
        name: 'fuzulev.pi',
        img: 'assets/fuzulev.jpeg',
        price: 300
    },

    {
        name: 'fibabank.pi',
        img: 'assets/fibabank.jpeg',
        price: 500
    },

    {
        name: 'sekerbank.pi',
        img: 'assets/sekerbank.jpeg',
        price: 600
    },

    {
        name: 'doganay.pi',
        img: 'assets/doganay.jpeg',
        price: 150
    }
];

function updateCounter() {

    const today = new Date().toISOString().split('T')[0];

    onSnapshot(
        query(
            collection(db, "daily_logs"),
            where("date", "==", today)
        ),

        (snap) => {

            document.getElementById('online-count').innerHTML = `
                <span style="display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:50%;margin-right:6px;"></span>
                Sisteme Giriş Yapan Kullanıcı:
                <b>${snap.size}</b>
            `;
        }
    );
}

const checkPiSDK = setInterval(() => {

    if (typeof Pi !== 'undefined') {

        Pi.init({
            version: "2.0",
            sandbox: true
        });

        console.log("Pi SDK Hazır");

        clearInterval(checkPiSDK);
    }

}, 500);

function render() {

    const list = document.getElementById('domain-list');

    if (!isUserAuthenticated) return;

    list.innerHTML = '';

    domains.forEach(d => {

        const data = domainData[d.name] || {
            sold: false,
            price: d.price
        };

        const isSold = data.sold === true;

        const priceToDisplay = data.price || d.price;

        const card = document.createElement('div');

        card.className = 'domain-card';

        card.innerHTML = `

            <img src="${d.img}" class="domain-img">

            <strong>${d.name}</strong>

            <br>

            <span>
                ${isSold
                    ? `SATILDI (${priceToDisplay} Pi)`
                    : priceToDisplay + ' Pi'}
            </span>

            ${!isSold
                ? `<button class="btn-buy"
                     onclick="window.startPurchase('${d.name}', ${priceToDisplay})">
                     Satın Al
                   </button>`
                : ''}
        `;

        list.appendChild(card);
    });
}

domains.forEach(d => {

    onSnapshot(doc(db, "domains", d.name), (snap) => {

        if (snap.exists()) {

            domainData[d.name] = snap.data();

            render();
        }
    });
});

window.loginWithPi = async function () {

    try {

        if (typeof Pi === 'undefined') {

            alert("Pi SDK yüklenemedi");

            return;
        }

        const auth = await Pi.authenticate(
            ['payments', 'username']
        );

        isUserAuthenticated = true;

        document.getElementById('user-status').innerText =
            "Bağlı: @" + auth.user.username;

        document.getElementById('auth-btn').style.display = 'none';

        await setDoc(

            doc(
                db,
                "daily_logs",
                auth.user.username + "_" +
                new Date().toISOString().split('T')[0]
            ),

            {
                username: auth.user.username,
                date: new Date().toISOString().split('T')[0]
            }
        );

        updateCounter();

        render();

    } catch(err) {

        console.error(err);

        alert("Giriş hatası");
    }
};

window.startPurchase = async function(domain, amount) {

    try {

        if (typeof Pi === 'undefined') {

            alert("Pi Browser gerekli");

            return;
        }

        const paymentData = {

            amount: amount,

            memo: "Domain satın alma: " + domain,

            metadata: {
                domain: domain
            }
        };

        const callbacks = {

            onReadyForServerApproval: function(paymentId) {

                console.log(
                    "Server approval:",
                    paymentId
                );
            },

            onReadyForServerCompletion: async function(paymentId, txid) {

                console.log(
                    "Ödeme tamamlandı:",
                    paymentId,
                    txid
                );

                await updateDoc(
                    doc(db, "domains", domain),
                    {
                        sold: true
                    }
                );

                alert("Domain satın alındı");
            },

            onCancel: function(paymentId) {

                console.log(
                    "İptal edildi",
                    paymentId
                );

                alert("Ödeme iptal edildi");
            },

            onError: function(error) {

                console.error(error);

                alert(
                    "Ödeme hatası: " + error.message
                );
            }
        };

        await Pi.createPayment(
            paymentData,
            callbacks
        );

    } catch(err) {

        console.error(err);

        alert(err.message);
    }
};

</script>

</body>
</html>
