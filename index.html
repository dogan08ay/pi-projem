<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f5f5f5; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 100%; }
        h1 { font-size: 24px; color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 16px; margin-bottom: 20px; }
        button { background-color: #673ab7; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 25px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #512da8; }
        .status { margin-top: 15px; font-weight: bold; color: #2e7d32; }
        .pay-btn { background-color: #ffb74d; color: #333; display: none; }
        .pay-btn:hover { background-color: #ffa726; }
    </style>
</head>
<body>

<div class="card">
    <h1>Web3 Domain Gateway</h1>
    <p>Pi Alan Adı Uygulama Portalı</p>
    
    <button id="auth-btn" onclick="loginWithPi()">Pi Hesabı ile Bağlan</button>
    <button id="pay-btn" class="pay-btn" onclick="createTestPayment()">10. Adım: Test Ödemesi Yap</button>
    
    <div id="status-text" class="status">Pi SDK Yükleniyor...</div>
</div>

<script>
    Pi.init({ version: "2.0", sandbox: true });
    document.getElementById('status-text').innerText = "Pi SDK Başarıyla Yüklendi.";

    let currentUser = null;

    function loginWithPi() {
        Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
        .then(function(auth) {
            currentUser = auth.user;
            document.getElementById('status-text').innerText = "🎉 Bağlandı: @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
            document.getElementById('pay-btn').style.display = 'block';
        })
        .catch(function(error) {
            document.getElementById('status-text').innerText = "Bağlantı hatası.";
        });
    }

    function onIncompletePaymentFound(payment) {
        // Tamamlanmamış ödeme kalırsa sunucuya tamamla emri gönder
        handleServerSidePayment(payment.identifier, 'complete');
    }

    function createTestPayment() {
        document.getElementById('status-text').innerText = "Ödeme başlatılıyor...";
        
        Pi.createPayment({
            amount: 0.1,
            memo: "10. Adim Test Odemesi",
            metadata: { step: "10" }
        }, {
            onReadyForServerApproval: function(paymentId) {
                document.getElementById('status-text').innerText = "Sunucu onayı gönderiliyor...";
                handleServerSidePayment(paymentId, 'approve');
            },
            onReadyForServerCompletion: function(paymentId, txid) {
                document.getElementById('status-text').innerText = "Sunucu tamamlaması gönderiliyor...";
                handleServerSidePayment(paymentId, 'complete');
            },
            onCancel: function(paymentId) {
                document.getElementById('status-text').innerText = "Ödeme iptal edildi.";
            },
            onError: function(error, payment) {
                document.getElementById('status-text').innerText = "Ödeme hatası!";
            }
        });
    }

    // Bizim kurduğumuz Vercel Backend sunucusuna sinyal gönderen fonksiyon
    function handleServerSidePayment(paymentId, action) {
        fetch('/api/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId: paymentId, action: action })
        })
        .then(res => res.json())
        .then(data => {
            if(action === 'complete') {
                document.getElementById('status-text').innerText = "✅ Test Ödemesi Başarılı!";
            }
        })
        .catch(err => {
            console.error("Backend hatası:", err);
        });
    }
</script>

</body>
</html>
