<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Domain Gateway</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
:root {
    --bg:#0f172a;
    --card:#1e293b;
    --accent:#6366f1;
    --text:#f8fafc;
}

body {
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text);
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container { max-width:600px; width:100%; text-align:center; }

.card {
    background:var(--card);
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
}

.domain-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
}

.domain-card {
    background:#334155;
    padding:20px;
    border-radius:12px;
    border:1px solid #475569;
}

.btn-buy {
    background:var(--accent);
    color:white;
    border:none;
    padding:8px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
    width:100%;
}

.pi-btn {
    background:#0052FF;
    color:#fff;
    padding:12px 30px;
    border-radius:50px;
    font-weight:800;
    border:none;
    cursor:pointer;
}

.section-title-box {
    background:linear-gradient(135deg,#fef3c7,#fde68a);
    color:#1e293b;
    padding:12px 28px;
    border-radius:16px;
    font-weight:800;
    display:inline-block;
    margin-bottom:20px;
}

.auth-warning {
    padding:20px;
    border-radius:16px;
    background:#fde68a;
    color:#1e293b;
}

.hidden { display:none !important; }
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="user-status">Lütfen önce bağlanın.</p>

        <button id="auth-btn" class="pi-btn" onclick="loginWithPi()">
            Pi ile Bağlan
        </button>
    </div>

    <div class="card">

        <div class="section-title-box">Satıştaki Domainler</div>

        <div class="domain-grid" id="domain-list">

            <div class="auth-warning" id="auth-warning">
                🔒 Giriş yapmanız gerekiyor
            </div>

        </div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import {
    getFirestore,
    doc,
    onSnapshot,
    setDoc,
    getDoc,
    collection
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "xxx",
    authDomain: "web3-domain-gateway.firebaseapp.com",
    projectId: "web3-domain-gateway"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;

/* ONLINE SAYI */
onSnapshot(collection(db, "active_users"), (snap) => {
    document.getElementById("user-status").innerText =
        "Aktif kullanıcı: " + snap.size;
});

/* DOMAİNLER (SABİT ÖRNEK) */
function loadDomains() {
    const list = document.getElementById("domain-list");

    list.innerHTML = `
        <div class="domain-card">
            <h3>cryptoapp.com</h3>
            <button class="btn-buy">Satın Al</button>
        </div>

        <div class="domain-card">
            <h3>web3wallet.net</h3>
            <button class="btn-buy">Satın Al</button>
        </div>

        <div class="domain-card">
            <h3>pimarket.io</h3>
            <button class="btn-buy">Satın Al</button>
        </div>

        <div class="domain-card">
            <h3>blockchainid.org</h3>
            <button class="btn-buy">Satın Al</button>
        </div>
    `;
}

/* LOGIN */
window.loginWithPi = function () {

    if (!window.Pi) {
        alert("Pi SDK yok!");
        return;
    }

    Pi.authenticate(['username','payments'])
    .then(async (auth) => {

        currentUser = auth.user.username;

        document.getElementById("user-status").innerText =
            "Bağlı: @" + currentUser;

        document.getElementById("auth-btn").style.display = "none";
        document.getElementById("auth-warning").classList.add("hidden");

        loadDomains(); // 🔥 DOMAINLER GERİ GELİYOR

        await setDoc(doc(db, "active_users", currentUser), {
            username: currentUser,
            lastSeen: Date.now()
        });

    })
    .catch(err => {
        alert("Login error: " + err.message);
    });
};

</script>

</body>
</html>
