<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --bg:#0f172a; --card:#1e293b; --accent:#6366f1;
            --text:#f8fafc; --sold:#ef4444; --price:#fbbf24;
            --success:#10b981;
        }
        html,body{height:100%;}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:5px;display:flex;justify-content:center;min-height:100vh;overflow-x:hidden;box-sizing:border-box;}
        .container{max-width:600px;width:100%;text-align:center;display:flex;flex-direction:column;height:100%;max-height:100vh;}
        .card{background:var(--card);padding:8px;border-radius:16px;box-shadow:0 8px 12px -3px rgba(0,0,0,0.3);margin-bottom:6px;position:relative;overflow:visible;}

        /* ── Logo & Title ── */
        .app-logo{width:84px;height:84px;margin-bottom:6px;border-radius:50%;box-shadow:0 0 30px rgba(99,102,241,0.8);border:3px solid #818cf8;object-fit:cover;animation:logo-pulse 3s ease-in-out infinite;}
        @keyframes logo-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
        .app-title{font-size:1.5em;font-weight:900;margin:0 0 4px 0;background:linear-gradient(to right,#60a5fa,#a855f7,#60a5fa);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:title-shine 4s linear infinite;filter:drop-shadow(0 0 14px rgba(139,92,246,0.55));letter-spacing:0.3px;}
        @keyframes title-shine{to{background-position:200% center;}}

        /* ── Stats Bar ── */
        .stats-bar{display:flex;justify-content:space-around;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);padding:4px;border-radius:10px;margin-bottom:4px;font-size:0.55em;font-weight:bold;color:#94a3b8;}
        .stats-item span{color:var(--price);margin-left:2px;}

        /* ── Domain Grid ── */
        .domain-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;position:relative;}
        .domain-card{background:#334155;padding:6px;border-radius:10px;border:1px solid #475569;display:flex;flex-direction:column;align-items:center;transition:transform 0.25s,box-shadow 0.25s,border-color 0.25s;animation:card-rise 0.5s ease backwards;cursor:pointer;}
        .domain-card:hover,.domain-card:active{transform:translateY(-4px) scale(1.02);box-shadow:0 10px 20px -6px rgba(99,102,241,0.45),0 0 0 1.5px rgba(129,140,248,0.6);border-color:#818cf8;}
        @keyframes card-rise{0%{opacity:0;transform:translateY(14px) scale(0.96);}100%{opacity:1;transform:translateY(0) scale(1);}}
        .domain-img{width:100%;height:42px;margin-bottom:3px;border-radius:6px;object-fit:contain;background-color:#334155;}
        .domain-name{font-size:0.78em;font-weight:bold;margin-bottom:2px;}
        .domain-price{color:var(--price);font-size:0.85em;font-weight:800;margin:1px 0;}
        .domain-type-tag{font-size:0.6em;color:#94a3b8;background:rgba(148,163,184,0.15);border-radius:5px;padding:1px 5px;margin-bottom:2px;display:inline-block;}
        .btn-buy{background:var(--accent);color:white;border:none;padding:5px 6px;border-radius:6px;cursor:pointer;margin-top:3px;font-weight:bold;width:100%;font-size:0.7em;}
        .btn-sold{background:rgba(239,68,68,0.1);color:var(--sold);border:1.5px solid var(--sold);padding:4px 6px;border-radius:6px;margin-top:3px;font-weight:bold;width:100%;font-size:0.65em;}

        /* ── Rozet ── */
        .badge-bronze{color:#cd7f32;} .badge-silver{color:#94a3b8;} .badge-gold{color:#fbbf24;} .badge-diamond{color:#818cf8;}
        .user-badge{font-size:0.65em;font-weight:900;padding:2px 7px;border-radius:8px;display:inline-block;margin-left:4px;}

        /* ── Pi Button ── */
        .pi-btn{background:linear-gradient(135deg,#0052FF 0%,#3b82f6 100%);color:#ffffff;padding:8px 20px;border-radius:50px;font-weight:800;font-size:0.85em;border:none;cursor:pointer;animation:pulse-blue 2s infinite;transition:0.3s;margin:6px 0;}
        @keyframes pulse-blue{0%{transform:scale(0.95);box-shadow:0 0 0 0 rgba(0,82,255,0.7);}70%{transform:scale(1);box-shadow:0 0 0 10px rgba(0,82,255,0);}100%{transform:scale(0.95);box-shadow:0 0 0 0 rgba(0,82,255,0);}}

        /* ── Section Title ── */
        .section-title-box{background:linear-gradient(90deg,#fef3c7 0%,#fde68a 40%,#ffffff 50%,#fde68a 60%,#fef3c7 100%);background-size:200% auto;color:#1e293b;padding:5px 16px;border-radius:10px;border:2px solid #f59e0b;font-size:0.92em;font-weight:900;display:inline-block;margin-bottom:6px;animation:title-glow 2.5s ease-in-out infinite,section-shimmer 3s linear infinite;}
        @keyframes title-glow{0%,100%{box-shadow:0 0 10px rgba(245,158,11,0.5);border-color:#f59e0b;}50%{box-shadow:0 0 20px rgba(251,191,36,0.9),0 0 40px rgba(251,191,36,0.45);border-color:#fcd34d;}}
        @keyframes section-shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
        .lock-title-box{background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);color:#1e293b;padding:4px 10px;border-radius:10px;border:2px solid #f59e0b;font-size:0.8em;font-weight:900;margin-bottom:4px;display:inline-block;}

        /* ── Lock Overlay ── */
        .locked-content{filter:blur(4px);opacity:0.7;pointer-events:none;}
        .premium-lock-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;justify-content:flex-start;background:rgba(15,23,42,0.35);backdrop-filter:blur(1px);z-index:100;padding-top:10px;text-align:center;overflow-y:auto;}
        .diamond-spin{margin-bottom:3px;display:inline-block;animation:diamond-rotate 5s ease-in-out infinite;filter:drop-shadow(0 0 14px #818cf8);}
        @keyframes diamond-rotate{0%,100%{transform:rotateY(0deg) scale(1);}50%{transform:rotateY(180deg) scale(1.06);}}
        .diamond-sparkle{opacity:0;transform-origin:center;animation:sparkle-twinkle 2.2s ease-in-out infinite;color:#ffffff;filter:drop-shadow(0 0 4px #a5b4fc);}
        .diamond-sparkle-1{animation-delay:0.2s;} .diamond-sparkle-2{animation-delay:1.3s;}
        @keyframes sparkle-twinkle{0%,100%{opacity:0;transform:scale(0.4) rotate(0deg);}50%{opacity:1;transform:scale(1) rotate(20deg);}}

        /* ── Secure Badge ── */
        .secure-badge{background:#0d2a2a;border:2px solid #10b981;border-radius:14px;padding:16px;width:92%;box-sizing:border-box;margin:6px 0;}
        .secure-badge-title{color:#10b981;font-size:1em;font-weight:800;margin-bottom:8px;border-bottom:1px solid rgba(16,185,129,0.3);padding-bottom:6px;}
        .secure-badge-body{color:#e2e8f0;font-size:0.85em;line-height:1.5;margin-bottom:8px;border-bottom:1px solid rgba(16,185,129,0.3);padding-bottom:8px;}
        .secure-badge-warning{color:#fbbf24;font-size:0.9em;font-weight:900;line-height:1.4;text-transform:uppercase;}

        /* ── Blink ── */
        @keyframes blinker{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}
        .blink-yellow{animation:blinker 2s linear infinite;color:#fbbf24;font-weight:900;}
        .blink-red{animation:blinker 2s linear infinite;color:#ef4444;font-weight:900;}

        /* ── Online Dot ── */
        .online-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#10b981;margin-right:7px;position:relative;top:-1px;box-shadow:0 0 6px #10b981;animation:dot-pulse 1.6s ease-in-out infinite;}
        @keyframes dot-pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.35);opacity:0.65;}}

        /* ── Modal ── */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:flex;justify-content:center;align-items:center;z-index:9999;padding:10px;box-sizing:border-box;}
        .modal-content{background:var(--card);padding:20px;border-radius:20px;border:2px solid #fbbf24;width:100%;max-width:380px;box-sizing:border-box;text-align:center;max-height:90vh;overflow-y:auto;}
        .item-row{display:flex;align-items:center;margin-bottom:8px;text-align:left;}
        .item-title{color:#60a5fa;font-weight:800;width:105px;flex-shrink:0;font-size:0.85em;}
        .item-red-val-small{color:#ef4444;font-weight:900;flex:1;white-space:nowrap;font-size:0.88em;}

        /* ── My Domain Item ── */
        .my-domain-item{background:#0f172a;padding:10px;border-radius:12px;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;border:1px solid #334155;gap:8px;}
        .verify-btn{background:linear-gradient(135deg,#0ea5e9 0%,#0284c7 100%);color:#ffffff;border:none;padding:7px 13px;border-radius:8px;font-size:0.72em;cursor:pointer;font-weight:800;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;}
        .verify-btn-disabled{background:rgba(71,85,105,0.45);color:#475569;border:1.5px solid #334155;padding:7px 13px;border-radius:8px;font-size:0.72em;font-weight:700;display:inline-flex;align-items:center;gap:5px;cursor:not-allowed;white-space:nowrap;flex-shrink:0;opacity:0.6;}

        /* ── Info Badge ── */
        .info-badge-header{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#312e81 0%,#4c1d95 50%,#312e81 100%);background-size:200% auto;color:#c4b5fd;font-weight:900;font-size:0.82em;padding:5px 14px;border-radius:10px;margin-bottom:8px;letter-spacing:0.5px;border:1.5px solid #7c3aed;animation:info-badge-glow 2.5s ease-in-out infinite;position:relative;overflow:hidden;}
        @keyframes info-badge-glow{0%,100%{box-shadow:0 0 10px rgba(124,58,237,0.5);}50%{box-shadow:0 0 20px rgba(167,139,250,0.9),0 0 38px rgba(124,58,237,0.45);}}
        .info-badge-icon{font-size:1.05em;animation:info-icon-pulse 2s ease-in-out infinite;}
        @keyframes info-icon-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.25);}}

        /* ── Hamburger & Side Menu ── */
        .hamburger-btn{position:fixed;top:12px;right:12px;z-index:500;width:42px;height:42px;border-radius:12px;background:rgba(30,41,59,0.92);border:1.5px solid #6366f1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;box-shadow:0 2px 10px rgba(99,102,241,0.4);backdrop-filter:blur(4px);}
        .hamburger-btn span{display:block;width:20px;height:2.5px;background:#c7d2fe;border-radius:2px;}
        .side-menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:998;display:none;}
        .side-menu{position:fixed;top:0;right:0;width:78%;max-width:320px;height:100%;background:linear-gradient(165deg,#1e1b4b 0%,#0f172a 100%);z-index:999;box-shadow:-8px 0 30px rgba(0,0,0,0.5);transform:translateX(100%);transition:transform 0.3s ease;display:flex;flex-direction:column;padding:18px;box-sizing:border-box;overflow-y:auto;}
        .side-menu.open{transform:translateX(0);}
        .side-menu-overlay.open{display:block;}
        .side-menu-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
        .side-menu-close{background:rgba(99,102,241,0.2);border:1px solid #6366f1;color:#c7d2fe;width:32px;height:32px;border-radius:8px;font-size:1.1em;cursor:pointer;}
        .side-menu-item{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:10px;color:#e2e8f0;font-weight:700;font-size:0.88em;cursor:pointer;margin-bottom:4px;text-align:left;background:transparent;border:none;width:100%;box-sizing:border-box;transition:background 0.15s;}
        .side-menu-item:hover,.side-menu-item:active{background:rgba(99,102,241,0.18);}
        .side-menu-section-label{font-size:0.65em;color:#64748b;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;margin:14px 0 6px 4px;text-align:left;}
        .side-menu-divider{height:1px;background:rgba(99,102,241,0.2);margin:8px 0;}
        .lang-pill{margin-left:auto;font-size:0.65em;background:rgba(99,102,241,0.3);padding:2px 8px;border-radius:8px;color:#a5b4fc;}
        .lang-option{display:flex;align-items:center;gap:8px;padding:8px 10px;color:#f1f5f9;font-size:0.8em;font-weight:700;cursor:pointer;border-radius:8px;margin:2px 0;border:none;background:transparent;width:100%;box-sizing:border-box;transition:background 0.15s;}
        .lang-option:hover,.lang-option.active{background:rgba(99,102,241,0.2);}
        .lang-option.active{color:#a5b4fc;}

        /* ── Bildirim İkonu ── */
        .notif-btn{position:fixed;top:12px;right:62px;z-index:500;width:42px;height:42px;border-radius:12px;background:rgba(30,41,59,0.92);border:1.5px solid #6366f1;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 10px rgba(99,102,241,0.4);backdrop-filter:blur(4px);}
        .notif-badge{position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;font-size:0.6em;font-weight:900;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;border:1.5px solid #0f172a;}
        .notif-item{display:flex;align-items:flex-start;gap:8px;padding:10px;border-radius:10px;background:#0f172a;margin-bottom:6px;border:1px solid #334155;text-align:left;cursor:pointer;transition:background 0.15s;}
        .notif-item.unread{border-color:#6366f1;background:rgba(99,102,241,0.08);}
        .notif-item:hover{background:#1e293b;}
        .notif-dot{width:8px;height:8px;border-radius:50%;background:#6366f1;flex-shrink:0;margin-top:4px;}
        .notif-dot.read{background:transparent;}

        /* ── Admin Tabs ── */
        .admin-tabs{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px;}
        .admin-tabs::-webkit-scrollbar{height:4px;}
        .admin-tab-btn{flex-shrink:0;background:#0f172a;border:1.5px solid #334155;color:#94a3b8;padding:8px 11px;border-radius:10px;font-size:0.68em;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all 0.15s;}
        .admin-tab-btn.active{background:rgba(99,102,241,0.18);border-color:#6366f1;color:#c7d2fe;box-shadow:0 0 10px rgba(99,102,241,0.3);}
        .admin-tab-panel{display:none;}
        .admin-tab-panel.active{display:block;animation:card-rise 0.3s ease backwards;}
        .pending-badge{background:#ef4444;color:#fff;font-size:0.65em;font-weight:900;border-radius:8px;padding:1px 6px;margin-left:2px;}

        /* ── Filter Bar ── */
        .filter-bar{display:flex;gap:6px;overflow-x:auto;margin-bottom:8px;padding-bottom:2px;}
        .filter-bar::-webkit-scrollbar{height:4px;}
        .filter-chip{flex-shrink:0;background:#334155;border:1.5px solid #475569;color:#cbd5e1;padding:5px 12px;border-radius:16px;font-size:0.7em;font-weight:700;cursor:pointer;transition:all 0.15s;}
        .filter-chip.active{background:linear-gradient(135deg,#6366f1,#818cf8);border-color:#818cf8;color:#fff;box-shadow:0 0 10px rgba(99,102,241,0.4);}

        /* ── Form Inputs ── */
        .sell-form-input{background:#0f172a;color:#fff;border:1.5px solid #f59e0b;padding:8px;border-radius:8px;font-size:0.85em;width:100%;box-sizing:border-box;outline:none;margin-bottom:8px;}
        .admin-date-picker{background:#0f172a;color:#fff;border:1.5px solid #6366f1;padding:6px;border-radius:8px;font-size:0.85em;margin-bottom:10px;width:100%;box-sizing:border-box;outline:none;}
        .pending-domain-item{background:#1c1917;border:2px solid #f59e0b;border-radius:12px;padding:10px;margin-bottom:8px;text-align:left;}

        /* ── Log ── */
        #log-list{max-height:85px;overflow-y:auto;}
        #log-list::-webkit-scrollbar{width:5px;}
        #log-list::-webkit-scrollbar-thumb{background:#6366f1;border-radius:10px;}
        .log-item{display:flex;justify-content:space-between;background:#0f172a;padding:8px 12px;border-radius:8px;margin-bottom:5px;font-size:0.8em;}

        /* ── Info Note ── */
        .user-info-note{background:rgba(99,102,241,0.1);border:1px dashed #6366f1;color:#94a3b8;padding:10px;border-radius:10px;font-size:0.75em;line-height:1.55;margin-bottom:10px;text-align:left;box-sizing:border-box;width:100%;}
        .btn-fake-buy{background:var(--accent);color:white;padding:1px 4px;border-radius:3px;font-weight:900;font-size:0.85em;}

        /* ── User Panel Tabs ── */
        .user-tabs{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px;}
        .user-tab-btn{flex-shrink:0;background:#0f172a;border:1.5px solid #334155;color:#94a3b8;padding:7px 10px;border-radius:10px;font-size:0.65em;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all 0.15s;}
        .user-tab-btn.active{background:rgba(16,185,129,0.15);border-color:#10b981;color:#6ee7b7;}
        .user-tab-panel{display:none;}
        .user-tab-panel.active{display:block;animation:card-rise 0.3s ease backwards;}

        /* ── Gelir Kutusu ── */
        .income-box{background:linear-gradient(135deg,#064e3b 0%,#065f46 100%);border:2px solid #10b981;border-radius:12px;padding:12px;margin-bottom:8px;text-align:center;}
        .income-value{font-size:1.8em;font-weight:900;color:#34d399;}

        /* ── Domain Detail Modal ── */
        .detail-img{width:100%;max-height:120px;object-fit:contain;border-radius:10px;margin-bottom:10px;background:#334155;}

        /* ── Görsel Yükleme ── */
        .img-upload-area{border:2px dashed #f59e0b;border-radius:10px;padding:16px;text-align:center;cursor:pointer;margin-bottom:8px;color:#94a3b8;font-size:0.8em;}
        .img-upload-area:hover{border-color:#fcd34d;background:rgba(245,158,11,0.05);}
        .img-preview{width:100%;max-height:80px;object-fit:contain;border-radius:8px;margin-top:6px;display:none;}

        /* ── Footer ── */
        .footer-section{padding:10px 12px;color:#f8fafc;font-size:0.62em;text-align:center;border-top:1px solid #334155;background:rgba(15,23,42,0.8);border-radius:16px 16px 0 0;margin-top:auto;}
        .footer-section a{color:#38bdf8;text-decoration:none;font-weight:800;border-bottom:1px solid #38bdf8;}
        .footer-section .footer-row{margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;}
        .footer-section .footer-links{margin-top:5px;font-size:0.9em;}

        .main-scroll{flex:1 1 auto;overflow-y:auto;display:flex;flex-direction:column;min-height:0;}

        /* ── Unique Users List ── */
        #unique-user-list::-webkit-scrollbar{width:5px;}
        #unique-user-list::-webkit-scrollbar-thumb{background:#6366f1;border-radius:10px;}

        /* ── Animations ── */
        @keyframes icon-pulse-btn{0%,100%{filter:drop-shadow(0 0 4px rgba(99,102,241,0.6));transform:scale(1);}50%{filter:drop-shadow(0 0 10px rgba(165,180,252,0.9));transform:scale(1.12);}}
        @keyframes icon-pulse-chart{0%,100%{filter:drop-shadow(0 0 4px rgba(74,222,128,0.5));transform:scale(1);}50%{filter:drop-shadow(0 0 10px rgba(74,222,128,0.9));transform:scale(1.12);}}
        @keyframes icon-pulse-green{0%,100%{filter:drop-shadow(0 0 4px rgba(52,211,153,0.5));transform:scale(1);}50%{filter:drop-shadow(0 0 10px rgba(52,211,153,0.9));transform:scale(1.12);}}

        .manage-btn{background:#6366f1;color:white;border:none;padding:5px 10px;border-radius:6px;font-size:0.7em;cursor:pointer;font-weight:bold;}
    </style>
</head>
<body>

<!-- ── Bildirim Butonu ── -->
<div class="notif-btn" id="notif-btn" onclick="openNotifModal()" style="display:none; position:relative;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c7d2fe" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span class="notif-badge" id="notif-badge" style="display:none;">0</span>
</div>

<!-- ── Hamburger ── -->
<button class="hamburger-btn" id="hamburger-btn" onclick="toggleSideMenu()">
    <span></span><span></span><span></span>
</button>

<!-- ── Side Menu Overlay ── -->
<div class="side-menu-overlay" id="side-menu-overlay" onclick="toggleSideMenu()"></div>

<!-- ── Side Menu ── -->
<div class="side-menu" id="side-menu">
    <div class="side-menu-header">
        <div style="font-weight:900;color:#c7d2fe;font-size:1.05em;">☰ <span data-i18n="menu"></span></div>
        <button class="side-menu-close" onclick="toggleSideMenu()">✕</button>
    </div>

    <!-- Profil Kutusu -->

let currentLang = localStorage.getItem('w3dg_lang') || 'tr';
function t(key) { return (i18n[currentLang]?.[key] ?? i18n['tr'][key]) ?? key; }

function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const v = t(el.getAttribute('data-i18n'));
        if (typeof v === 'string') el.innerHTML = v;
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const v = t(el.getAttribute('data-i18n-placeholder'));
        if (typeof v === 'string') el.placeholder = v;
    });
    document.querySelectorAll('select option[data-i18n]').forEach(el => {
        const v = t(el.getAttribute('data-i18n'));
        if (typeof v === 'string') el.textContent = v;
    });
    const pill = document.getElementById('current-lang-pill');
    if (pill) pill.textContent = currentLang.toUpperCase();
    document.getElementById('lang-btn-tr')?.classList.toggle('active', currentLang === 'tr');
    document.getElementById('lang-btn-en')?.classList.toggle('active', currentLang === 'en');
    document.documentElement.lang = currentLang;
}

window.setLang = function(lang) {
    currentLang = lang;
    localStorage.setItem('w3dg_lang', lang);
    applyTranslations();
    debouncedRender();
    document.getElementById('lang-picker').style.display = 'none';
};

window.handleImageSelect = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert(t('imageUploadFailed')); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
        const result = e.target.result;
        selectedImageBase64 = result.split(',')[1];
        selectedImageMime = file.type;
        selectedImageName = file.name;
        const preview = document.getElementById('sell-img-preview');
        preview.src = result;
        preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
};

window.handleSubmitSellRequest = async function() {
    const name = document.getElementById('sell-domain-name').value.trim();
    const price = Number(document.getElementById('sell-domain-price').value);
    const type = document.getElementById('sell-domain-type').value;
    const desc = document.getElementById('sell-domain-desc').value.trim();
    const wallet = document.getElementById('sell-domain-wallet').value.trim();
    if (!name || !price || price <= 0) { alert(t('domainNamePriceRequired')); return; }

    let imgUrl = 'assets/default.jpeg';

    // Görsel yükleme
    if (selectedImageBase64) {
        const uploadHint = document.querySelector('.img-upload-area div');
        if (uploadHint) uploadHint.textContent = t('imageUploading');
        try {
            const response = await fetch('/api/approve', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ action:'upload_image', imageBase64:selectedImageBase64, mimeType:selectedImageMime, fileName:selectedImageName, accessToken:piAccessToken })
            });
            const result = await response.json();
            if (result.success && result.url) imgUrl = result.url;
            else { alert(t('imageUploadFailed')); return; }
        } catch(e) { alert(t('imageUploadFailed')); return; }
    }

    try {
        const response = await fetch('/api/approve', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ action:'submit_sell_request', domainName:name, price, domainType:type, imgPath:imgUrl, sellerWallet:wallet, description:desc, accessToken:piAccessToken })
        });
        const result = await response.json();
        if (!response.ok || !result.success) { alert(t('sellSubmitFail') + (result.error||'')); return; }
        alert(t('sellSubmitSuccess'));
        document.getElementById('sell-domain-modal').style.display = 'none';
        // Formu temizle
        ['sell-domain-name','sell-domain-price','sell-domain-desc','sell-domain-wallet'].forEach(id => document.getElementById(id).value = '');
        selectedImageBase64 = null; selectedImageMime = null; selectedImageName = null;
        document.getElementById('sell-img-preview').style.display = 'none';
        await loadUserProfile();
        debouncedRender();
    } catch(e) { alert(t('sellSubmitError')); }
};

function listenToNotifications(username) {
    const notifRef = rtdbRef(rtdb, `notifications/${username}`);
    if (notifUnsubscribe) notifUnsubscribe();
    const handler = onValue(notifRef, (snap) => {
        const data = snap.val() || {};
        const notifs = Object.entries(data).map(([id, v]) => ({ id, ...v })).sort((a,b) => b.ts - a.ts);
        const unread = notifs.filter(n => !n.read).length;
        const badge = document.getElementById('notif-badge');
        const btn = document.getElementById('notif-btn');
        btn.style.display = 'flex';
        if (unread > 0) { badge.style.display = 'block'; badge.textContent = unread > 99 ? '99+' : unread; }
        else { badge.style.display = 'none'; }
        renderNotifList(notifs);
    });
    notifUnsubscribe = () => off(notifRef, 'value', handler);
}

function renderNotifList(notifs) {
    const list = document.getElementById('notif-list');
    if (!list) return;
    if (!notifs.length) { list.innerHTML = `<p style="font-size:0.8em;opacity:0.5;text-align:center;">${t('noNotifications')}</p>`; return; }
    const locale = currentLang==='en'?'en-GB':'tr-TR';
    list.innerHTML = notifs.map(n => `
        <div class="notif-item ${n.read?'':'unread'}" onclick="handleNotifClick('${n.id}')">
            <div class="notif-dot ${n.read?'read':''}"></div>
            <div style="flex:1;">
                <div style="font-size:0.82em;font-weight:800;color:#f1f5f9;margin-bottom:2px;">${n.title||''}</div>
                <div style="font-size:0.72em;color:#94a3b8;line-height:1.4;">${n.body||''}</div>
                <div style="font-size:0.62em;color:#475569;margin-top:4px;">${new Date(n.ts).toLocaleString(locale,{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
            </div>
        </div>
    `).join('');
}

    const r = await fetch('/api/approve',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'update_price',domainName,newPrice,accessToken:piAccessToken})});
    const result = await r.json();
    if (!r.ok||!result.success) alert(t('priceUpdateFail')+(result.error||''));
    else alert(t('priceUpdateSuccess')(domainName,newPrice));
};

window.handleDeleteDomain = async function(domainName) {
    if (!confirm(t('deleteConfirm')(domainName))) return;
    const r = await fetch('/api/approve',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'delete_domain',domainName,accessToken:piAccessToken})});
    const result = await r.json();
    if (!r.ok||!result.success) alert(t('deleteFail')+(result.error||''));
    else {
        // Local state'den kaldır — Firestore onSnapshot zaten herkese yansıtır
        domains = domains.filter(d=>d.name!==domainName);

        alert(t('deleteSuccess')(domainName));

    }

function listenToLogs(date) {
    if (adminLogUnsubscribe) adminLogUnsubscribe();
    adminLogUnsubscribe = onSnapshot(doc(db,"daily_users",date), (snap) => {
        const users = (snap.data()||{}).users||{};
        const sorted = Object.keys(users).sort((a,b)=>users[b]-users[a]);
        let html = sorted.length===0 ? `<p style="font-style:italic;opacity:0.6;font-size:0.8em;">${t('noRecord')}</p>`
            : sorted.map(u=>`<div class="log-item"><b>@${u}</b><span>${new Date(users[u]).toLocaleTimeString()}</span></div>`).join('');
        document.getElementById("log-list").innerHTML = html;
    });
    if (adminStatsUnsubscribe) adminStatsUnsubscribe();
    adminStatsUnsubscribe = onSnapshot(doc(db,"daily_stats",date), (snap) => {
        const data = snap.data()||{};
        document.getElementById("daily-stat-count").innerText = data.count||0;
        document.getElementById("daily-stat-volume").innerText = Math.round((data.volume||0)*100)/100;
    });
}

function listenToPendingDomains() {
    if (pendingDomainsUnsubscribe) pendingDomainsUnsubscribe();
    pendingDomainsUnsubscribe = onSnapshot(collection(db,"sell_requests"), (snapshot) => {
        const pending = [];
        snapshot.forEach(docSnap => { const d=docSnap.data(); if(d.status==='pending') pending.push({id:docSnap.id,...d}); });
        pending.sort((a,b)=>(b.submittedAt||0)-(a.submittedAt||0));
        renderPendingDomains(pending);
    });
}

//  Unique Users
// ══════════════════════════════════════
let cachedUniqueUsers = null;
async function fetchUniqueUsers() {
    const snapshot = await getDocs(collection(db,"daily_users"));
    const allUsers = {};
    snapshot.forEach(docSnap => {
        const users = docSnap.data().users||{};
        Object.keys(users).forEach(u => {
            if (!allUsers[u]||users[u]>allUsers[u].lastSeen) allUsers[u]={lastSeen:users[u]};
        });
    });
    cachedUniqueUsers = Object.entries(allUsers).sort((a,b)=>b[1].lastSeen-a[1].lastSeen);
    return cachedUniqueUsers;
}

function renderUniqueUsersList(sorted) {
    const listEl = document.getElementById("unique-user-list");
    const totalEl = document.getElementById("unique-user-total");
    if (!listEl||!totalEl) return;
    totalEl.innerText = sorted.length;
    const badge = document.getElementById("unique-users-badge");
    if (badge) badge.innerText = sorted.length;
    const locale = currentLang==='en'?'en-GB':'tr-TR';
    listEl.innerHTML = sorted.length===0
        ? `<p style="font-size:0.8em;opacity:0.5;text-align:center;">${t('noUsers')}</p>`
        : sorted.map(([username,info])=>`
            <div class="log-item"><b>@${username}</b><span style="color:#94a3b8;font-size:0.85em;">${t('lastSeenPrefix')}${new Date(info.lastSeen).toLocaleDateString(locale,{day:'2-digit',month:'2-digit',year:'numeric'})}</span></div>
          `).join('');
}

async function handleIncompletePayment(payment) {
    try {
        const action = payment?.transaction?.txid ? 'complete' : 'cancel';
        await fetch('/api/approve',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({paymentId:payment.identifier,action,txid:payment.transaction?.txid,username:currentUser,domainName:payment.metadata?.domain,amount:payment.amount})});

// ══════════════════════════════════════
//  Login
// ══════════════════════════════════════
window.loginWithPi = async function() {
    try {
        const auth = await Pi.authenticate(['username','payments'], handleIncompletePayment);
        currentUser = auth.user.username;
        piAccessToken = auth.accessToken;
        isAuth = true;

        document.getElementById("user-status").innerHTML = '<span class="online-dot"></span>' + t('connectedPrefix') + currentUser;
        document.getElementById("user-status-box").style.display = "block";
        document.getElementById("user-panel").style.display = "block";

        // Bildirimleri dinle
        listenToNotifications(currentUser);

        // Profil yükle
        await loadUserProfile();
        debouncedRender();

        const today = new Date().toISOString().split("T")[0];
        if (currentUser === "doganay0808") {
            document.getElementById("admin-panel").style.display = "block";
            loadUniqueBadgeCount();
            listenToPendingDomains();
            const dateInput = document.getElementById("admin-date-input");
            dateInput.value = today;
            listenToLogs(today);
            dateInput.onchange = (e) => listenToLogs(e.target.value);
        }

        // Giriş kaydı
        const userDocRef = doc(db,"daily_users",today);
        const userSnap = await getDoc(userDocRef);
        let currentUsers = userSnap.exists() ? userSnap.data().users||{} : {};
        currentUsers[currentUser] = Date.now();
        await setDoc(userDocRef,{users:currentUsers},{merge:true});
        updateActiveStatus();

        // İlk giriş tarihini bul
        try {
            const allDaily = await getDocs(collection(db,"daily_users"));
            let earliest = Date.now();
            allDaily.forEach(d => {
                const u = d.data().users||{};
                if (u[currentUser] && u[currentUser]<earliest) earliest=u[currentUser];
            });
            userFirstSeen = earliest;
            updateSideMenuProfile();
        } catch(e) {}

    } catch(e) { console.error("Login error:",e); alert(t('loginError')); }
};

};

document.getElementById("share-tg-btn").onclick = () => {
    const text = t('shareText')(pendingDomain, window.location.href);
    window.open(`https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(text)}`,'_blank');
};

// ══════════════════════════════════════
//  Firestore Domain Listener
// ══════════════════════════════════════
// Silinen domainleri de yakala (removed)
onSnapshot(collection(db,"domains"), (snapshot) => {
    // Önce silinen domainleri tespit et
    snapshot.docChanges().forEach(change => {
        if (change.type === 'removed') {
            const name = change.doc.id;
            // Yerel listeden kaldır → anlık tüm kullanıcılara yansır
            domains = domains.filter(d => d.name !== name);
            delete domainData[name];
        }
    });

    snapshot.forEach(docSnap => {
        const name = docSnap.id;
        const docData = docSnap.data()||{};
        const defaultDomain = domains.find(d=>d.name===name);
        domainData[name] = docData.sold!==undefined ? docData : { sold:false, price:defaultDomain?defaultDomain.price:(docData.price||0) };
        if (!defaultDomain) {
            domains.unshift({ name, img:docData.img||'assets/default.jpeg', price:docData.price||0, type:docData.type||'genel', description:docData.description||'' });
        } else {
            // Img ve description'ı da güncelle
            defaultDomain.img = docData.img || defaultDomain.img;
            defaultDomain.description = docData.description || '';
        }
    });

    let totalSold=0, totalVolume=0;
    snapshot.forEach(docSnap => {
        const data=docSnap.data();
        if(data.sold===true){ totalSold++; totalVolume+=Number(data.price||0); }
    });
    document.getElementById("total-sold").innerText = totalSold;
    document.getElementById("total-volume").innerText = Math.round(totalVolume*100)/100;

    if (isAuth) debouncedRender();
});

// ══════════════════════════════════════
//  Debounced Render
// ══════════════════════════════════════
let renderTimeout = null;
function debouncedRender() {
    clearTimeout(renderTimeout);
    renderTimeout = setTimeout(render, 50);
}

// İlk yükleme
domains.forEach(d => { if (!domainData[d.name]) domainData[d.name]={sold:false,price:d.price}; });
applyTranslations();
render();

window.addEventListener("load", () => { setInterval(updateActiveStatus,15000); });

// Expose pendingDomain/Price globally (onclick için)
window.__state = { get pendingDomain(){return pendingDomain;}, set pendingDomain(v){pendingDomain=v;}, get pendingPrice(){return pendingPrice;}, set pendingPrice(v){pendingPrice=v;} };
</script>
