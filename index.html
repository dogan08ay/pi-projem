<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; }
        .sold-card { opacity: 0.5; background: #000; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1 id="user-status">Web3 Domain</h1>
        <button id="auth-btn" onclick="loginWithPi()" style="padding:10px 20px; background:#6366f1; color:white; border:none; border-radius:10px;">Pi ile Bağlan</button>
    </div>

    <div class="card">
        <div class="grid" id="domain-list"></div>
    </div>
</div>

<script>
    Pi.init({ version: "2.0", sandbox: true });
    const domains = ['etstur.pi', 'eminevim.pi', 'fuzulev.pi', 'fibabank.pi', 'sekerbank.pi', 'doganay.pi'];

    function render() {
        const list = document.getElementById('domain-list');
        list.innerHTML = '';
        domains.forEach(d => {
            const isSold = localStorage.getItem(d) === 'sold';
            const div = document.createElement('div');
            div.className = `domain-card ${isSold ? 'sold-card' : ''}`;
            div.innerHTML = `<strong>${d}</strong><br><span>${isSold ? 'SATILDI' : '10 Pi'}</span>`;
            
            if (!isSold) {
                const btn = document.createElement('button');
                btn.className = 'btn-buy';
                btn.innerText = 'Satın Al';
                // En güvenli yöntem: addEventListener
                btn.onclick = () => startPurchase(d);
                div.appendChild(btn);
            }
            list.appendChild(div);
        });
    }

    function loginWithPi() {
        Pi.authenticate(['username', 'payments'], () => {}).then(auth => {
            document.getElementById('user-status').innerText = "@" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
        }).catch(err => alert("Giriş başarısız"));
    }

    function startPurchase(domain) {
        Pi.createPayment({ amount: 10, memo: "Domain: " + domain }, {
            onReadyForServerCompletion: (id, txid) => {
                localStorage.setItem(domain, 'sold');
                render();
                alert("Başarılı!");
            },
            onError: (e) => alert("Hata: " + e.message)
        });
    }

    render();
</script>
</body>
</html>
