<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --accent: #6366f1; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .domain-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .domain-img { width: 80px; height: 80px; margin-bottom: 15px; border-radius: 12px; object-fit: contain; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-sold { background: #e2e8f0; color: #64748b; border: none; padding: 12px 20px; border-radius: 12px; width: 100%; margin-top: 10px; cursor: not-allowed; font-weight: bold; }
        .status-text { color: #ef4444; font-weight: bold; margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>Satıştaki Domainler</h1>
    <div class="domain-grid" id="domain-list"></div>
</div>

<script>
    Pi.init({ version: "2.0", sandbox: true });

    // Senin attığın fotoğraftaki detaylı/illustrasyon görselleri
    const domains = [
        { name: 'eminevim.pi', img: 'https://i.imgur.com/gK96eWn.png' },
        { name: 'fuzulev.pi', img: 'https://i.imgur.com/Qe16O0a.png' },
        { name: 'fibabank.pi', img: 'https://i.imgur.com/f98VzWq.png' },
        { name: 'etstur.pi', img: 'https://i.imgur.com/kZ4Xy4F.png' },
        { name: 'sekerbank.pi', img: 'https://i.imgur.com/2Xy510N.png' },
        { name: 'doganay.pi', img: 'https://i.imgur.com/h9D6s3r.png' }
    ];

    function render() {
        const list = document.getElementById('domain-list');
        list.innerHTML = '';
        domains.forEach(d => {
            const isSold = localStorage.getItem(d.name) === 'sold';
            const card = document.createElement('div');
            card.className = 'domain-card';
            
            card.innerHTML = `
                <img src="${d.img}" class="domain-img">
                <strong style="font-size: 1.1em;">${d.name}</strong>
                <span style="color: #64748b; margin: 5px 0;">10 Pi</span>
                ${isSold ? '<div class="status-text">🚫 SATILDI</div>' : `<button class="btn-buy" onclick="startPurchase('${d.name}')">Satın Al</button>`}
            `;
            list.appendChild(card);
        });
    }
