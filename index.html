<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Domain Gateway</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;text-align:center;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin:10px auto;max-width:600px}
button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer}
.buy{background:#6366f1;color:#fff;width:100%}
</style>
</head>

<body>

<div class="card">
<h2>Web3 Domain</h2>
<p id="user">Bağlanmadı</p>
<button onclick="login()">Pi ile Bağlan</button>
</div>

<div class="card" id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import {
getFirestore, doc, onSnapshot, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "xxx",
authDomain: "web3-domain-gateway.firebaseapp.com",
projectId: "web3-domain-gateway"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= PI INIT ================= */
Pi.init({ version: "2.0", sandbox: true });

Pi.onIncompletePaymentFound(function(payment) {
return Pi.completePayment(payment.identifier, payment.txid)
.then(r => console.log("Auto completed:", r))
.catch(e => console.log(e));
});

/* ================= STATE ================= */
let user = null;
let auth = false;
let busy = false;

const domains = [
{ name:"test-domain", price:10 },
{ name:"etstur.pi", price:250 },
{ name:"eminevim.pi", price:150 }
];

/* ================= LOGIN ================= */
window.login = function(){

Pi.authenticate(['username','payments']).then(async res => {

user = res.user.username;
auth = true;

document.getElementById("user").innerText = "@" + user;

render();

});
};

/* ================= RENDER ================= */
function render(){

const el = document.getElementById("list");
el.innerHTML = "";

domains.forEach(d => {

const div = document.createElement("div");
div.className = "card";
div.innerHTML = `
<b>${d.name}</b><br>
<p>${d.price} Pi</p>
<button class="buy" onclick="buy('${d.name}',${d.price})">Satın Al</button>
`;

el.appendChild(div);

});

}

/* ================= PURCHASE ================= */
window.buy = async function(domain, amount){

if(!auth || busy) return;

busy = true;

try {

await Pi.createPayment(
{
amount: Number(amount),
memo: "Domain: " + domain,
metadata: { domain }
},
{
onReadyForServerApproval: function(id){
console.log("Approval:", id);
},

onReadyForServerCompletion: async function(id, txid){

await setDoc(doc(db,"domains",domain),{
sold:true,
txid,
soldAt:new Date().toISOString()
},{merge:true});

busy = false;
alert("Satın alındı");

},

onCancel: function(){
busy = false;
},

onError: function(e){
busy = false;
alert("Hata");
}
}
);

}catch(e){
busy = false;
console.log(e);
}

};

</script>

</body>
</html>
