<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --text:#f8fafc; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; display:flex; justify-content:center; }
        .container { max-width:600px; width:100%; text-align:center; }
        .card { background:var(--card); padding:25px; border-radius:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom:20px; }
        .domain-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px; }
        .domain-card { background:#334155; padding:20px; border-radius:12px; border:1px solid #475569; display:flex; flex-direction:column; align-items:center; }
        .domain-img { width:100%; height:120px; margin-bottom:10px; border-radius:12px; object-fit:contain; background-color:#334155; }
        .btn-buy { background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; }
        .pi-btn { background:#0052FF; color:#ffffff; padding:12px 30px; border-radius:50px; font-weight:800; cursor:pointer; }
        .btn-buy:disabled { background-color: #475569; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count" style="color:#60a5fa;font-size:0.9em;">Aktif Kullanıcı: 0</p>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card" id="admin-panel" style="display:block; border:2px solid #6366f1; text-align:left;">
        <h3 style="color:#6366f1; margin-top:0;">🛠 Admin Paneli</h3>
        <div id="log-list" style="font-size:0.85em; max-height:150px; overflow-y:auto;"></div>
    </div>

    <div class="card">
        <div class="section-title-box">Satıştaki Domainler</div>
        <div class="domain-grid" id="domain-list"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "s3ddhcea9xae0qieikgjy9zw9tduemnraoucjrr9iqe87pduhczmd95kq8n3aai1",
        authDomain: "web3-domain-gateway.firebaseapp.com",
        projectId: "web3-domain-gateway",
        storageBucket: "web3-domain-gateway.firebasestorage.app",
        messagingSenderId: "315563254318",
        appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    Pi.init({ version: "2.0", sandbox: true });

    let isUserAuthenticated = false;
    let domainData = {};
    const domains = [
        { name: 'test-domain', img: 'assets/test.jpeg', price: 10 },
        { name: 'etstur.pi', img: 'assets/etstur.jpeg', price: 250 },
        { name: 'eminevim.pi', img: 'assets/eminevim.jpeg', price: 150 }
    ];

    function render() {
        const list = document.getElementById('domain-list');
        if (!list || !isUserAuthenticated) return;
        list.innerHTML = '';
        domains.forEach(d => {
            const data = domainData[d.name] || { sold: false, price: d.price };
            const isSold = data.sold === true;
            const card = document.createElement('div');
            card.className = 'domain-card';
            card.innerHTML = `<img src="${d.img}" class="domain-img"><strong>${d.name}</strong><br><span>${isSold ? 'SATILDI' : data.price + ' Pi'}</span>`;
            if (!isSold) {
                const btn = document.createElement('button');
                btn.className = 'btn-buy';
                btn.innerText = 'Satın Al';
                btn.onclick = () => window.startPurchase(d.name, data.price);
                card.appendChild(btn);
            }
            list.appendChild(card);
        });
    }

    window.startPurchase = function(domain, amount) {
        Pi.createPayment({ amount: Number(amount), memo: "Domain: " + domain }, {
            onReadyForServerCompletion: (id, txid) => {
                db.collection("domains").doc(domain).update({ sold: true, txid: txid });
                Pi.completePayment(id, txid).then(() => alert("Başarılı!"));
            }
        });
    };

    window.loginWithPi = function() {
        Pi.authenticate(['username', 'payments'], () => {}).then(auth => {
            isUserAuthenticated = true;
            document.getElementById('user-status').innerText = "Bağlı: @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
            render();
        });
    };

    domains.forEach(d => {
        db.collection("domains").doc(d.name).onSnapshot(snap => {
            if (snap.exists()) { domainData[d.name] = snap.data(); render(); }
        });
    });
</script>
</body>
</html>
