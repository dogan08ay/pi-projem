<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .domain-img { width: 100%; height: 120px; margin-bottom: 10px; border-radius: 12px; object-fit: contain; background-color: #334155; padding: 5px; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        #auth-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4); }
        .section-title-box { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); color: #1e293b; padding: 12px 28px; border-radius: 16px; border: 3px solid #f59e0b; font-size: 1.15em; font-weight: 800; display: inline-block; margin: 5px auto 25px auto; }
        .auth-warning { color: #1e293b; padding: 24px; border: 4px solid #f59e0b; border-radius: 24px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); text-align: center; }
        .lock-message { font-size: 1.05em; font-weight: 700; line-height: 1.8; color: #f8fafc; }
        .inline-btn-highlight { background: #0052ff; color: #ffffff; padding: 6px 20px; border-radius: 50px; font-weight: 800; display: inline-block; margin: 10px 0; }
        .admin-card { display: none; background: #111827; border: 2px dashed #10b981; padding: 20px; border-radius: 20px; margin-top: 30px; text-align: left; width: 100%; }
        .user-tag { background: #1f2937; padding: 4px 12px; border-radius: 50px; font-size: 0.8em; margin: 4px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count" style="color: #a5b4fc; font-size: 0.9em; font-weight: bold;">Aktif: Yükleniyor...</p>
        <p id="user-status">Lütfen bağlanın.</p>
        <button id="auth-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card">
        <div class="section-title-box">Satıştaki Domainler</div>
        <div class="domain-grid" id="domain-list">
            <div class="auth-warning" style="grid-column: span 2;">
                <div class="lock-message">
                    🔒 Erişim için Pi doğrulamasını yukarıdaki<br>
                    <span class="inline-btn-highlight">Pi ile Bağlan</span><br>
                    butonunu kullanarak tamamlayınız.
                </div>
            </div>
        </div>
    </div>

    <div class="admin-card" id="developer-panel">
        <div style="color:#10b981; font-weight:bold;">📊 Yönetici Paneli</div>
        <div id="total-users-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A",
        authDomain: "web3-domain-gateway.firebaseapp.com",
        projectId: "web3-domain-gateway",
        storageBucket: "web3-domain-gateway.firebasestorage.app",
        messagingSenderId: "315563254318",
        appId: "1:315563254318:web:12f2f3f340bb69606df5bf",
        measurementId: "G-1MC05YBPCC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ADMIN_USER = "doganay0808";

    // Pi SDK Başlatma
    Pi.init({ version: "2.0", sandbox: true });

    window.loginWithPi = function() {
        Pi.authenticate(['username', 'payments'], () => {}).then(async (auth) => {
            const username = auth.user.username;
            document.getElementById('user-status').innerText = "Bağlı: @" + username;
            document.getElementById('auth-btn').style.display = 'none';
            
            if (username === ADMIN_USER) document.getElementById('developer-panel').style.display = 'block';
            
            // Veri Kayıt
            await setDoc(doc(db, "all_users", username), { firstLogin: Date.now() }, { merge: true });
            await setDoc(doc(db, "online_users", username), { lastSeen: Date.now() });
            
            // Liste Yenileme (Örnek Domainler)
            document.getElementById('domain-list').innerHTML = `
                <div class="domain-card"><img src="assets/doganay.jpeg" class="domain-img"><strong>doganay.pi</strong><button class="btn-buy">Satın Al</button></div>
                <div class="domain-card"><img src="assets/test.jpeg" class="domain-img"><strong>test.pi</strong><button class="btn-buy">Satın Al</button></div>
            `;
        }).catch(err => alert("Giriş hatası: " + err.message));
    }

    // Sayaçlar
    onSnapshot(collection(db, "all_users"), (snap) => {
        const list = document.getElementById('total-users-list');
        list.innerHTML = '';
        snap.forEach(d => list.innerHTML += `<span class="user-tag">@${d.id}</span>`);
    });
</script>
</body>
</html>
