<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Domain Gateway</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; text-align:center; }
.card { background:#1e293b; padding:20px; margin:10px; border-radius:15px; }
.domain-card { background:#334155; padding:10px; margin:10px; border-radius:10px; }
button { padding:10px; border:none; border-radius:8px; cursor:pointer; }
.pi-btn { background:#0052FF; color:white; font-weight:bold; }
.btn-buy { background:#6366f1; color:white; width:100%; margin-top:10px; }
</style>
</head>

<body>

<div class="card">
    <h2>Web3 Domain</h2>
    <p id="user-status">Bağlı değil</p>
    <button class="pi-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
</div>

<div class="card">
    <h3>Domainler</h3>
    <div id="domain-list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "xxx",
    authDomain: "web3-domain-gateway.firebaseapp.com",
    projectId: "web3-domain-gateway"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= STATE ================= */
let isAuth = false;
let currentUser = null;
let paymentInProgress = false;

const domains = [
  { name:"test-domain", price:10 },
  { name:"etstur.pi", price:250 },
  { name:"eminevim.pi", price:150 }
];

let domainData = {};

/* ================= DOMAIN RENDER (DOĞRU YER) ================= */
function renderDomains() {

    const list = document.getElementById("domain-list");
    if (!list || !isAuth) return;

    list.innerHTML = "";

    domains.forEach(d => {

        const data = domainData[d.name] || { sold:false };

        const div = document.createElement("div");
        div.className = "domain-card";

        div.innerHTML = `
            <b>${d.name}</b><br>
            <span>${data.sold ? "SATILDI" : d.price + " PI"}</span>
        `;

        if (!data.sold) {
            const btn = document.createElement("button");
            btn.className = "btn-buy";
            btn.innerText = "Satın Al";
            btn.onclick = () => startPurchase(d.name, d.price);
            div.appendChild(btn);
        }

        list.appendChild(div);
    });
}

/* ================= FIRESTORE LISTEN ================= */
domains.forEach(d => {
    onSnapshot(doc(db, "domains", d.name), (snap) => {
        domainData[d.name] = snap.exists() ? snap.data() : { sold:false };
        renderDomains();
    });
});

/* ================= LOGIN ================= */
window.loginWithPi = function () {

    if (!window.Pi) {
        alert("Pi SDK yok");
        return;
    }

    Pi.authenticate(['username','payments'])
    .then(auth => {

        currentUser = auth.user.username;
        isAuth = true;

        document.getElementById("user-status").innerText =
            "Bağlı: @" + currentUser;

        renderDomains();
    })
    .catch(err => {
        alert("Login error: " + err.message);
    });
};

/* ================= PURCHASE (TEMİZ HAL) ================= */
window.startPurchase = async function(domain, amount) {

    if (!isAuth || paymentInProgress) return;
    paymentInProgress = true;

    try {

        await Pi.createPayment(
            {
                amount: Number(amount),
                memo: "Domain: " + domain,
                metadata: { domain }
            },
            {
                onReadyForServerApproval: async function(paymentId) {

                    await fetch("/api/approve", {
                        method:"POST",
                        headers:{ "Content-Type":"application/json" },
                        body: JSON.stringify({
                            paymentId,
                            action:"approve"
                        })
                    });
                },

                onReadyForServerCompletion: async function(paymentId, txid) {

                    await fetch("/api/approve", {
                        method:"POST",
                        headers:{ "Content-Type":"application/json" },
                        body: JSON.stringify({
                            paymentId,
                            action:"complete",
                            txid
                        })
                    });

                    await setDoc(doc(db,"domains",domain),{
                        sold:true,
                        txid,
                        soldAt: new Date().toISOString()
                    });

                    paymentInProgress = false;
                    alert("Satın alma başarılı!");
                    renderDomains();
                },

                onCancel: function() {
                    paymentInProgress = false;
                },

                onError: function(err) {
                    paymentInProgress = false;
                    alert(err.message);
                }
            }
        );

    } catch(e) {
        paymentInProgress = false;
        alert(e.message);
    }
};

</script>

</body>
</html>
