<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .domain-card { background: #334155; padding: 20px; margin: 10px; border-radius: 12px; border: 1px solid #475569; cursor: pointer; display: inline-block; width: 40%; }
        button { padding: 15px; background: #6366f1; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Domain Market</h1>
    <button id="auth-btn" onclick="login()">Pi ile Bağlan</button>
    <div id="market" style="margin-top:20px;"></div>

    <script>
        Pi.init({ version: "2.0", sandbox: true });

        async function login() {
            try {
                const auth = await Pi.authenticate(['payments'], () => {});
                document.getElementById('auth-btn').innerText = "Bağlı: @" + auth.user.username;
                document.getElementById('auth-btn').disabled = true;
                showMarket();
            } catch (e) { alert("Bağlantı hatası!"); }
        }

        function showMarket() {
            const domains = ['etstur.pi', 'eminevim.pi', 'fuzulev.pi', 'fibabank.pi', 'sekerbank.pi', 'doganay.pi'];
            const market = document.getElementById('market');
            domains.forEach(d => {
                const div = document.createElement('div');
                div.className = 'domain-card';
                div.innerHTML = `<strong>${d}</strong><br>1000 Pi`;
                div.onclick = () => {
                    Pi.createPayment({ amount: 1000, memo: "Domain: " + d, metadata: { domain: d } }, {
                        onReadyForServerCompletion: (id, txid) => alert("Başarılı!"),
                        onError: (err) => alert("Hata: " + err.message)
                    });
                };
                market.appendChild(div);
            });
        }
    </script>
</body>
</html>
