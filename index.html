<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --text:#f8fafc; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; display:flex; justify-content:center; }
        .container { max-width:600px; width:100%; text-align:center; }
        .card { background:var(--card); padding:25px; border-radius:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom:20px; }
        .domain-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px; }
        .domain-card { background:#334155; padding:20px; border-radius:12px; border:1px solid #475569; display:flex; flex-direction:column; align-items:center; }
        .domain-img { width:100%; height:120px; margin-bottom:10px; border-radius:12px; object-fit:contain; }
        .btn-buy { background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; width:100%; }
        .pi-btn { background:#0052FF; color:#ffffff; padding:12px 30px; border-radius:50px; border:1px solid rgba(255,255,255,0.2); cursor:pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count">Aktif Kullanıcı: 0</p>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">Pi ile Bağlan</button>
    </div>
    <div class="card" id="admin-panel" style="display:none; text-align:left;">
        <h3 style="color:#6366f1;">🛠 Admin Paneli</h3>
        <div id="log-list" style="font-size:0.85em;"></div>
    </div>
    <div class="card">
        <div class="domain-grid" id="domain-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "s3ddhcea9xae0qieikgjy9zw9tduemnraoucjrr9iqe87pduhczmd95kq8n3aai1", authDomain: "web3-domain-gateway.firebaseapp.com", projectId: "web3-domain-gateway" };
    const db = getFirestore(initializeApp(firebaseConfig));

    let paymentInProgress = false, isAuth = false, domainData = {}, currentUser = null;
    const domains = [
        { name:'test-domain', img:'assets/test.jpeg', price:10 },
        { name:'etstur.pi', img:'assets/etstur.jpeg', price:250 },
        { name:'eminevim.pi', img:'assets/eminevim.jpeg', price:150 },
        { name:'fuzulev.pi', img:'assets/fuzulev.jpeg', price:300 },
        { name:'fibabank.pi', img:'assets/fibabank.jpeg', price:500 },
        { name:'sekerbank.pi', img:'assets/sekerbank.jpeg', price:600 },
        { name:'doganay.pi', img:'assets/doganay.jpeg', price:150 }
    ];

    window.renderDomains = function() {
        const list = document.getElementById("domain-list");
        if (!list || !isAuth) return;
        list.innerHTML = '';
        domains.forEach(d => {
            const data = domainData[d.name] || { sold:false, price:d.price };
            const card = document.createElement('div'); card.className = 'domain-card';
            card.innerHTML = `<img src="${d.img}" class="domain-img"><strong>${d.name}</strong><br><span>${data.sold ? 'SATILDI' : data.price + ' Pi'}</span>`;
            if (!data.sold) {
                const btn = document.createElement('button'); btn.className = 'btn-buy';
                btn.innerText = paymentInProgress ? 'Bekleniyor...' : 'Satın Al';
                btn.onclick = () => startPurchase(d.name, data.price);
                card.appendChild(btn);
            }
            list.appendChild(card);
        });
    };

    window.loginWithPi = function() {
        Pi.authenticate(['username', 'payments'], {
            onIncompletePaymentFound: (p) => {
                fetch('/api/approve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ paymentId: p.identifier, action: 'cancel' }) })
                .then(() => location.reload());
            }
        }).then(auth => {
            isAuth = true; currentUser = auth.user.username;
            document.getElementById("user-status").innerText = "Bağlı: @" + currentUser;
            document.getElementById("auth-btn").style.display = "none";
            renderDomains();
        });
    };

    window.startPurchase = async function(domain, amount) {
        if (paymentInProgress) return;
        paymentInProgress = true;
        try {
            await Pi.createPayment({ amount: Number(amount), memo: domain, metadata: { domain } }, {
                onReadyForServerApproval: async (id) => {
                    await fetch('/api/approve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ paymentId: id, action: 'approve' }) });
                },
                onReadyForServerCompletion: async (id, txid) => {
                    await setDoc(doc(db, "domains", domain), { sold: true, txid }, { merge: true });
                    paymentInProgress = false; alert("Satın alma başarılı!");
                },
                onCancel: () => { paymentInProgress = false; },
                onError: (e) => { paymentInProgress = false; alert("Hata: " + e.message); }
            });
        } catch (e) { paymentInProgress = false; alert(e.message); }
    };

    window.addEventListener("load", () => {
        if (window.Pi) Pi.init({ version: "2.0", sandbox: true });
        domains.forEach(d => {
            onSnapshot(doc(db, "domains", d.name), (s) => { domainData[d.name] = s.data() || {sold:false, price:d.price}; renderDomains(); });
        });
    });
</script>
</body>
</html>
