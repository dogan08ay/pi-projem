<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Domain Gateway</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

:root {
    --bg:#0f172a;
    --card:#1e293b;
    --accent:#6366f1;
    --text:#f8fafc;
}

body {
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text);
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container {
    max-width:600px;
    width:100%;
    text-align:center;
}

.card {
    background:var(--card);
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
}

.domain-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
}

.domain-card {
    background:#334155;
    padding:20px;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.domain-img {
    width:100%;
    height:120px;
    object-fit:contain;
    margin-bottom:10px;
}

.btn-buy {
    background:var(--accent);
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:8px;
    width:100%;
}

.pi-btn {
    background:#0052FF;
    color:white;
    padding:12px 30px;
    border-radius:50px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Web3 Domain</h1>

<p id="user-status">Bağlanmadı</p>

<button class="pi-btn" id="auth-btn" onclick="loginWithPi()">
Pi ile Bağlan
</button>

</div>

<div class="card">

<div id="domain-list"></div>

</div>

</div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import {
getFirestore,
doc,
onSnapshot,
setDoc
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "xxx",
authDomain: "xxx",
projectId: "xxx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= PI SAFE WRAPPER ================= */

const PI = () => (typeof Pi !== "undefined" ? Pi : null);

try {
    PI()?.init({ version:"2.0", sandbox:true });
} catch(e) {
    console.log("Pi init skip");
}

/* ================= STATE ================= */

let user = null;
let paymentLock = false;

/* ================= DOMAINS ================= */

const domains = [
{ name:"test-domain", price:10, img:"assets/test.jpeg" },
{ name:"eminevim.pi", price:150, img:"assets/eminevim.jpeg" }
];

/* ================= RENDER ================= */

function render() {

const list = document.getElementById("domain-list");
if (!user) return;

list.innerHTML = "";

domains.forEach(d => {

const div = document.createElement("div");
div.className = "domain-card";

div.innerHTML = `
<img class="domain-img" src="${d.img}">
<strong>${d.name}</strong>
<span>${d.price} Pi</span>
`;

const btn = document.createElement("button");
btn.className = "btn-buy";
btn.innerText = paymentLock ? "Bekleyin" : "Satın Al";

btn.onclick = () => startPurchase(d);

div.appendChild(btn);
list.appendChild(div);

});

}

/* ================= LOGIN ================= */

window.loginWithPi = async function() {

const pi = PI();
if (!pi) return alert("Pi SDK yok");

try {

const auth = await pi.authenticate(['username','payments'], () => {});

user = auth.user;
document.getElementById("user-status").innerText = "Bağlı: @" + user.username;

render();

} catch(e) {
alert("Login error");
}

};

/* ================= PAYMENT SAFE FIX ================= */

window.startPurchase = async function(d) {

if (!user) return alert("Login ol");
if (paymentLock) return;

const pi = PI();
if (!pi) return;

paymentLock = true;
render();

try {

/* 🔥 CRITICAL FIX: pending check SAFE */
const pending = await (pi.getIncompleteServerPayments?.() || []);

if (pending.length > 0) {
paymentLock = false;
return alert("Önce pending ödeme bitir");
}

pi.createPayment(
{
amount: d.price,
memo: d.name,
metadata: { domain: d.name }
},
{
onReadyForServerApproval: async (id) => {
await fetch("/api/approve", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ paymentId:id, action:"approve" })
});
},

onReadyForServerCompletion: async (id, txid) => {
await setDoc(doc(db,"domains",d.name), {
sold:true,
txid
},{ merge:true });

await fetch("/api/approve", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ paymentId:id, action:"complete", txid })
});

paymentLock = false;
render();
alert("Satın alındı");
},

onCancel: () => {
paymentLock = false;
render();
},

onError: (e) => {
paymentLock = false;
console.log(e);
}
}
);

} catch(e) {
paymentLock = false;
console.log(e);
}

};

</script>

</body>
</html>
