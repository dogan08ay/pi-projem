<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc, collection, setDoc, deleteDoc, getDocs, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A",
    authDomain: "web3-domain-gateway.firebaseapp.com",
    projectId: "web3-domain-gateway",
    storageBucket: "web3-domain-gateway.firebasestorage.app",
    messagingSenderId: "315563254318",
    appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Sandbox modunu test aşamasında true bırakın, canlıya alırken false yapın
Pi.init({ version: "2.0", sandbox: true });

let isUserAuthenticated = false;
let paymentInProgress = false;
let domainData = {};
const domains = [ /* Aynı domain listeniz burada kalacak */ ];

// YARIM KALAN ÖDEME YÖNETİMİ
const onIncompletePaymentFound = (payment) => {
    console.log("Yarım kalan ödeme bulundu, tamamlanıyor...");
    handleServerSidePayment(payment.identifier, 'complete', payment.transaction.txid);
};

window.loginWithPi = function() {
    Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
    .then(async (auth) => {
        isUserAuthenticated = true;
        document.getElementById('user-status').innerText = "Bağlı: @" + auth.user.username;
        document.getElementById('auth-btn').style.display = 'none';
        render();
        // ... (Kullanıcı loglama ve admin panel kodlarınız aynen kalsın)
    })
    .catch(err => { alert("Giriş başarısız: " + err); });
};

window.startPurchase = function(domain, amount) {
    if (!isUserAuthenticated) return alert("Önce giriş yapın");
    if (paymentInProgress) return alert("İşlem devam ediyor, lütfen bekleyin.");

    const selectedDomain = domainData[domain];
    if (selectedDomain?.sold === true) return alert("Bu domain zaten satılmış.");

    paymentInProgress = true;

    Pi.createPayment({
        amount: Number(amount),
        memo: "Domain: " + domain,
        metadata: { domain: domain }
    }, {
        onReadyForServerApproval: (paymentId) => {
            handleServerSidePayment(paymentId, 'approve', null);
        },
        onReadyForServerCompletion: (paymentId, txid) => {
            // Firestore güncellendiğinde UI zaten onSnapshot ile güncellenir
            updateDoc(doc(db, "domains", domain), {
                sold: true,
                txid: txid,
                soldAt: new Date().toISOString()
            }).then(() => {
                handleServerSidePayment(paymentId, 'complete', txid);
                paymentInProgress = false;
                alert("✅ Satın alma başarıyla tamamlandı!");
            }).catch(e => {
                paymentInProgress = false;
                alert("Veritabanı hatası: " + e.message);
            });
        },
        onCancel: () => {
            paymentInProgress = false;
            alert("Ödeme iptal edildi.");
        },
        onError: (err) => {
            paymentInProgress = false;
            alert("Ödeme hatası: " + (err.message || err));
        }
    });
};

function handleServerSidePayment(paymentId, action, txid) {
    // Burada fetch isteğiniz kalacak, hata olsa bile akışı bozmamak için 
    // catch bloğunda paymentInProgress'i resetlemeyin (sadece loglayın)
    fetch('/api/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentId, action, txid })
    }).catch(err => console.error("Server API hatası:", err));
}

// ... (Render ve diğer fonksiyonlarınız aynen kalsın)
</script>
