<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --text:#f8fafc; --sold:#ef4444; --price:#fbbf24; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:5px; display:flex; justify-content:center; min-height: 100vh; }
        .container { max-width:600px; width:100%; text-align:center; }
        .card { background:var(--card); padding:10px; border-radius:18px; margin-bottom:8px; }
        .domain-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:5px; }
        .domain-card { background:#334155; padding:8px; border-radius:10px; border:1px solid #475569; display:flex; flex-direction:column; align-items:center; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 6px 8px; border-radius: 6px; cursor: pointer; margin-top: 4px; width: 100%; }
        .btn-sold { background: rgba(239, 68, 68, 0.1); color: var(--sold); border: 1.5px solid var(--sold); padding: 5px 8px; border-radius: 6px; width: 100%; margin-top:4px; }
        .pi-btn { background: #3b82f6; color:#ffffff; padding:10px 25px; border-radius:50px; border:none; cursor:pointer; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center; z-index:9999; }
        .modal-content { background:var(--card); padding:20px; border-radius:20px; border:2px solid #fbbf24; width:300px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1 class="app-title">Web3 Domain Gateway</h1>
        <div id="user-status-box" style="display:none;"><p id="user-status"></p></div>
    </div>
    <div class="card">
        <div id="domain-list" class="domain-grid"></div>
    </div>
</div>

<div id="pre-buy-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h2>ÖDEME ONAYI</h2>
        <button class="pi-btn" id="confirm-buy-btn">ÖDEMEYE GEÇ</button>
        <button class="pi-btn" style="background:#475569;" onclick="document.getElementById('pre-buy-modal').style.display='none'">VAZGEÇ</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "s3ddhcea9xae0qieikgjy9zw9tduemnraoucjrr9iqe87pduhczmd95kq8n3aai1", authDomain: "web3-domain-gateway.firebaseapp.com", projectId: "web3-domain-gateway" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;
let isAuth = false;
let domainData = {};
let pendingDomain = null;
let pendingPrice = 0;

const domains = [
    { name:'test-domain', price:10 }, { name:'etstur.pi', price:250 }, 
    { name:'eminevim.pi', price:150 }, { name:'fuzulev.pi', price:300 },
    { name:'fibabank.pi', price:500 }, { name:'sekerbank.pi', price:600 }, { name:'doganay.pi', price:150 }
];

// Admin manuel iptal fonksiyonu
window.cancelPendingPayment = async function(domainName) {
    if (confirm(domainName + " domainini sıfırlamak istiyor musunuz?")) {
        await setDoc(doc(db, "domains", domainName), { sold: false, price: 150 }, {merge:true});
        alert("Domain tekrar satışa açıldı.");
    }
};

function render() {
    const list = document.getElementById("domain-list");
    list.innerHTML = '';
    domains.forEach(d => {
        const data = domainData[d.name] || { sold:false, price:d.price };
        const card = document.createElement('div');
        card.className = 'domain-card';
        card.innerHTML = `<div>${d.name}</div><div>${data.price} Pİ</div>`;
        
        if (data.sold) { 
            card.innerHTML += `<div class="btn-sold">SATILDI</div>`;
            if (currentUser === "doganay0808") {
                const btn = document.createElement('button');
                btn.className = 'btn-buy';
                btn.style.background = '#ef4444';
                btn.innerText = 'İPTAL ET';
                btn.onclick = () => window.cancelPendingPayment(d.name);
                card.appendChild(btn);
            }
        } else {
            const btn = document.createElement('button');
            btn.className = 'btn-buy';
            btn.innerText = 'SATIN AL';
            btn.onclick = () => { pendingDomain = d.name; pendingPrice = data.price; document.getElementById('pre-buy-modal').style.display='flex'; };
            card.appendChild(btn);
        }
        list.appendChild(card);
    });
}

window.loginWithPi = async function() {
    const auth = await Pi.authenticate(['username', 'payments'], () => {});
    currentUser = auth.user.username;
    isAuth = true;
    document.getElementById("user-status").innerText = "Giriş: @" + currentUser;
    document.getElementById("user-status-box").style.display = "block";
    render();
};

document.getElementById("confirm-buy-btn").onclick = async () => {
    document.getElementById('pre-buy-modal').style.display='none';
    Pi.createPayment({ amount: Number(pendingPrice), memo: "Domain: " + pendingDomain }, {
        onReadyForServerCompletion: async (id, txid) => {
            await setDoc(doc(db, "domains", pendingDomain), { sold: true, txid: txid, buyer: currentUser }, {merge:true});
            render();
        },
        onError: () => alert("Ödeme hatası!")
    });
};

domains.forEach(d => {
    onSnapshot(doc(db, "domains", d.name), (snap) => {
        domainData[d.name] = snap.exists() ? snap.data() : { sold:false, price:d.price };
        render();
    });
});

window.onload = () => { Pi.init({ version: "2.0", sandbox: true }); window.loginWithPi(); };
</script>
</body>
</html>
