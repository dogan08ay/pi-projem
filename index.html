<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Domain Gateway</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#6366f1;
  --text:#f8fafc;
}

body{
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{max-width:600px;width:100%}

.card{
  background:var(--card);
  padding:20px;
  border-radius:18px;
  margin-bottom:20px;
}

.domain-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.domain-card{
  background:#334155;
  padding:15px;
  border-radius:12px;
}

.domain-img{
  width:100%;
  height:120px;
  object-fit:contain;
}

.btn-buy{
  width:100%;
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
}

.pi-btn{
  background:#0052FF;
  padding:12px 25px;
  border-radius:40px;
  color:white;
  border:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Web3 Domain</h2>
<p id="status">Giriş yapılmadı</p>
<button class="pi-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
</div>

<div class="card" id="admin" style="display:none">
<h3>Admin Panel</h3>
<div id="logs"></div>
</div>

<div class="card">
<div id="list"></div>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import {
getFirestore,
doc,
onSnapshot,
setDoc,
updateDoc,
deleteDoc,
collection
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"XXX",
authDomain:"web3-domain-gateway.firebaseapp.com",
projectId:"web3-domain-gateway"
});

const db = getFirestore(app);

/* 🔥 PI INIT */
Pi.init({ version:"2.0", sandbox:true });

/* 🔥 KRİTİK FIX: pending payment handler */
Pi.authenticate([],()=>{});

Pi.onIncompletePaymentFound = async function(payment){

console.log("PENDING:",payment);

try{
await fetch("/api/approve",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
paymentId:payment.identifier,
action:"complete",
txid:payment.transaction?.txid||null
})
});
}catch(e){
console.error("pending fix error",e);
}

return Promise.resolve();
};

let user="";
let auth=false;
let lock=false;

const domains=[
{name:"test-domain",price:10,img:"assets/test.jpeg"},
{name:"etstur.pi",price:250,img:"assets/etstur.jpeg"},
{name:"eminevim.pi",price:150,img:"assets/eminevim.jpeg"},
{name:"fuzulev.pi",price:300,img:"assets/fuzulev.jpeg"},
{name:"fibabank.pi",price:500,img:"assets/fibabank.jpeg"},
{name:"sekerbank.pi",price:600,img:"assets/sekerbank.jpeg"},
{name:"doganay.pi",price:150,img:"assets/doganay.jpeg"}
];

let data={};

/* RENDER */
function render(){

const el=document.getElementById("list");

if(!auth){
el.innerHTML="Giriş yap";
return;
}

el.innerHTML="";

domains.forEach(d=>{

const info=data[d.name]||{sold:false,price:d.price};

const div=document.createElement("div");
div.className="domain-card";

div.innerHTML=`
<img src="${d.img}" class="domain-img">
<b>${d.name}</b><br>
<span>${info.sold?"SATILDI":info.price+" Pi"}</span>
`;

if(!info.sold){
const b=document.createElement("button");
b.className="btn-buy";
b.innerText="Satın Al";
b.onclick=()=>buy(d.name,info.price);
div.appendChild(b);
}

el.appendChild(div);
});

}

/* FIRESTORE */
domains.forEach(d=>{
onSnapshot(doc(db,"domains",d.name),(snap)=>{
if(snap.exists()){
data[d.name]=snap.data();
render();
}
});
});

/* LOGIN */
window.loginWithPi=()=>{
Pi.authenticate(["username","payments"])
.then(async r=>{
user=r.user.username;
auth=true;

document.getElementById("status").innerText="@" + user;

setDoc(doc(db,"online_users",user),{
lastSeen:Date.now()
});

setInterval(()=>{
setDoc(doc(db,"online_users",user),{
lastSeen:Date.now()
},{merge:true});
},30000);

if(user==="doganay0808"){
document.getElementById("admin").style.display="block";
}

render();
});
};

/* BUY */
window.buy=(domain,price)=>{

if(lock) return;
lock=true;

Pi.createPayment({
amount:price,
memo:"Domain:"+domain,
metadata:{domain}
},{
onReadyForServerApproval:(id)=>{
fetch("/api/approve",{method:"POST"});
},

onReadyForServerCompletion:async(id,txid)=>{

await updateDoc(doc(db,"domains",domain),{
sold:true,
txid,
soldAt:new Date().toISOString()
});

lock=false;
render();

alert("Satın alma başarılı");
},

onCancel:()=>{
lock=false;
},

onError:(e)=>{
lock=false;
alert(e.message);
}
});

};

</script>

</body>
</html>
