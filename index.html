<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; display: flex; flex-direction: column; align-items: center; }
        .domain-img { width: 100%; height: 120px; margin-bottom: 10px; border-radius: 12px; object-fit: contain; background-color: #334155; padding: 5px; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        #auth-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        
        /* GİZLİ YÖNETİCİ PANELİ STİLİ */
        .admin-panel { display: none; background: #0f172a; border: 2px dashed #10b981; padding: 20px; border-radius: 20px; margin-top: 20px; text-align: left; }
        .log-day { background: #1e293b; padding: 10px; margin-bottom: 8px; border-radius: 8px; font-size: 0.85em; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count" style="color: #a5b4fc; font-size: 0.9em;">Aktif Kullanıcı: Yükleniyor...</p>
        <p id="user-status">Lütfen bağlanın.</p>
        <button id="auth-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card" id="main-content" style="display: none;">
        <div class="domain-grid" id="domain-list"></div>
    </div>

    <div class="admin-panel" id="admin-panel">
        <h3 style="color: #10b981; margin-top: 0;">📊 Günlük Giriş Kayıtları</h3>
        <div id="logs-container"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, setDoc, arrayUnion, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A",
        authDomain: "web3-domain-gateway.firebaseapp.com",
        projectId: "web3-domain-gateway",
        storageBucket: "web3-domain-gateway.firebasestorage.app",
        messagingSenderId: "315563254318",
        appId: "1:315563254318:web:12f2f3f340bb69606df5bf",
        measurementId: "G-1MC05YBPCC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ADMIN_USER = "doganay0808";

    // 1. Pi Başlatma
    Pi.init({ version: "2.0", sandbox: true });

    // 2. Giriş Fonksiyonu
    window.loginWithPi = function() {
        Pi.authenticate(['username'], () => {}).then(async (auth) => {
            const username = auth.user.username;
            document.getElementById('user-status').innerText = "Bağlı: @" + username;
            document.getElementById('auth-btn').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // Admin kontrolü
            if (username === ADMIN_USER) {
                document.getElementById('admin-panel').style.display = 'block';
                loadAdminLogs();
            }

            // Domainleri render et
            renderDomains();

            // Günlük Log Kaydı
            const today = new Date().toISOString().split('T')[0];
            await setDoc(doc(db, "login_logs", today), { users: arrayUnion(username) }, { merge: true });
            
        }).catch(err => alert("Giriş başarısız: " + err.message));
    }

    // 3. Domain Listesini Göster
    function renderDomains() {
        const list = document.getElementById('domain-list');
        list.innerHTML = `
            <div class="domain-card"><strong>doganay.pi</strong><button class="btn-buy">Satın Al</button></div>
            <div class="domain-card"><strong>test.pi</strong><button class="btn-buy">Satın Al</button></div>
        `;
    }

    // 4. Admin Loglarını Yükle
    function loadAdminLogs() {
        onSnapshot(query(collection(db, "login_logs"), orderBy("__name__", "desc")), (snap) => {
            const container = document.getElementById('logs-container');
            container.innerHTML = '';
            snap.forEach(doc => {
                container.innerHTML += `<div class="log-day"><b>${doc.id}</b>: ${doc.data().users.join(', ')}</div>`;
            });
        });
    }

    // 5. Sayaç
    onSnapshot(collection(db, "online_users"), (snap) => {
        document.getElementById('online-count').innerText = "Aktif Kullanıcı: " + snap.size;
    });
</script>
</body>
</html>
