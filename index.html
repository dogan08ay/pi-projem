<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .card { background: #334155; padding: 15px; margin: 10px; border-radius: 8px; border: 1px solid #6366f1; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background: #6366f1; color: white; }
        .sold { background: #475569; cursor: not-allowed; opacity: 0.7; }
        #history { margin-top: 30px; padding-top: 20px; border-top: 1px solid #475569; }
    </style>
</head>
<body>
    <h1>Domain Market</h1>
    <div id="status">Bağlı: @doganay0808</div>
    <div id="market"></div>
    <div id="history"><h3>İşlemlerim</h3><ul id="list"></ul></div>

    <script>
        Pi.init({ version: "2.0", sandbox: true });
        const market = document.getElementById('market');
        const list = document.getElementById('list');
        const domains = ['etstur.pi', 'eminevim.pi', 'fuzulev.pi', 'fibabank.pi'];

        domains.forEach(d => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<strong>${d}</strong><br><br><button class="btn" id="btn-${d}" onclick="odemeYap('${d}')">0.1 Pi Satın Al</button>`;
            market.appendChild(div);
        });

        function odemeYap(domain) {
            const btn = document.getElementById(`btn-${domain}`);
            btn.innerText = "Yükleniyor...";
            
            Pi.createPayment({
                amount: 0.1,
                memo: "Domain: " + domain,
                metadata: { domain: domain }
            }, {
                onReadyForServerCompletion: (id, txid) => {
                    alert("Başarılı! Tx: " + txid);
                    btn.innerText = "SATILDI";
                    btn.className = "btn sold";
                    btn.disabled = true;
                    const li = document.createElement('li');
                    li.innerText = `${domain} - TxID: ${txid.substring(0,10)}...`;
                    list.appendChild(li);
                },
                onError: (err) => { btn.innerText = "0.1 Pi Satın Al"; alert("Hata!"); },
                onCancel: () => { btn.innerText = "0.1 Pi Satın Al"; }
            });
        }
    </script>
</body>
</html>
