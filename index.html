<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Domain Gateway</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
:root {
    --bg:#0f172a;
    --card:#1e293b;
    --accent:#6366f1;
    --text:#f8fafc;
}

body {
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text);
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container { max-width:600px; width:100%; text-align:center; }

.card {
    background:var(--card);
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
}

.domain-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.domain-card {
    background:#334155;
    padding:20px;
    border-radius:12px;
}

.btn-buy {
    background:var(--accent);
    color:white;
    border:none;
    padding:8px;
    width:100%;
}
.pi-btn {
    background:#0052FF;
    color:white;
    padding:12px;
    border-radius:50px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
    <h1>Web3 Domain</h1>
    <p id="user-status">Bağlı değil</p>
    <button class="pi-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
</div>

<div class="card">
    <div class="domain-grid" id="domain-list"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "xxx",
    authDomain: "web3-domain-gateway.firebaseapp.com",
    projectId: "web3-domain-gateway"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= STATE ================= */
let currentUser = null;
let isAuth = false;
let paymentInProgress = false;

/* ================= DOMAIN DATA ================= */
const domains = [
  { name:"test-domain", price:10 },
  { name:"etstur.pi", price:250 },
  { name:"eminevim.pi", price:150 }
];

let domainData = {};

/* ================= RENDER (GLOBAL FIX) ================= */
function renderDomains() {

    const list = document.getElementById("domain-list");
    if (!list || !isAuth) return;

    list.innerHTML = "";

    domains.forEach(d => {

        const data = domainData[d.name] || { sold:false };

        const div = document.createElement("div");
        div.className = "domain-card";

        div.innerHTML = `
            <b>${d.name}</b><br>
            <span>${data.sold ? "SATILDI" : d.price + " PI"}</span>
        `;

        if (!data.sold) {
            const btn = document.createElement("button");
            btn.className = "btn-buy";
            btn.innerText = "Satın Al";
            btn.onclick = () => startPurchase(d.name, d.price);
            div.appendChild(btn);
        }

        list.appendChild(div);
    });
}

/* ================= FIRESTORE ================= */
domains.forEach(d => {
    onSnapshot(doc(db,"domains",d.name),(snap)=>{
        domainData[d.name] = snap.exists() ? snap.data() : { sold:false };
        renderDomains();
    });
});

/* ================= PI LOGIN FIX (CRITICAL) ================= */
window.loginWithPi = function () {

    if (!window.Pi) {
        alert("Pi SDK yüklenmedi (sandbox/preview kontrol et)");
        return;
    }

    Pi.init({ version: "2.0", sandbox: true });

    Pi.authenticate(['username','payments'])
    .then(auth => {

        currentUser = auth.user.username;
        isAuth = true;

        document.getElementById("user-status").innerText =
            "Bağlı: @" + currentUser;

        renderDomains();

    })
    .catch(err => {
        console.error(err);
        alert("Pi login hatası: " + err.message);
    });
};

/* ================= PAYMENT FIX ================= */
window.startPurchase = async function(domain, amount) {

    if (!isAuth || paymentInProgress) return;
    paymentInProgress = true;

    try {

        await Pi.createPayment(
            {
                amount: Number(amount),
                memo: "Domain: " + domain,
                metadata: { domain }
            },
            {

                onReadyForServerApproval: async function(paymentId) {
                    await fetch("/api/approve", {
                        method:"POST",
                        headers:{ "Content-Type":"application/json" },
                        body: JSON.stringify({
                            paymentId,
                            action:"approve"
                        })
                    });
                },

                onReadyForServerCompletion: async function(paymentId, txid) {

                    await fetch("/api/approve", {
                        method:"POST",
                        headers:{ "Content-Type":"application/json" },
                        body: JSON.stringify({
                            paymentId,
                            action:"complete",
                            txid
                        })
                    });

                    await setDoc(doc(db,"domains",domain),{
                        sold:true,
                        txid,
                        soldAt: new Date().toISOString()
                    });

                    paymentInProgress = false;
                    renderDomains();
                    alert("Satın alma başarılı!");
                },

                onCancel: function() {
                    paymentInProgress = false;
                },

                onError: function(e) {
                    paymentInProgress = false;
                    alert(e.message);
                }
            }
        );

    } catch(e) {
        paymentInProgress = false;
        alert(e.message);
    }
};

</script>

</body>
</html>
