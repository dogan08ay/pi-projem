<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .domain-card { background: #334155; padding: 15px; border-radius: 12px; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <button id="auth-btn" style="padding: 15px 30px; font-weight: bold;" onclick="girisYap()">Pi ile Bağlan</button>
        <p id="durum">Bağlantı bekleniyor...</p>
    </div>

    <div class="card">
        <div class="domain-grid" id="domain-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A", projectId: "web3-domain-gateway" }));

    // 1. SDK Başlatma
    window.addEventListener('load', () => {
        if (typeof Pi !== 'undefined') Pi.init({ version: "2.0", sandbox: true });
    });

    // 2. Fonksiyonu window'a atıyoruz ki buton görsün
    window.girisYap = function() {
        if (typeof Pi === 'undefined') { alert("Pi SDK yüklenmedi! Pi Browser'da olduğunuzdan emin olun."); return; }
        
        Pi.authenticate(['username', 'payments'], () => {}).then(auth => {
            document.getElementById('durum').innerText = "Bağlı: @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
            render(true);
        }).catch(err => alert("Giriş hatası: " + err.message));
    };

    window.odemeYap = function(domain, fiyat) {
        Pi.createPayment({ 
            amount: fiyat, 
            memo: "Domain: "+domain, 
            metadata: {domain: domain} 
        }, {
            onReadyForServerApproval: (id) => console.log("Onay bekliyor"),
            onReadyForServerCompletion: (id, txid) => {
                updateDoc(doc(db, "domains", domain), { sold: true });
                alert("Satın alındı!");
                location.reload();
            },
            onCancel: () => alert("İptal edildi."),
            onError: (err) => alert("Hata: " + err.message)
        });
    };

    function render(yetkili) {
        const list = document.getElementById('domain-list');
        list.innerHTML = '';
        if(!yetkili) return;
        
        const domains = [{name: 'etstur.pi', fiyat: 250}, {name: 'test-domain', fiyat: 10}];
        domains.forEach(d => {
            list.innerHTML += `<div class="domain-card"><strong>${d.name}</strong><br>${d.fiyat} Pi<br><button class="btn-buy" onclick="odemeYap('${d.name}', ${d.fiyat})">Satın Al</button></div>`;
        });
    }
</script>
</body>
</html>
