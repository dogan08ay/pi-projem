<div class="card">
    <h1>Web3 Domain</h1>
    <p id="online-count" style="color: #60a5fa; font-size: 0.9em; margin-bottom: 15px; font-weight: 600; letter-spacing: 0.5px;">
        Sistemdeki Online Kullanıcı: 0
    </p>
    <p id="user-status">Lütfen önce bağlanın.</p>
    <button id="auth-btn" class="pi-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
</div>

<script type="module">
    // ... (Diğer importlar aynı kalacak)

    // Sayacı daha profesyonel hale getiren bölüm
    window.addEventListener('load', () => {
        const today = new Date().toISOString().split('T')[0];
        const logsRef = collection(db, "daily_logs");
        
        onSnapshot(query(logsRef, where("date", "==", today)), (snap) => {
            const count = snap.size || 0;
            document.getElementById('online-count').innerHTML = `
                <span style="display:inline-block; width:8px; height:8px; background:#22c55e; border-radius:50%; margin-right:6px;"></span>
                Sistemdeki Online Kullanıcı: <b>${count}</b>
            `;
        });
    });

    // Pi Login için daha güvenli tetikleyici
    window.loginWithPi = async function() {
        if (typeof Pi === 'undefined') {
            alert("Pi Browser algılanamadı. Lütfen sayfayı Pi Browser içinde açın.");
            return;
        }

        try {
            const auth = await Pi.authenticate(['username', 'payments'], () => {});
            isUserAuthenticated = true;
            document.getElementById('user-status').innerText = "Bağlı: @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
            
            // Veritabanına kaydı işle
            await setDoc(doc(db, "daily_logs", auth.user.username + "_" + new Date().toISOString().split('T')[0]), { 
                username: auth.user.username, 
                date: new Date().toISOString().split('T')[0] 
            });

            if(auth.user.username === "doganay0808") {
                document.getElementById('admin-panel').style.display = 'block';
                // ... (Admin paneli mantığı aynı)
            }
            render();
        } catch (err) {
            console.error("Giriş Hatası:", err);
            alert("Giriş sırasında bir hata oluştu.");
        }
    }
    // ...
</script>
