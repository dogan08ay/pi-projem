<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .card { background: #334155; padding: 20px; margin: 15px; border-radius: 10px; cursor: pointer; border: 1px solid #6366f1; }
    </style>
</head>
<body>
    <h1>Domain Listesi</h1>
    <div id="app">Yükleniyor...</div>

    <script>
        // Senin daha önce paylaştığın ve sisteme kayıtlı olan App ID
        const APP_ID = 'web3-domain-gateway'; 

        Pi.init({ version: "2.0", sandbox: true });

        Pi.onReady(() => {
            document.getElementById('app').innerHTML = "";
            const domains = ['etstur.pi', 'eminevim.pi', 'fuzulev.pi'];
            domains.forEach(d => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerText = "Satın Al: " + d;
                div.onclick = () => odemeYap(d);
                document.getElementById('app').appendChild(div);
            });
        });

        function odemeYap(domain) {
            Pi.createPayment({
                amount: 0.1,
                memo: "Domain: " + domain,
                metadata: { domain: domain }
            }, {
                onReadyForServerCompletion: (id, txid) => alert("Başarılı! Tx: " + txid),
                onError: (err) => alert("Hata: " + err.message),
                onCancel: () => alert("İptal edildi.")
            });
        }
    </script>
</body>
</html>
