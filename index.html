<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        #auth-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4); }
        .admin-panel { display: none; border: 2px solid #6366f1; padding: 20px; border-radius: 15px; margin-top: 20px; background: #1e293b; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card admin-panel" id="admin-panel">
        <h2 style="color: var(--accent);">🛠 Yönetici Paneli</h2>
        <input type="date" id="admin-date" style="padding: 10px; border-radius: 8px; width: 90%;">
        <button onclick="viewLogs()" class="btn-buy">Verileri Görüntüle</button>
        <div id="log-results" style="margin-top: 15px; font-size: 0.9em; text-align: left;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A",
        authDomain: "web3-domain-gateway.firebaseapp.com",
        projectId: "web3-domain-gateway",
        storageBucket: "web3-domain-gateway.firebasestorage.app",
        messagingSenderId: "315563254318",
        appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    Pi.init({ version: "2.0", sandbox: true });

    window.loginWithPi = function() {
        Pi.authenticate(['username'], () => {})
        .then(async (auth) => {
            const username = auth.user.username;
            document.getElementById('user-status').innerText = "Bağlı: @" + username;
            document.getElementById('auth-btn').style.display = 'none';

            // Admin kontrolü
            const adminDoc = await getDoc(doc(db, "admins", username));
            if (adminDoc.exists() && adminDoc.data().role === "admin") {
                document.getElementById('admin-panel').style.display = 'block';
            }
        })
        .catch(err => alert("Giriş başarısız: " + err));
    }

    window.viewLogs = async () => {
        const date = document.getElementById('admin-date').value;
        if(!date) return alert("Lütfen tarih seçin!");
        const q = query(collection(db, "daily_logs"), where("date", "==", date));
        const querySnapshot = await getDocs(q);
        let list = "<strong>" + date + " Kayıtları:</strong><br>";
        querySnapshot.forEach((doc) => { list += "- " + doc.data().username + "<br>"; });
        document.getElementById('log-results').innerHTML = list || "Bu tarihte kayıt yok.";
    }
</script>
</body>
</html>
