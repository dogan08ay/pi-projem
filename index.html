<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .item { background: #334155; padding: 15px; border-radius: 10px; border: 1px solid #6366f1; cursor: pointer; display: none; }
    </style>
</head>
<body>

<h1>Domain Market</h1>
<button id="login" onclick="login()">Bağlan</button>
<div id="grid" class="grid">
    <div class="item" id="etstur" onclick="pay('etstur.pi')"><strong>etstur.pi</strong><br>1000 Pi</div>
    <div class="item" id="eminevim" onclick="pay('eminevim.pi')"><strong>eminevim.pi</strong><br>1000 Pi</div>
</div>

<script>
    // 1. SDK Başlatma
    Pi.init({ version: "2.0", sandbox: true });

    async function login() {
        try {
            const auth = await Pi.authenticate(['payments'], () => {});
            document.getElementById('login').innerText = "Bağlı: @" + auth.user.username;
            // Bağlanınca butonları göster
            document.querySelectorAll('.item').forEach(i => i.style.display = 'block');
        } catch (e) { alert("Bağlantı hatası"); }
    }

    function pay(domain) {
        // 2. Doğrudan ödeme çağrısı
        Pi.createPayment({
            amount: 1000,
            memo: "Domain: " + domain,
            metadata: { domain: domain }
        }, {
            onReadyForServerCompletion: (id, txid) => alert("Başarılı!"),
            onError: (err) => alert("Hata: " + err.message),
            onCancel: () => {}
        });
    }
</script>
</body>
</html>
