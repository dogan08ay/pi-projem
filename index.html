<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <button onclick="testOdeme()">Test Ödemesini Başlat</button>
    <script>
        Pi.init({ version: "2.0", sandbox: true });
        function testOdeme() {
            Pi.createPayment({
                amount: 0.1,
                memo: "Test",
                metadata: { type: "test" }
            }, {
                onReadyForServerCompletion: (id, txid) => alert("Başarılı! ID: " + txid),
                onError: (e) => alert("Hata: " + e),
                onCancel: () => alert("İptal edildi.")
            });
        }
    </script>
</body>
</html>
