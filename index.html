<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .domain-img { width: 100%; height: 120px; margin-bottom: 10px; border-radius: 12px; object-fit: contain; background-color: #334155; padding: 5px; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        #auth-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .footer { font-size: 0.8em; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count" style="color: #a5b4fc; font-size: 0.9em; margin-bottom: 10px;">Aktif Kullanıcı: Yukleniyor...</p>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card">
        <h3>Satıştaki Domainler</h3>
        <div class="domain-grid" id="domain-list"></div>
    </div>

    <div class="footer">
        <p>Sorularınız için: <strong>doganay08@hotmail.com</strong></p>
        <a href="privacy.html" style="color: var(--accent);">Gizlilik Politikası</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A",
        authDomain: "web3-domain-gateway.firebaseapp.com",
        projectId: "web3-domain-gateway",
        storageBucket: "web3-domain-gateway.firebasestorage.app",
        messagingSenderId: "315563254318",
        appId: "1:315563254318:web:12f2f3f340bb69606df5bf",
        measurementId: "G-1MC05YBPCC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const analytics = getAnalytics(app);

    // 1. SAYAÇ DİNLEYİCİSİ
    onSnapshot(collection(db, "online_users"), (snapshot) => {
        const countElement = document.getElementById('online-count');
        if (countElement) {
            countElement.innerText = "Aktif Kullanıcı: " + snapshot.size;
        }
    }, (error) => {
        console.log("Sayac hatasi:", error);
    });

    // 2. DOMAİNLERİ LİSTELEME (Daha önce çalışan orijinal mantığın)
    const domainListContainer = document.getElementById('domain-list');
    
    onSnapshot(collection(db, "domains"), (snapshot) => {
        if (domainListContainer) {
            domainListContainer.innerHTML = ""; 
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isSold = data.status === "sold";
                
                const domainCard = document.createElement('div');
                domainCard.className = 'domain-card';
                domainCard.innerHTML = `
                    <img src="${data.image || 'https://via.placeholder.com/150'}" class="domain-img" alt="${doc.id}">
                    <strong>${doc.id}</strong>
                    <p style="color: #cbd5e1; margin: 5px 0;">${data.price} Pi</p>
                    <button class="btn-buy" ${isSold ? 'disabled style="background:#64748b;"' : ''} id="btn-${doc.id}">
                        ${isSold ? 'Satıldı' : 'Satın Al'}
                    </button>
                `;
                domainListContainer.appendChild(domainCard);

                // Tıklama olayını güvenli bağla
                const btn = document.getElementById(`btn-${doc.id}`);
                if (btn && !isSold) {
                    btn.onclick = () => window.buyDomain(doc.id, data.price);
                }
            });
        }
    });

    // Pi SDK Ayarı
    try {
        Pi.init({ version: "2.0", sandbox: true });
    } catch(e) {
        console.error("Pi Init Hatasi:", e);
    }

    // 3. Pİ ILE GİRİŞ
    window.loginWithPi = function() {
        Pi.authenticate(['username', 'payments'], () => {})
        .then(async (auth) => {
            document.getElementById('user-status').innerText = "Bağlı: @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
            
            // Veritabanına online yaz
            await setDoc(doc(db, "online_users", auth.user.username), { joined: new Date() });
            
            // Çıkarken sil
            window.addEventListener("beforeunload", async () => {
                await deleteDoc(doc(db, "online_users", auth.user.username));
            });
        })
        .catch(err => alert("Giriş başarısız: " + err));
    }

    // 4. SATIN ALMA
    window.buyDomain = function(domainId, price) {
        console.log("Satinalma tetiklendi:", domainId, price);
        // Ödeme kodların buraya gelecek
    }
</script>
</body>
</html>
