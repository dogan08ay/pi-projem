<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --text:#f8fafc; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; display:flex; justify-content:center; }
        .container { max-width:600px; width:100%; text-align:center; }
        .card { background:var(--card); padding:25px; border-radius:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom:20px; }
        .domain-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px; }
        .domain-card { background:#334155; padding:20px; border-radius:12px; border:1px solid #475569; display:flex; flex-direction:column; align-items:center; }
        .domain-img { width:100%; height:120px; margin-bottom:10px; border-radius:12px; object-fit:contain; background-color:#334155; padding:5px; }
        .btn-buy { background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold; width:100%; }
        .pi-btn { background:#0052FF; color:#ffffff; padding:12px 30px; border-radius:50px; font-weight:800; cursor:pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count">Aktif Kullanıcı: 0</p>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card" id="admin-panel" style="display:none; text-align:left;">
        <h3 style="color:#6366f1;">🛠 Admin Paneli</h3>
        <div id="log-list" style="font-size:0.85em; max-height:150px; overflow-y:auto;"></div>
    </div>

    <div class="card">
        <div style="font-weight:800; font-size:1.2em; margin-bottom:15px;">Satıştaki Domainler</div>
        <div class="domain-grid" id="domain-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, collection } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "xxx", projectId: "web3-domain-gateway" }));
    let isAuth = false;

    window.addEventListener("load", () => { 
        if(window.Pi) Pi.init({ version: "2.0", sandbox: true }); 
    });

    window.loginWithPi = () => {
        Pi.authenticate(['username','payments'], {
            onIncompletePaymentFound: (payment) => Pi.approvePayment(payment.identifier)
        }).then(auth => {
            isAuth = true;
            document.getElementById("auth-btn").style.display = "none";
            document.getElementById("user-status").innerText = "Bağlı: @" + auth.user.username;
            renderDomains();
        }).catch(e => alert("Auth Hatası: " + e.message));
    };

    window.startPurchase = (name, price) => {
        // Ödeme Başlatma
        Pi.createPayment({
            amount: Number(price),
            memo: "Domain alımı: " + name,
            metadata: { domain: name }
        }, {
            onReadyForServerApproval: (paymentId) => {
                // SDK'ya onay sinyalini gönderir
                Pi.approvePayment(paymentId);
            },
            onReadyForServerCompletion: (paymentId, txid) => {
                // Ödeme başarılı olduğunda SDK'ya bildirir
                Pi.completePayment(paymentId, txid);
                setDoc(doc(db, "domains", name), { sold: true, txid: txid }, { merge: true });
                alert("Satın alma onaylandı!");
            },
            onCancel: () => alert("İşlem kullanıcı tarafından iptal edildi."),
            onError: (e) => alert("Ödeme hatası: " + (e.message || "Bilinmeyen hata"))
        });
    };

    function renderDomains() {
        const domains = [
            { name:'test-domain', img:'assets/test.jpeg', price:10 },
            { name:'etstur.pi', img:'assets/etstur.jpeg', price:250 }
        ];
        const list = document.getElementById("domain-list");
        list.innerHTML = '';
        domains.forEach(d => {
            const card = document.createElement('div');
            card.className = 'domain-card';
            card.innerHTML = `<strong>${d.name}</strong><br>${d.price} Pi<br><button class="btn-buy" onclick="startPurchase('${d.name}', ${d.price})">Satın Al</button>`;
            list.appendChild(card);
        });
    }
</script>
</body>
</html>
