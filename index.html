<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Domain Gateway</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#6366f1;
  --text:#f8fafc;
}

body {
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}

.container{max-width:600px;width:100%}

.card{
  background:var(--card);
  padding:25px;
  border-radius:20px;
  margin-bottom:20px;
}

.domain-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.domain-card{
  background:#334155;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.domain-img{
  width:100%;
  height:100px;
  object-fit:contain;
}

.btn-buy{
  background:var(--accent);
  border:none;
  padding:8px;
  width:100%;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.pi-btn{
  background:#0052FF;
  padding:12px 25px;
  border-radius:40px;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Web3 Domain</h2>
<p id="status">Bağlanmadı</p>
<button class="pi-btn" id="loginBtn">Pi ile Bağlan</button>
</div>

<div class="card">
<div id="domain-list" class="domain-grid"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"X",
  authDomain:"X",
  projectId:"X"
});

const db = getFirestore(app);

let user = null;
let paymentInProgress = false;

const domains = [
 {name:"test-domain",price:10},
 {name:"etstur.pi",price:250},
 {name:"eminevim.pi",price:150}
];

let domainData = {};

Pi.init({
  version:"2.0",
  sandbox:true,

  // 🔥 KRİTİK FIX
  onIncompletePaymentFound: async function(payment){
    try{
      await fetch("/api/approve",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          paymentId:payment.identifier,
          action:"complete",
          txid:payment.transaction?.txid || null
        })
      });
    }catch(e){
      console.log("Incomplete fix error",e);
    }
  }
});

window.login = function(){

  Pi.authenticate(['username','payments'])

  .then(async auth=>{
    user = auth.user.username;

    document.getElementById("status").innerText =
      "Bağlı: @" + user;

    render();

    await setDoc(doc(db,"online_users",user),{
      lastSeen:Date.now()
    });

  });
};

document.getElementById("loginBtn").onclick = login;

function render(){

  const list = document.getElementById("domain-list");
  if(!user) return;

  list.innerHTML="";

  domains.forEach(d=>{

    const data = domainData[d.name] || {sold:false};

    const div = document.createElement("div");
    div.className="domain-card";

    div.innerHTML=`
      <h4>${d.name}</h4>
      <p>${data.sold ? "SATILDI" : d.price + " Pi"}</p>
    `;

    if(!data.sold){
      const btn=document.createElement("button");
      btn.className="btn-buy";
      btn.innerText="Satın Al";

      btn.onclick=()=>buy(d.name,d.price);

      div.appendChild(btn);
    }

    list.appendChild(div);
  });
}

domains.forEach(d=>{
  onSnapshot(doc(db,"domains",d.name),(snap)=>{
    domainData[d.name]=snap.data()||{};
    render();
  });
});

window.buy = function(domain,amount){

  if(paymentInProgress) return;
  paymentInProgress=true;

  Pi.createPayment({
    amount,
    memo:"Domain "+domain,
    metadata:{domain}
  },{
    onReadyForServerApproval: async function(paymentId){
      await fetch("/api/approve",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({paymentId,action:"approve"})
      });
    },

    onReadyForServerCompletion: async function(paymentId,txid){

      await setDoc(doc(db,"domains",domain),{
        sold:true,
        txid
      },{merge:true});

      await fetch("/api/approve",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({paymentId,action:"complete",txid})
      });

      paymentInProgress=false;
      alert("Satın alma tamamlandı");
      render();
    },

    onError:(e)=>{
      paymentInProgress=false;
      alert("Hata: "+e.message);
    },

    onCancel:()=>{
      paymentInProgress=false;
    }
  });
};

</script>

</body>
</html>
