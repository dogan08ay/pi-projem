<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; margin: 10px auto; max-width: 500px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item { background: #334155; padding: 15px; border-radius: 10px; border: 1px solid #475569; }
        .sold { opacity: 0.5; background: #000; }
        .btn { background: #6366f1; border: none; color: white; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1 id="user-status">Web3 Domain</h1>
    <button id="auth-btn" onclick="login()" class="btn">Pi ile Bağlan</button>
</div>

<div class="card" id="market">
    </div>

<script>
    Pi.init({ version: "2.0", sandbox: true });
    const domains = ['etstur.pi', 'eminevim.pi', 'fuzulev.pi', 'fibabank.pi', 'sekerbank.pi', 'doganay.pi'];

    function render() {
        const market = document.getElementById('market');
        market.innerHTML = '<h3>Satıştaki Domainler</h3><div class="grid" id="list"></div>';
        const list = document.getElementById('list');
        domains.forEach(d => {
            const sold = localStorage.getItem(d) === 'sold';
            list.innerHTML += `
                <div class="item ${sold ? 'sold' : ''}">
                    <strong>${d}</strong><br>
                    <small>${sold ? 'SATILDI' : '1000 Pi'}</small>
                    ${!sold ? `<button class="btn" onclick="pay('${d}')">Satın Al</button>` : ''}
                </div>`;
        });
    }

    async function login() {
        try {
            const auth = await Pi.authenticate(['payments'], () => {});
            document.getElementById('user-status').innerText = "@" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
        } catch(e) { alert("Giriş başarısız."); }
    }

    function pay(d) {
        Pi.createPayment({ amount: 1000, memo: "Domain: " + d }, {
            onReadyForServerCompletion: (id, txid) => {
                localStorage.setItem(d, 'sold');
                render();
                alert("Başarılı!");
            },
            onError: (e) => alert("Hata: " + e.message)
        });
    }
    render();
</script>
</body>
</html>
