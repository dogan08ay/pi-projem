<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h1 { margin-bottom: 5px; color: var(--accent); }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; transition: 0.3s; }
        .domain-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        button { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p>Pi tabanlı dijital varlık yönetim portalı</p>
        <button id="auth-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
        <p id="user-status" style="margin-top: 10px; font-weight: bold;"></p>
    </div>

    <div class="card">
        <h3>Satıştaki Domainler</h3>
        <div class="domain-grid">
            <div class="domain-card">doganay.pi</div>
            <div class="domain-card">etstur.pi</div>
            <div class="domain-card">fibabank.pi</div>
            <div class="domain-card">dijital.pi</div>
        </div>
    </div>
</div>

<script>
    Pi.init({ version: "2.0", sandbox: true });
    
    function loginWithPi() {
        Pi.authenticate(['username'], () => {}).then(auth => {
            document.getElementById('user-status').innerText = "Hoş geldin, @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
        });
    }
</script>
</body>
</html>
