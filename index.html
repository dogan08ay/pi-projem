<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        :root {
            --bg:#0f172a;
            --card: #1e293b;
            --accent: #6366f1;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color:var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width:100%;
            text-align: center;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .domain-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .domain-card {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #475569;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .domain-img {
            width:100%;
            height: 120px;
            margin-bottom: 10px;
            border-radius: 12px;
            object-fit: contain;
            background-color: #334155;
            padding: 5px;
        }

        .btn-buy {
            background: var(--accent);
            color:white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            width:100%;
        }

        .pi-btn {
            background: #0052FF;
            color:#ffffff;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.95em;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .footer {
            font-size: 0.8em;
            color:#94a3b8;
            margin-top: 20px;
            line-height: 1.6;
        }

        .section-title-box {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color:#1e293b;
            padding: 12px 28px;
            border-radius: 16px;
            border: 3px solid #f59e0b;
            font-size: 1.15em;
            font-weight: 800;
            display: inline-block;
            margin: 5px auto 25px auto;
            box-shadow: 0 6px 16px rgba(245,158,11,0.2);
        }

        .auth-warning {
            color:#1e293b;
            padding: 24px;
            border: 4px solid #f59e0b;
            border-radius: 24px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            text-align: center;
            box-shadow: 0 12px 28px rgba(245,158,11,0.25);
        }

        .auth-title-box {
            background: #1e293b;
            color:#ffffff;
            padding: 26px 20px;
            border-radius: 18px;
            border: 1.5px solid rgba(245,158,11,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .lock-message {
            font-size: 1.05em;
            font-weight: 700;
            line-height: 1.8;
            color:#f8fafc;
        }

        .inline-btn-highlight {
            background: #0052ff;
            color:#ffffff;
            padding: 8px 26px;
            border-radius: 50px;
            font-weight: 800;
            display: inline-block;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .footer-section {
            margin-top: 30px;
            padding: 20px;
            color: #94a3b8;
            font-size: 0.9em;
            text-align: center;
            border-top: 1px solid #334155;
        }
        .footer-section a {
            color: #38bdf8;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
            margin: 5px 0;
        }
        .footer-section a:hover {
            color: #f8fafc;
            text-decoration: underline;
        }
        .footer-divider {
            margin: 0 10px;
            color: #475569;
        }
    </style>
</head>
