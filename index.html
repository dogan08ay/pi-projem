<!DOCTYPE html>
<html lang="tr">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Web3 Domain Gateway</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        :root {
            --bg:#0f172a;
            --card:#1e293b;
            --accent:#6366f1;
            --text:#f8fafc;
        }

        body {
            font-family:'Segoe UI',sans-serif;
            background:var(--bg);
            color:var(--text);
            margin:0;
            padding:20px;
            display:flex;
            justify-content:center;
        }

        .container {
            max-width:600px;
            width:100%;
            text-align:center;
        }

        .card {
            background:var(--card);
            padding:25px;
            border-radius:20px;
            box-shadow:0 10px 15px -3px rgba(0,0,0,0.3);
            margin-bottom:20px;
        }

        .domain-grid {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
            margin-top:20px;
        }

        .domain-card {
            background:#334155;
            padding:20px;
            border-radius:12px;
            border:1px solid #475569;
            transition:0.3s;
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        .domain-img {
            width:100%;
            height:120px;
            margin-bottom:10px;
            border-radius:12px;
            object-fit:contain;
            background-color:#334155;
            padding:5px;
        }

        .btn-buy {
            background:var(--accent);
            color:white;
            border:none;
            padding:8px 16px;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
            font-weight:bold;
            width:100%;
        }

        .pi-btn {
            background:#0052FF;
            color:#ffffff;
            padding:12px 30px;
            border-radius:50px;
            font-weight:800;
            cursor:pointer;
        }

        .footer-section {
            margin-top:30px;
            padding:20px;
            color:#94a3b8;
            font-size:0.9em;
            text-align:center;
            border-top:1px solid #334155;
        }

        .footer-section a {
            color:#38bdf8;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Web3 Domain</h1>

        <p id="online-count">Aktif Kullanıcı: 0</p>

        <p id="user-status">Lütfen önce bağlanın.</p>

        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">
            Pi ile Bağlan
        </button>

    </div>

    <!-- ADMIN PANEL -->
    <div class="card" id="admin-panel"
         style="display:none;border:2px solid #6366f1;text-align:left;">

        <h3 style="color:#6366f1;">🛠 Admin Paneli</h3>

        <div id="log-list" style="font-size:0.85em;max-height:200px;overflow-y:auto;"></div>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import {
    getFirestore,
    doc,
    onSnapshot,
    collection,
    setDoc,
    deleteDoc,
    getDocs,
    query,
    orderBy,
    limit
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "s3ddhcea9xae0qieikgjy9zw9tduemnraoucjrr9iqe87pduhczmd95kq8n3aai1",
    authDomain: "web3-domain-gateway.firebaseapp.com",
    projectId: "web3-domain-gateway",
    storageBucket: "web3-domain-gateway.firebasestorage.app",
    messagingSenderId: "315563254318",
    appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

Pi.init({ version:"2.0", sandbox:true });

let isUserAuthenticated = false;

/* FIXED LOGIN */
window.loginWithPi = async function () {

    try {

        const auth = await Pi.authenticate(['username','payments']);

        isUserAuthenticated = true;

        document.getElementById('user-status').innerText =
            "Bağlı: @" + auth.user.username;

        document.getElementById('auth-btn').style.display = 'none';

        /* ADMIN CHECK */
        if(auth.user.username === "doganay0808") {
            document.getElementById('admin-panel').style.display = 'block';
            loadAdminLogs(); // 🔥 FIX: sadece admin log
        }

    } catch (err) {
        alert("Giriş başarısız: " + err.message);
    }
};

/* 🔥 ADMIN LOG FIX (BUGÜN + SIRALI) */
async function loadAdminLogs() {

    const snap = await getDocs(
        query(
            collection(db, "daily_logs"),
            orderBy("timestamp", "desc"),
            limit(50)
        )
    );

    let logs = "";

    snap.forEach(d => {

        const data = d.data();

        if (!data.timestamp) return;

        const ts = Number(data.timestamp);
        if (isNaN(ts)) return;

        const date = new Date(ts);
        const today = new Date();

        const isToday =
            date.getFullYear() === today.getFullYear() &&
            date.getMonth() === today.getMonth() &&
            date.getDate() === today.getDate();

        // BUGÜN + GEÇMİŞ (istersen sadece today filtre açılır)
        if (data.date && !data.date.includes("NaN")) {

            logs += `
                <div style="
                    padding:8px;
                    border-bottom:1px solid #334155;
                    display:flex;
                    justify-content:space-between;
                ">
                    <span style="color:#60a5fa;">
                        ${data.date}
                    </span>

                    <b style="color:#f8fafc;">
                        @${data.username}
                    </b>
                </div>
            `;
        }
    });

    document.getElementById('log-list').innerHTML = logs;
}

</script>

</body>
</html>
