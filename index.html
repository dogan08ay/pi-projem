<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1 id="status">Hazır</h1>
    <button onclick="login()">1. Bağlan</button>
    <button onclick="pay()">2. Satın Al (1000 Pi)</button>

    <script>
        // Pi SDK Başlatma
        Pi.init({ version: "2.0", sandbox: true });

        // Bağlanma Fonksiyonu
        async function login() {
            try {
                const auth = await Pi.authenticate(['payments'], () => {});
                document.getElementById('status').innerText = "Merhaba @" + auth.user.username;
            } catch(e) {
                alert("Giriş Hatası: " + e.message);
            }
        }

        // Ödeme Fonksiyonu
        async function pay() {
            try {
                const payment = await Pi.createPayment({
                    amount: 1000,
                    memo: "Test Domain Satın Alımı"
                }, {
                    onReadyForServerCompletion: (id, txid) => {
                        alert("Ödeme Başarılı: " + txid);
                    },
                    onError: (e) => alert("Hata: " + e.message),
                    onCancel: () => alert("İptal Edildi")
                });
            } catch(e) {
                alert("Ödeme başlatılamadı: " + e.message);
            }
        }
    </script>
</body>
</html>
