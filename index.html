<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "xxx", authDomain: "web3-domain-gateway.firebaseapp.com", projectId: "web3-domain-gateway" }));

        // Pi SDK Başlatma
        window.addEventListener("load", () => {
            if (window.Pi) Pi.init({ version: "2.0", sandbox: true });
        });

        window.authProcess = () => {
            Pi.authenticate(['username', 'payments'], {
                onIncompletePaymentFound: (payment) => {
                    // Kilitli ödemeyi iptal et
                    fetch('/api/approve', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ paymentId: payment.identifier, action: 'cancel' }) 
                    }).then(() => {
                        alert("Eski işlem temizlendi. Lütfen sayfayı yenileyin.");
                        window.location.reload();
                    });
                }
            }).then(auth => {
                alert("Bağlanıldı: @" + auth.user.username);
            }).catch(e => alert("Giriş hatası: " + e.message));
        };
    </script>
</head>
<body>
    <button onclick="authProcess()" style="padding: 20px; font-size: 20px;">Pi ile Bağlan</button>
</body>
</html>
