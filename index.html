<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        :root { --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --text:#f8fafc; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; display:flex; justify-content:center; }
        .container { max-width:600px; width:100%; text-align:center; }
        .card { background:var(--card); padding:25px; border-radius:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom:20px; }
        .pi-btn { background:#0052FF; color:#ffffff; padding:12px 30px; border-radius:50px; font-weight:800; cursor:pointer; border:none; }
        .domain-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px; }
        .domain-card { background:#334155; padding:20px; border-radius:12px; border:1px solid #475569; }
        .btn-buy { background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; margin-top:10px; width:100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="user-status">Lütfen giriş yapın.</p>
        <button id="auth-btn" class="pi-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card">
        <div id="domain-list" class="domain-grid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // Firebase Yapılandırması
    const firebaseConfig = {
        apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A",
        authDomain: "web3-domain-gateway.firebaseapp.com",
        projectId: "web3-domain-gateway",
        storageBucket: "web3-domain-gateway.firebasestorage.app",
        messagingSenderId: "315563254318",
        appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    
    // Pi SDK Başlatma
    Pi.init({ version: "2.0", sandbox: true });

    let isUserAuthenticated = false;
    let paymentInProgress = false;

    // Global fonksiyonları window'a taşıyoruz
    window.loginWithPi = async function() {
        try {
            const auth = await Pi.authenticate(['username', 'payments'], (err) => {
                if (err) throw err;
            });

            isUserAuthenticated = true;
            document.getElementById('user-status').innerText = "Bağlı: @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
            renderDomains();
        } catch (err) {
            alert("Giriş hatası: " + err);
        }
    };

    window.startPurchase = function(domain, amount) {
        if (paymentInProgress) return;
        paymentInProgress = true;

        Pi.createPayment({
            amount: Number(amount),
            memo: "Domain: " + domain,
            metadata: { domain: domain }
        }, {
            onReadyForServerApproval: (id) => handlePayment(id, 'approve', null, domain),
            onReadyForServerCompletion: async (id, txid) => {
                try {
                    await handlePayment(id, 'complete', txid, domain);
                    await updateDoc(doc(db, "domains", domain), { sold: true, txid: txid });
                    alert("✅ Satın alma başarılı!");
                } catch (e) {
                    alert("Tamamlama hatası");
                } finally {
                    paymentInProgress = false;
                }
            },
            onCancel: () => { paymentInProgress = false; alert("İptal edildi"); },
            onError: (err) => { paymentInProgress = false; alert("Hata: " + err.message); }
        });
    };

    async function handlePayment(paymentId, action, txid, domain) {
        await fetch('/api/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, action, txid, domain })
        });
    }

    function renderDomains() {
        const list = document.getElementById('domain-list');
        list.innerHTML = `
            <div class="domain-card">
                <strong>test-domain</strong>
                <button class="btn-buy" onclick="startPurchase('test-domain', 10)">Satın Al (10 Pi)</button>
            </div>
        `;
    }
</script>
</body>
</html>
