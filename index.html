<!DOCTYPE html> <html lang="tr"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Web3 Domain Gateway</title> <script src="https://sdk.minepi.com/pi-sdk.js"></script> <style> body{ margin:0; padding:20px; background:#0f172a; color:white; font-family:Arial; } .container{ max-width:600px; margin:auto; } .card{ background:#1e293b; padding:20px; border-radius:20px; margin-bottom:20px; } .domain-grid{ display:grid; grid-template-columns:1fr 1fr; gap:15px; } .domain-card{ background:#334155; padding:15px; border-radius:12px; text-align:center; } .domain-img{ width:100%; height:120px; object-fit:contain; background:#1e293b; border-radius:10px; } .btn{ background:#6366f1; color:white; border:none; padding:10px; width:100%; border-radius:10px; cursor:pointer; margin-top:10px; font-weight:bold; } .pi-btn{ background:#0052ff; } </style> </head> <body> <div class="container"> <div class="card"> <h1>Web3 Domain</h1> <p id="status"> Lütfen giriş yapın </p> <button class="btn pi-btn" onclick="loginWithPi()"> Pi ile Bağlan </button> </div> <div class="card"> <h2>Satıştaki Domainler</h2> <div class="domain-grid" id="domains"> </div> </div> </div> <script type="module"> import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"; import { getFirestore, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"; /* FIREBASE */ const firebaseConfig = { apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A", authDomain: "web3-domain-gateway.firebaseapp.com", projectId: "web3-domain-gateway", storageBucket: "web3-domain-gateway.firebasestorage.app", messagingSenderId: "315563254318", appId: "1:315563254318:web:12f2f3f340bb69606df5bf" }; const app = initializeApp(firebaseConfig); const db = getFirestore(app); /* PI INIT */ const waitPi = setInterval(() => { if(typeof Pi !== "undefined"){ Pi.init({ version:"2.0", sandbox:true }); console.log("Pi SDK hazır"); clearInterval(waitPi); } },500); /* LOGIN */ window.loginWithPi = async function(){ try{ const auth = await Pi.authenticate( ['username'] ); document.getElementById("status").innerHTML = "Bağlı: @" + auth.user.username; renderDomains(); }catch(err){ alert(err.message); } }; /* DOMAINS */ const domains = [ { name:"etstur.pi", img:"assets/etstur.jpeg", price:250 }, { name:"fibabank.pi", img:"assets/fibabank.jpeg", price:500 }, { name:"doganay.pi", img:"assets/doganay.jpeg", price:150 } ]; /* RENDER */ function renderDomains(){ const container = document.getElementById("domains"); container.innerHTML = ""; domains.forEach(domain => { const card = document.createElement("div"); card.className = "domain-card"; card.innerHTML = ` <img src="${domain.img}" class="domain-img"> <h3>${domain.name}</h3> <p>${domain.price} Pi</p> <button class="btn" onclick="buyDomain('${domain.name}', ${domain.price})"> Satın Al </button> `; container.appendChild(card); }); } /* PURCHASE */ window.buyDomain = async function(domain, amount){ try{ /* TEST WALLET OPEN */ window.location.href = `pi://wallet.pinet.com/pay?amount=${amount}&memo=${domain}`; setTimeout(async () => { await updateDoc( doc(db,"domains",domain), { sold:true } ); },3000); }catch(err){ alert(err.message); } }; </script> </body> </html>
