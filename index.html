<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .domain-img { width: 100%; height: 120px; margin-bottom: 10px; border-radius: 12px; object-fit: contain; background-color: #334155; padding: 5px; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        #auth-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4); }
        .footer { font-size: 0.8em; color: #94a3b8; margin-top: 20px; line-height: 1.6; }
        .section-title-box { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); color: #1e293b; padding: 12px 28px; border-radius: 16px; border: 3px solid #f59e0b; font-size: 1.15em; font-weight: 800; display: inline-block; margin: 5px auto 25px auto; box-shadow: 0 6px 16px rgba(245, 158, 11, 0.2); }
        .auth-warning { color: #1e293b; padding: 24px; border: 4px solid #f59e0b; border-radius: 24px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); text-align: center; }
        .auth-title-box { background: #1e293b; color: #ffffff; padding: 26px 20px; border-radius: 18px; border: 1.5px solid rgba(245, 158, 11, 0.4); }
        .inline-btn-highlight { background: #0052ff; color: #ffffff; padding: 8px 26px; border-radius: 50px; font-weight: 800; display: inline-block; margin: 10px 0; }
        /* Yönetici Paneli CSS */
        .admin-panel { display: none; background: #1e293b; border: 2px dashed #10b981; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count" style="color: #a5b4fc; font-size: 0.9em; margin-bottom: 15px; font-weight: bold;">Aktif Kullanıcı: Yükleniyor...</p>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div id="admin-panel" class="admin-panel">
        <h3 style="color: #10b981;">📊 Günlük Giriş Kayıtları</h3>
        <div id="logs-container" style="font-size: 0.9em; color: #e2e8f0;"></div>
    </div>

    <div class="card">
        <div class="section-title-box">Satıştaki Domainler</div>
        <div class="domain-grid" id="domain-list">
            <div class="auth-warning" style="grid-column: span 2;">
                <div class="auth-title-box">
                    <div style="font-weight:700;">🔒 Erişim sağlamak için Pi ile bağlanınız.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, setDoc, deleteDoc, arrayUnion, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A",
        projectId: "web3-domain-gateway",
        // ... diğer config bilgilerin
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ADMIN_USER = "doganay0808";

    // --- Mevcut Fonksiyonların ---
    const domains = [{ name: 'test-domain', img: 'assets/test.jpeg' }, { name: 'doganay.pi', img: 'assets/doganay.jpeg' }];
    let domainData = {};
    let isUserAuthenticated = false;

    Pi.init({ version: "2.0", sandbox: true });

    window.loginWithPi = function() {
        Pi.authenticate(['username', 'payments'], () => {}).then(async (auth) => {
            isUserAuthenticated = true;
            const user = auth.user.username;
            document.getElementById('user-status').innerText = "Bağlı: @" + user;
            document.getElementById('auth-btn').style.display = 'none';
            
            // Yönetici Paneli Kontrolü
            if (user === ADMIN_USER) {
                document.getElementById('admin-panel').style.display = 'block';
                loadAdminLogs();
            }

            // Giriş Loglama
            const today = new Date().toISOString().split('T')[0];
            await setDoc(doc(db, "login_logs", today), { users: arrayUnion(user) }, { merge: true });

            render();
        });
    }

    function loadAdminLogs() {
        onSnapshot(query(collection(db, "login_logs"), orderBy("__name__", "desc")), (snap) => {
            const container = document.getElementById('logs-container');
            container.innerHTML = '';
            snap.forEach(d => {
                container.innerHTML += `<div style="margin-bottom:5px;"><b>${d.id}</b>: ${d.data().users.join(', ')}</div>`;
            });
        });
    }

    function render() { /* ... mevcut render kodun ... */ }
    // ... startPurchase ve diğer fonksiyonların aynen kalacak ...
</script>
</body>
</html>
