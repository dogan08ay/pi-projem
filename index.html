<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Domain Gateway</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#6366f1;
  --text:#f8fafc;
}

body {
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}

.container { max-width:600px; width:100%; text-align:center; }

.card {
  background:var(--card);
  padding:25px;
  border-radius:20px;
  margin-bottom:20px;
}

.domain-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.domain-card {
  background:#334155;
  padding:15px;
  border-radius:12px;
  border:1px solid #475569;
}

.domain-img {
  width:100%;
  height:120px;
  object-fit:contain;
}

.btn-buy {
  width:100%;
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.btn-buy:disabled {
  opacity:0.5;
  cursor:not-allowed;
}

.pi-btn {
  background:#0052FF;
  color:white;
  padding:12px 25px;
  border-radius:50px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.section-title-box {
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  padding:10px;
  border-radius:12px;
  font-weight:bold;
  color:#1e293b;
}

.auth-warning {
  padding:20px;
  border:3px solid #f59e0b;
  border-radius:15px;
  background:#fde68a;
  color:#1e293b;
}

.footer {
  font-size:12px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Web3 Domain</h1>
    <p id="online-count">Aktif Kullanıcı: 0</p>
    <p id="user-status">Lütfen giriş yapın</p>
    <button class="pi-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
  </div>

  <!-- ADMIN -->
  <div class="card" id="admin-panel" style="display:none;text-align:left;">
    <h3>🛠 Admin Panel</h3>
    <div id="log-list"></div>
  </div>

  <div class="card">
    <div class="section-title-box">Satıştaki Domainler</div>

    <div class="domain-grid" id="domain-list">
      <div class="auth-warning" style="grid-column:span 2;">
        Giriş yapmadan liste görünmez
      </div>
    </div>
  </div>

  <div class="footer">
    <p>📩 doganay08@hotmail.com</p>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  setDoc,
  updateDoc,
  deleteDoc,
  collection,
  query,
  orderBy,
  limit,
  getDocs
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "web3-domain-gateway.firebaseapp.com",
  projectId: "web3-domain-gateway",
  storageBucket: "web3-domain-gateway.appspot.com",
  messagingSenderId: "315563254318",
  appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

Pi.init({ version:"2.0", sandbox:true });

let isAuth = false;
let username = "";

const domains = [
  { name:'test-domain', img:'assets/test.jpeg', price:10 },
  { name:'etstur.pi', img:'assets/etstur.jpeg', price:250 },
  { name:'eminevim.pi', img:'assets/eminevim.jpeg', price:150 },
  { name:'fuzulev.pi', img:'assets/fuzulev.jpeg', price:300 },
  { name:'fibabank.pi', img:'assets/fibabank.jpeg', price:500 },
  { name:'sekerbank.pi', img:'assets/sekerbank.jpeg', price:600 },
  { name:'doganay.pi', img:'assets/doganay.jpeg', price:150 }
];

let domainData = {};
let paymentLock = false;

/* ONLINE COUNT */
onSnapshot(collection(db,"online_users"), snap => {
  let count = 0;
  const now = Date.now();

  snap.forEach(d=>{
    const t = d.data().lastSeen || 0;
    if(now - t < 5*60*1000) count++;
  });

  document.getElementById("online-count").innerText =
    "Aktif Kullanıcı: " + count;
});

/* DOMAIN LISTENER */
domains.forEach(d=>{
  onSnapshot(doc(db,"domains",d.name), snap=>{
    if(snap.exists()){
      domainData[d.name] = snap.data();
      render();
    }
  });
});

/* RENDER */
function render(){
  const list = document.getElementById("domain-list");

  if(!isAuth){
    list.innerHTML = `<div class="auth-warning" style="grid-column:span 2;">Giriş yapın</div>`;
    return;
  }

  list.innerHTML = "";

  domains.forEach(d=>{
    const data = domainData[d.name] || { sold:false, price:d.price };

    const div = document.createElement("div");
    div.className = "domain-card";

    div.innerHTML = `
      <img src="${d.img}" class="domain-img">
      <strong>${d.name}</strong><br>
      <span>${data.sold ? "SATILDI" : data.price + " Pi"}</span>
    `;

    if(!data.sold){
      const btn = document.createElement("button");
      btn.className = "btn-buy";
      btn.innerText = "Satın Al";
      btn.onclick = ()=>buy(d.name, data.price);
      div.appendChild(btn);
    }

    list.appendChild(div);
  });
}

/* LOGIN */
window.loginWithPi = function(){
  Pi.authenticate(["username","payments"])
  .then(async auth=>{
    username = auth.user.username;
    isAuth = true;

    document.getElementById("user-status").innerText =
      "Bağlı: @" + username;

    document.querySelector(".pi-btn").style.display="none";

    render();

    await setDoc(doc(db,"online_users",username),{
      lastSeen:Date.now()
    });

    setInterval(()=>{
      setDoc(doc(db,"online_users",username),{
        lastSeen:Date.now()
      },{merge:true});
    },30000);

    if(username === "doganay0808"){
      document.getElementById("admin-panel").style.display="block";

      const q = query(
        collection(db,"daily_logs"),
        orderBy("timestamp","desc"),
        limit(10)
      );

      const snap = await getDocs(q);

      let html = "";
      snap.forEach(d=>{
        html += `<div>${d.data().username} - ${d.data().date}</div>`;
      });

      document.getElementById("log-list").innerHTML = html;
    }

  })
  .catch(e=>alert(e));
};

/* BUY */
window.buy = function(domain, price){

  if(paymentLock) return;

  paymentLock = true;

  Pi.createPayment({
    amount:price,
    memo:"Domain: "+domain,
    metadata:{domain}
  },{
    onReadyForServerApproval: (id)=>{
      fetch("/api/approve",{method:"POST"});
    },

    onReadyForServerCompletion: async (id, txid)=>{

      await updateDoc(doc(db,"domains",domain),{
        sold:true,
        txid,
        soldAt:new Date().toISOString()
      });

      paymentLock = false;
      render();

      alert("Satın alma başarılı!");
    },

    onCancel:()=>{
      paymentLock=false;
    },

    onError:(e)=>{
      paymentLock=false;
      alert(e.message);
    }
  });
};

</script>

</body>
</html>
