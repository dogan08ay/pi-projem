<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Web3 Domain Gateway</h1>
    <div id="status">SDK bekleniyor...</div>
    <button id="pay-btn" style="display:none;" onclick="startPayment()">Domain Satın Al</button>

    <script>
        // SDK'yı en hızlı şekilde tetiklemek için
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        // SDK hazır değilse 3 saniye sonra otomatik kontrol et
        setTimeout(() => {
            if (document.getElementById('status').innerText === "SDK bekleniyor...") {
                document.getElementById('status').innerText = "SDK manuel tetiklendi.";
                document.getElementById('pay-btn').style.display = "block";
            }
        }, 3000);

        Pi.onReady(() => {
            document.getElementById('status').innerText = "SDK Aktif!";
            document.getElementById('pay-btn').style.display = "block";
        });

        function startPayment() {
            Pi.createPayment({
                amount: 0.1,
                memo: "Domain test",
                metadata: { domain: "test.pi" }
            }, {
                onReadyForServerApproval: (id) => console.log(id),
                onReadyForServerCompletion: (id, txid) => alert("Başarılı!"),
                onError: (err) => alert("Hata: " + JSON.stringify(err))
            });
        }
    </script>
</body>
</html>
