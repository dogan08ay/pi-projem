<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Web3 Domain</h1>
    <div id="status">SDK Hazırlanıyor...</div>
    <button id="pay-btn" style="display:none;" onclick="startPayment()">Şimdi Öde (0.1 Pi)</button>

    <script>
        // Pi'yi başlat
        Pi.init({ version: "2.0", sandbox: true });

        // SDK hazır olduğunda butonu göster
        Pi.onReady(() => {
            document.getElementById('status').innerText = "SDK Hazır!";
            document.getElementById('pay-btn').style.display = "block";
        });

        function startPayment() {
            try {
                Pi.createPayment({
                    amount: 0.1,
                    memo: "Test Ödemesi",
                    metadata: { type: "test" }
                }, {
                    onReadyForServerApproval: (id) => console.log("Approval:", id),
                    onReadyForServerCompletion: (id, txid) => alert("Başarılı! ID: " + txid),
                    onError: (err) => alert("Hata: " + JSON.stringify(err)),
                    onCancel: () => alert("İptal edildi.")
                });
            } catch (e) {
                alert("Kritik Hata: " + e);
            }
        }
    </script>
</body>
</html>
