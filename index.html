<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #6366f1;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .domain-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .domain-card {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #475569;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .domain-img {
            width: 100%;
            height: 120px;
            margin-bottom: 10px;
            border-radius: 12px;
            object-fit: contain;
            background-color: #334155;
            padding: 5px;
        }

        .btn-buy {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            width: 100%;
        }

        .pi-btn {
            background: #0052FF;
            color: #ffffff;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.95em;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .footer {
            font-size: 0.8em;
            color: #94a3b8;
            margin-top: 20px;
            line-height: 1.6;
        }

        .section-title-box {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #1e293b;
            padding: 12px 28px;
            border-radius: 16px;
            border: 3px solid #f59e0b;
            font-size: 1.15em;
            font-weight: 800;
            display: inline-block;
            margin: 5px auto 25px auto;
            box-shadow: 0 6px 16px rgba(245,158,11,0.2);
        }

        .auth-warning {
            color: #1e293b;
            padding: 24px;
            border: 4px solid #f59e0b;
            border-radius: 24px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            text-align: center;
            box-shadow: 0 12px 28px rgba(245,158,11,0.25);
        }

        .auth-title-box {
            background: #1e293b;
            color: #ffffff;
            padding: 26px 20px;
            border-radius: 18px;
            border: 1.5px solid rgba(245,158,11,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .lock-message {
            font-size: 1.05em;
            font-weight: 700;
            line-height: 1.8;
            color: #f8fafc;
        }

        .inline-btn-highlight {
            background: #0052ff;
            color: #ffffff;
            padding: 8px 26px;
            border-radius: 50px;
            font-weight: 800;
            display: inline-block;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Web3 Domain</h1>

        <p id="online-count"
           style="color:#60a5fa;font-size:0.9em;margin-bottom:15px;font-weight:600;">
            Sisteme Giriş Yapan Kullanıcı: 0
        </p>

        <p id="user-status">
            Lütfen önce bağlanın.
        </p>

        <button id="auth-btn"
                class="pi-btn"
                onclick="window.loginWithPi()">
            Pi ile Bağlan
        </button>

    </div>

    <div class="card" id="admin-panel"
         style="display:none;border:2px solid #6366f1;text-align:left;">

        <h3 style="color:#6366f1;margin-top:0;">
            🛠 Admin Paneli
        </h3>

        <div id="log-list"
             style="font-size:0.85em;max-height:150px;overflow-y:auto;">
        </div>

    </div>

    <div class="card">

        <div class="section-title-box">
            Satıştaki Domainler
        </div>

        <div class="domain-grid" id="domain-list">

            <div class="auth-warning"
                 style="grid-column:span 2;">

                <div class="auth-title-box">

                    <div class="lock-message">
                        🔒 Erişim sağlamak için lütfen yukarıdaki<br>

                        <span class="inline-btn-highlight">
                            Pi ile Bağlan
                        </span><br>

                        butonunu kullanınız.
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

import {
    getFirestore,
    doc,
    onSnapshot,
    updateDoc,
    collection,
    setDoc,
    getDocs,
    query,
    orderBy,
    limit,
    where
}
from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

    apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A",

    authDomain: "web3-domain-gateway.firebaseapp.com",

    projectId: "web3-domain-gateway",

    storageBucket: "web3-domain-gateway.firebasestorage.app",

    messagingSenderId: "315563254318",

    appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* PI SDK WAIT */

const waitForPi = setInterval(() => {

    if (typeof Pi !== "undefined") {

        Pi.init({

            version: "2.0",

            sandbox: true
        });

        console.log("Pi SDK hazır");

        clearInterval(waitForPi);
    }

}, 500);

/* DATA */

let isUserAuthenticated = false;

let domainData = {};

const domains = [

    { name:'test-domain', img:'assets/test.jpeg', price:10 },

    { name:'etstur.pi', img:'assets/etstur.jpeg', price:250 },

    { name:'eminevim.pi', img:'assets/eminevim.jpeg', price:150 },

    { name:'fuzulev.pi', img:'assets/fuzulev.jpeg', price:300 },

    { name:'fibabank.pi', img:'assets/fibabank.jpeg', price:500 },

    { name:'sekerbank.pi', img:'assets/sekerbank.jpeg', price:600 },

    { name:'doganay.pi', img:'assets/doganay.jpeg', price:150 }
];

/* COUNTER */

function updateCounter() {

    const today =
        new Date().toISOString().split('T')[0];

    onSnapshot(

        query(
            collection(db, "daily_logs"),
            where("date", "==", today)
        ),

        (snap) => {

            document.getElementById('online-count').innerHTML = `
                <span style="display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:50%;margin-right:6px;"></span>
                Sisteme Giriş Yapan Kullanıcı:
                <b>${snap.size}</b>
            `;
        }
    );
}

/* RENDER */

function render() {

    const list =
        document.getElementById('domain-list');

    if (!isUserAuthenticated) return;

    list.innerHTML = '';

    domains.forEach(d => {

        const data =
            domainData[d.name] || {

                sold:false,

                price:d.price
            };

        const isSold =
            data.sold === true;

        const price =
            data.price || d.price;

        const card =
            document.createElement('div');

        card.className = 'domain-card';

        card.innerHTML = `

            <img src="${d.img}"
                 class="domain-img">

            <strong>${d.name}</strong>

            <br>

            <span>

                ${
                    isSold
                    ? `SATILDI (${price} Pi)`
                    : price + ' Pi'
                }

            </span>

            ${
                !isSold
                ? `
                <button
                    class="btn-buy"
                    onclick="window.startPurchase('${d.name}', ${price})">

                    Satın Al

                </button>
                `
                : ''
            }
        `;

        list.appendChild(card);
    });
}

/* FIRESTORE */

domains.forEach(d => {

    onSnapshot(

        doc(db, "domains", d.name),

        (snap) => {

            if (snap.exists()) {

                domainData[d.name] =
                    snap.data();

                render();
            }
        }
    );
});

/* LOGIN */

window.loginWithPi = function() {

    if (typeof Pi === "undefined") {

        alert("Pi SDK yüklenemedi");

        return;
    }

    Pi.authenticate(
        ['username', 'payments'],
        () => {}
    )

    .then(async (auth) => {

        isUserAuthenticated = true;

        document.getElementById(
            'user-status'
        ).innerText =
            "Bağlı: @" + auth.user.username;

        document.getElementById(
            'auth-btn'
        ).style.display = 'none';

        await setDoc(

            doc(
                db,
                "daily_logs",
                auth.user.username + "_" +
                new Date().toISOString().split('T')[0]
            ),

            {
                username: auth.user.username,

                date:
                new Date().toISOString().split('T')[0]
            }
        );

        updateCounter();

        if(auth.user.username === "doganay0808") {

            document.getElementById(
                'admin-panel'
            ).style.display = 'block';

            const snap =
                await getDocs(

                    query(
                        collection(db, "daily_logs"),
                        orderBy("date", "desc"),
                        limit(10)
                    )
                );

            let logs = "";

            snap.forEach(d => {

                logs += `
                    <div>
                        ${d.data().date}
                        -
                        <b>@${d.data().username}</b>
                    </div>
                `;
            });

            document.getElementById(
                'log-list'
            ).innerHTML = logs;
        }

        render();

    })

    .catch(err => {

        alert(
            "Giriş Hatalı: " + err.message
        );
    });
};

/* PURCHASE */

window.startPurchase = function(domain, amount) {

    if (!isUserAuthenticated) {

        alert("Önce giriş yapın");

        return;
    }

    Pi.createPayment({

        amount: Number(amount),

        memo: "Domain: " + domain,

        metadata: {
            domain: domain
        }

    }, {

        onReadyForServerApproval:
        async function(paymentId) {

            console.log(
                "Approval:",
                paymentId
            );

            try {

                await fetch('/api/approve', {

                    method:'POST',

                    headers:{
                        'Content-Type':'application/json'
                    },

                    body: JSON.stringify({

                        paymentId: paymentId,

                        action:'approve'
                    })
                });

            } catch(e) {

                console.log(
                    "Sandbox fallback aktif"
                );
            }
        },

        onReadyForServerCompletion:
        async function(paymentId, txid) {

            console.log(
                "Completed:",
                paymentId,
                txid
            );

            try {

                await updateDoc(

                    doc(db, "domains", domain),

                    {
                        sold:true
                    }
                );

            } catch(err) {

                console.error(err);
            }

            alert(
                "✅ Test ödeme başarılı"
            );
        },

        onCancel:function() {

            alert(
                "Ödeme iptal edildi."
            );
        },

        onError:function(err) {

            console.error(err);

            alert(
                "Ödeme hatası: " +
                err.message
            );
        }
    });
};

</script>

</body>
</html>
