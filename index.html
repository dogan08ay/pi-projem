<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .domain-img { width: 100%; height: 120px; margin-bottom: 10px; border-radius: 12px; object-fit: contain; background-color: #334155; padding: 5px; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        #auth-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .footer { font-size: 0.8em; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card">
        <h3>Satıştaki Domainler</h3>
        <div class="domain-grid" id="domain-list"></div>
    </div>

    <div class="footer">
        <p>Sorularınız için bize ulaşın: <strong>doganay08@hotmail.com</strong></p>
        <a href="privacy.html" style="color: var(--accent);">Gizlilik Politikası</a> | 
        <a href="terms.html" style="color: var(--accent);">Kullanım Şartları</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A",
        authDomain: "web3-domain-gateway.firebaseapp.com",
        projectId: "web3-domain-gateway",
        storageBucket: "web3-domain-gateway.firebasestorage.app",
        messagingSenderId: "315563254318",
        appId: "1:315563254318:web:12f2f3f340bb69606df5bf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    Pi.init({ version: "2.0", sandbox: true });

    const domains = [
        { name: 'test-domain', img: 'assets/test.jpeg' },
        { name: 'etstur.pi', img: 'assets/etstur.jpeg' },
        { name: 'eminevim.pi', img: 'assets/eminevim.jpeg' },
        { name: 'fuzulev.pi', img: 'assets/fuzulev.jpeg' },
        { name: 'fibabank.pi', img: 'assets/fibabank.jpeg' },
        { name: 'sekerbank.pi', img: 'assets/sekerbank.jpeg' },
        { name: 'doganay.pi', img: 'assets/doganay.jpeg' }
    ];

    let domainData = {};

    function render() {
        const list = document.getElementById('domain-list');
        list.innerHTML = '';
        domains.forEach(d => {
            const data = domainData[d.name] || { sold: false, price: 10 };
            const isSold = data.sold === true;
            const price = (data.price !== undefined && data.price !== null) ? data.price : 10;
            
            const card = document.createElement('div');
            card.className = 'domain-card';
            
            card.innerHTML = `
                <img src="${d.img}" class="domain-img" onerror="this.src='https://via.placeholder.com/60'">
                <strong style="display:block; width: 100%; overflow: hidden; text-overflow: ellipsis;">${d.name}</strong><br>
                <span style="font-size: 0.85em; color: #a5b4fc; white-space: nowrap; display: block;">
                    ${isSold ? `SATILDI (${price} Pi)` : price + ' Pi'}
                </span>
            `;
            
            if (!isSold) {
                const btn = document.createElement('button');
                btn.className = 'btn-buy';
                btn.innerText = 'Satın Al';
                btn.onclick = () => startPurchase(d.name, price);
                card.appendChild(btn);
            }
            list.appendChild(card);
        });
    }

    domains.forEach(d => {
        onSnapshot(doc(db, "domains", d.name), (doc) => {
            if (doc.exists()) {
                domainData[d.name] = doc.data();
                render();
            }
        });
    });

    window.loginWithPi = function() {
        Pi.authenticate(['username', 'payments'], () => {})
        .then(auth => {
            document.getElementById('user-status').innerText = "Bağlı: @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
        })
        .catch(err => alert("Giriş başarısız: " + err));
    }

    window.startPurchase = function(domain, amount) {
        if(document.getElementById('auth-btn').style.display !== 'none') {
            alert("Lütfen önce Pi ile bağlanın!");
            return;
        }

        Pi.createPayment({
            amount: amount,
            memo: "Domain: " + domain,
            metadata: { domain: domain }
        }, {
            onReadyForServerApproval: (id) => handleServerSidePayment(id, 'approve', null),
            onReadyForServerCompletion: (id, txid) => {
                updateDoc(doc(db, "domains", domain), { sold: true });
                handleServerSidePayment(id, 'complete', txid);
            },
            onCancel: () => alert("Ödeme iptal edildi."),
            onError: (err) => alert("Ödeme hatası: " + err.message)
        });
    }

    function handleServerSidePayment(paymentId, action, txid) {
        fetch('/api/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId, action, txid })
        })
        .then(res => res.json())
        .then(data => {
            if(action === 'complete') alert("✅ Başarılı! Satın alma tamamlandı.");
        })
        .catch(err => console.error("Sunucu Hatası:", err));
    }
</script>
</body>
</html>
