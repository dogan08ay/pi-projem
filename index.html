<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .domain-img { width: 100%; height: 120px; margin-bottom: 10px; border-radius: 12px; object-fit: contain; background-color: #334155; padding: 5px; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        #auth-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4); }
        .admin-panel { display: none; border: 2px solid #6366f1; padding: 20px; border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count" style="color: #a5b4fc; font-size: 0.9em; margin-bottom: 15px; font-weight: bold;">Aktif Kullanıcı: Yükleniyor...</p>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card admin-panel" id="admin-panel">
        <h2 style="color: var(--accent);">🛠 Yönetici Paneli</h2>
        <input type="date" id="admin-date" style="padding: 10px; border-radius: 8px; width: 90%;">
        <button onclick="viewLogs()" class="btn-buy">Verileri Görüntüle</button>
        <div id="log-results" style="margin-top: 15px; font-size: 0.9em; text-align: left;"></div>
    </div>

    <div class="card">
        <div class="domain-grid" id="domain-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, setDoc, deleteDoc, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js";

    const firebaseConfig = {
        apiKey: "XXXXXX", authDomain: "XXXXXX", projectId: "web3-domain-gateway",
        storageBucket: "XXXXXX", messagingSenderId: "XXXXXX", appId: "XXXXXX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let isUserAuthenticated = false;

    // Admin mi kontrolü
    window.checkAdmin = async (username) => {
        const adminDoc = await getDoc(doc(db, "admins", username));
        if (adminDoc.exists()) {
            document.getElementById('admin-panel').style.display = 'block';
        }
    };

    // Log Görüntüleme
    window.viewLogs = async () => {
        const date = document.getElementById('admin-date').value;
        if(!date) return alert("Tarih seçin!");
        const q = query(collection(db, "daily_logs"), where("date", "==", date));
        const querySnapshot = await getDocs(q);
        let list = "<strong>" + date + " Kayıtları:</strong><br>";
        querySnapshot.forEach((doc) => { list += "- " + doc.data().username + "<br>"; });
        document.getElementById('log-results').innerHTML = list || "Kayıt bulunamadı.";
    };

    window.loginWithPi = function() {
        Pi.authenticate(['username'], () => {})
        .then(async (auth) => {
            isUserAuthenticated = true;
            const username = auth.user.username;
            document.getElementById('user-status').innerText = "Bağlı: @" + username;
            document.getElementById('auth-btn').style.display = 'none';

            // Giriş logunu kaydet
            const today = new Date().toISOString().split('T')[0];
            await setDoc(doc(db, "daily_logs", username + "_" + today), { username: username, date: today });
            
            checkAdmin(username);
            render();
        })
        .catch(err => alert("Giriş başarısız: " + err));
    }

    // (Eski render ve diğer fonksiyonlarınız aynen buraya gelecek)
    // ...
</script>
</body>
</html>
