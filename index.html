<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .domain-img { width: 100%; height: 120px; margin-bottom: 10px; border-radius: 12px; object-fit: contain; background-color: #334155; padding: 5px; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        .pi-btn { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; border: none; padding: 14px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.5); }
        .section-title-box { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); color: #1e293b; padding: 12px 28px; border-radius: 16px; border: 3px solid #f59e0b; font-size: 1.15em; font-weight: 800; display: inline-block; margin: 5px auto 25px auto; }
        .auth-warning { color: #1e293b; padding: 24px; border: 4px solid #f59e0b; border-radius: 24px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); text-align: center; }
        .inline-btn-highlight { background: #0052ff; color: #ffffff; padding: 8px 26px; border-radius: 50px; font-weight: 800; display: inline-block; margin: 10px 0; }
        .footer-link { color: #38bdf8; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="online-count" style="color: #a5b4fc; font-size: 0.9em;">Yükleniyor...</p>
        <p id="user-status">Lütfen bağlanın.</p>
        <button id="auth-btn" class="pi-btn" onclick="loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div id="admin-panel" class="card" style="display: none; border: 2px solid #6366f1; text-align: left;">
        <h3 style="color: #6366f1;">🛠 Admin Paneli</h3>
        <div id="log-list" style="font-size: 0.85em;"></div>
    </div>

    <div class="card">
        <div class="section-title-box">Satıştaki Domainler</div>
        <div class="domain-grid" id="domain-list">
            <div class="auth-warning" style="grid-column: span 2;">
                🔒 Erişim için lütfen <b>yukarıdaki</b><br>
                <span class="inline-btn-highlight">Pi ile Bağlan</span> butonunu kullanınız.
            </div>
        </div>
    </div>

    <div class="footer" style="color: #94a3b8; font-size: 0.8em;">
        <p>İletişim: doganay08@hotmail.com | <a href="https://t.me/+5jZi9vrcNMM2NGVk" class="footer-link">Telegram</a></p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A", authDomain: "web3-domain-gateway.firebaseapp.com", projectId: "web3-domain-gateway", storageBucket: "web3-domain-gateway.firebasestorage.app", messagingSenderId: "315563254318", appId: "1:315563254318:web:12f2f3f340bb69606df5bf" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let isUserAuthenticated = false;
    const Pi = window.Pi;

    function renderDomains() {
        if (!isUserAuthenticated) return;
        const list = document.getElementById('domain-list');
        list.innerHTML = '';
        const domains = ['test-domain', 'etstur.pi', 'eminevim.pi', 'fuzulev.pi', 'fibabank.pi', 'sekerbank.pi', 'doganay.pi'];
        
        domains.forEach(d => {
            db.collection("domains").doc(d).get().then(doc => {
                const data = doc.data() || { sold: false, price: 10 };
                const card = document.createElement('div');
                card.className = 'domain-card';
                card.innerHTML = `<strong>${d}</strong><br><span>${data.sold ? 'SATILDI' : data.price + ' Pi'}</span>`;
                if (!data.sold) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-buy';
                    btn.innerText = 'Satın Al';
                    btn.onclick = () => startPurchase(d, data.price);
                    card.appendChild(btn);
                }
                list.appendChild(card);
            });
        });
    }

    window.loginWithPi = function() {
        Pi.authenticate(['username', 'payments'], () => {}).then(auth => {
            isUserAuthenticated = true;
            document.getElementById('user-status').innerText = "Bağlı: @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
