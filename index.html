<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .domain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .domain-card { background: #334155; padding: 20px; border-radius: 12px; border: 1px solid #475569; display: flex; flex-direction: column; align-items: center; }
        .btn-buy { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        .pi-btn { background: #0052FF; color: #ffffff; padding: 12px 30px; border-radius: 50px; font-weight: 800; border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="user-status">Lütfen bağlanın.</p>
        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">Pi ile Bağlan</button>
    </div>

    <div class="card">
        <div class="domain-grid" id="domain-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyC9r244vRVGbYOcLHyS6EHxKyiygajW7_A", projectId: "web3-domain-gateway" }));
    
    // SDK başlatma
    window.addEventListener('load', () => { if (typeof Pi !== 'undefined') Pi.init({ version: "2.0", sandbox: true }); });

    let isUserAuthenticated = false;
    let domainData = {};
    const domains = [
        { name: 'test-domain', price: 10 }, { name: 'etstur.pi', price: 250 },
        { name: 'eminevim.pi', price: 150 }, { name: 'fuzulev.pi', price: 300 }
    ];

    function render() {
        const list = document.getElementById('domain-list');
        list.innerHTML = '';
        domains.forEach(d => {
            const data = domainData[d.name] || { sold: false };
            const card = document.createElement('div');
            card.className = 'domain-card';
            card.innerHTML = `<strong>${d.name}</strong><span>${data.sold ? 'SATILDI' : d.price + ' Pi'}</span>${!data.sold ? `<button class="btn-buy" onclick="window.startPurchase('${d.name}', ${d.price})">Satın Al</button>` : ''}`;
            list.appendChild(card);
        });
    }

    window.loginWithPi = function() {
        if (typeof Pi === 'undefined') { alert("Pi SDK yüklenemedi!"); return; }
        Pi.authenticate(['username', 'payments'], () => {}).then(auth => {
            isUserAuthenticated = true;
            document.getElementById('user-status').innerText = "Bağlı: @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
            render();
        });
    }

    // DÜZELTİLEN YER BURASI
    window.startPurchase = function(domain, amount) {
        Pi.createPayment({ amount: amount, memo: "Domain: " + domain, metadata: { domain: domain } }, {
            onReadyForServerApproval: (id) => console.log("Onay bekliyor..."),
            onReadyForServerCompletion: (id, txid) => {
                updateDoc(doc(db, "domains", domain), { sold: true })
                .then(() => { alert("✅ İşlem başarıyla tamamlandı!"); location.reload(); });
            },
            onCancel: () => alert("İptal edildi."),
            onError: (err) => alert("Hata: " + err.message)
        });
    }

    domains.forEach(d => {
        onSnapshot(doc(db, "domains", d.name), (snap) => {
            if (snap.exists()) { domainData[d.name] = snap.data(); render(); }
        });
    });
</script>
</body>
</html>
