<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PI ÖDEME TAMİR PANELİ</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family:sans-serif; background:#0f172a; color:white; text-align:center; padding:20px; }
        .panel { background:#1e293b; padding:20px; border-radius:15px; border:2px solid #ef4444; max-width:400px; margin:auto; }
        .status { margin:20px 0; padding:10px; background:#000; border-radius:10px; font-family:monospace; font-size:0.9em; text-align:left; min-height:100px; overflow-y:auto; }
        .btn { background:#ef4444; color:white; border:none; padding:12px 20px; border-radius:10px; font-weight:bold; cursor:pointer; width:100%; margin-top:10px; }
        .btn-blue { background:#3b82f6; }
        .id-box { color:#fbbf24; font-weight:bold; border:1px dashed #fbbf24; padding:5px; margin-top:10px; display:none; }
    </style>
</head>
<body>

<div class="panel">
    <h2>🛠 ARIZA TESPİT PANELİ</h2>
    <p style="font-size:0.8em; color:#94a3b8;">Bu panel hesabınızdaki "hayalet" ödemeyi bulup silmek için tasarlanmıştır.</p>
    
    <div class="status" id="status-log">Sistem hazır. Lütfen "TARA" butonuna basın...</div>
    
    <div id="found-id-box" class="id-box">
        TESPİT EDİLEN ID:<br>
        <span id="payment-id-display">---</span>
    </div>

    <button class="btn btn-blue" onclick="startScan()">1. ADIM: ARIZAYI TARA</button>
    <button id="fix-btn" class="btn" onclick="fixPayment()" style="display:none;">2. ADIM: BU ÖDEMEYİ SİL</button>
</div>

<script>
    const logBox = document.getElementById("status-log");
    const idBox = document.getElementById("found-id-box");
    const idDisplay = document.getElementById("payment-id-display");
    const fixBtn = document.getElementById("fix-btn");
    let detectedId = null;

    function log(msg) {
        logBox.innerHTML += "<br>> " + msg;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function startScan() {
        log("Tarama başlatılıyor...");
        try {
            if (!window.Pi) return log("HATA: Pi SDK yüklenemedi!");
            
            Pi.init({ version: "2.0", sandbox: true });
            log("SDK Başlatıldı.");

            await Pi.authenticate(['username', 'payments'], {
                onIncompletePaymentFound: (payment) => {
                    log("BİNGO! Takılı ödeme bulundu.");
                    detectedId = payment.identifier;
                    idDisplay.innerText = detectedId;
                    idBox.style.display = "block";
                    fixBtn.style.display = "block";
                    log("ID: " + detectedId);
                }
            });
            
            setTimeout(() => {
                if(!detectedId) log("Bekleyen ödeme bulunamadı. SDK temiz görünüyor.");
            }, 3000);

        } catch (e) {
            log("HATA: " + e.message);
        }
    }

    async function fixPayment() {
        if(!detectedId) return;
        log("Silme komutu gönderiliyor...");
        try {
            const res = await fetch('/api/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'cancel', paymentId: detectedId })
            });
            const data = await res.json();
            log("Sunucu Yanıtı: " + (data.success ? "BAŞARILI" : "HATA"));
            log("Lütfen şimdi orijinal uygulamanıza dönüp giriş yapmayı deneyin.");
        } catch (e) {
            log("Bağlantı hatası!");
        }
    }
</script>

</body>
</html>
