<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --text:#f8fafc; }
        body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; display:flex; justify-content:center; }
        .container { max-width:600px; width:100%; text-align:center; }
        .card { background:var(--card); padding:25px; border-radius:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.3); margin-bottom:20px; }
        .pi-btn { background:#0052FF; color:#ffffff; padding:12px 30px; border-radius:50px; font-weight:800; cursor:pointer; border:none; }
        .btn-buy { background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; width:100%; margin-top:10px; }
        .domain-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px; }
        .domain-card { background:#334155; padding:20px; border-radius:12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="user-status">Lütfen önce bağlanın.</p>
        <button id="auth-btn" class="pi-btn" onclick="window.loginWithPi()">Pi ile Bağlan</button>
    </div>
    <div class="card" id="domain-list">
        <p>Erişim sağlamak için giriş yapınız.</p>
    </div>
</div>

        if (typeof Pi !== 'undefined') {
            Pi.init({ version: "2.0", sandbox: true });
        }
    });

    let isUserAuthenticated = false;
    let paymentInProgress = false;

    window.loginWithPi = function() {
        if (typeof Pi === 'undefined') return alert("Pi SDK yüklenemedi!");
        
        Pi.authenticate(['username', 'payments'], (payment) => {
            handleServerSidePayment(payment.identifier, 'complete', payment.transaction.txid);
        })
        .then((auth) => {
            isUserAuthenticated = true;
            document.getElementById('user-status').innerText = "Bağlı: @" + auth.user.username;
            document.getElementById('auth-btn').style.display = 'none';
            renderDomains();
        })
        .catch(err => alert("Giriş başarısız: " + err));
    };
