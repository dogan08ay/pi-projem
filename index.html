<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Web3 Domain Gateway</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background:#0f172a; color:#f8fafc; font-family:sans-serif; text-align:center; padding:20px; }
        .card { background:#1e293b; padding:20px; border-radius:20px; margin:10px auto; max-width:500px; }
        .pi-btn { background:#0052FF; color:white; padding:15px 30px; border-radius:50px; border:none; cursor:pointer; font-weight:bold; }
        .btn-buy { background:#6366f1; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; margin-top:10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Web3 Domain</h1>
        <p id="user-status">Lütfen giriş yapın.</p>
        <button id="auth-btn" class="pi-btn" onclick="login()">Pi ile Bağlan</button>
    </div>
    <div id="domain-list"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "xxx", authDomain: "web3-domain-gateway.firebaseapp.com", projectId: "web3-domain-gateway" }));

    // Init her zaman en başta ve tek başına
    window.addEventListener("load", () => {
        if (window.Pi) Pi.init({ version: "2.0", sandbox: true });
    });

    window.login = () => {
        Pi.authenticate(['username', 'payments'], {
            onIncompletePaymentFound: (p) => Pi.approvePayment(p.identifier)
        }).then(auth => {
            document.getElementById("user-status").innerText = "Bağlı: @" + auth.user.username;
            document.getElementById("auth-btn").style.display = "none";
            // Buraya domainleri listeleyen fonksiyonunuzu ekleyin
        }).catch(e => alert("Hata: " + e.message));
    };
</script>
</body>
</html>
