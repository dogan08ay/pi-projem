<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .card { background: #334155; padding: 20px; margin: 15px; border-radius: 12px; border: 1px solid #6366f1; }
        .price { font-size: 1.2em; color: #fbbf24; font-weight: bold; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; background: #6366f1; color: white; font-size: 16px; margin-top: 10px; }
        .sold { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>Premium Web3 Domainler</h1>
    <div id="market"></div>

    <script>
        Pi.init({ version: "2.0", sandbox: true });

        // Fiyatlar 2000 Pi olarak güncellendi
        const domainList = [
            { name: 'etstur.pi', price: 2000 },
            { name: 'eminevim.pi', price: 2000 },
            { name: 'fuzulev.pi', price: 2000 },
            { name: 'fibabank.pi', price: 2000 },
            { name: 'sekerbank.pi', price: 2000 },
            { name: 'doganay.pi', price: 2000 }
        ];

        const market = document.getElementById('market');

        domainList.forEach(d => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <strong style="font-size: 1.5em;">${d.name}</strong><br>
                <p class="price">${d.price} Pi</p>
                <button class="btn" id="btn-${d.name}" onclick="odemeYap('${d.name}', ${d.price})">Satın Al</button>
            `;
            market.appendChild(div);
        });

        function odemeYap(name, price) {
            const btn = document.getElementById(`btn-${name}`);
            btn.innerText = "İşleniyor...";
            btn.disabled = true;

            const timeout = setTimeout(() => {
                alert("İstek zaman aşımına uğradı, lütfen tekrar deneyin.");
                btn.innerText = "Satın Al";
                btn.disabled = false;
            }, 15000); // Süreyi 15 saniyeye çıkardım (Pi ağı yoğun olabilir)

            Pi.createPayment({
                amount: price,
                memo: "Premium Domain: " + name,
                metadata: { domain: name }
            }, {
                onReadyForServerCompletion: (id, txid) => {
                    clearTimeout(timeout);
                    alert("Tebrikler! Ödeme Başarılı. Tx: " + txid);
                    btn.innerText = "SATILDI";
                    btn.className = "btn sold";
                },
                onError: (err) => {
                    clearTimeout(timeout);
                    btn.innerText = "Satın Al";
                    btn.disabled = false;
                    alert("Hata oluştu, lütfen bakiyenizi kontrol edin.");
                },
                onCancel: () => {
                    clearTimeout(timeout);
                    btn.innerText = "Satın Al";
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
